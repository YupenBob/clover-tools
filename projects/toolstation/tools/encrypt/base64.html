<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 编解码 - CloverTools</title>
    <meta name="description" content="在线 Base64 加密解密工具，快速安全">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            padding: 20px 0 40px;
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        header a {
            color: white;
            text-decoration: none;
            opacity: 0.8;
        }

        header a:hover {
            opacity: 1;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .mode-switch {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .mode-btn {
            padding: 12px 30px;
            border: 2px solid #667eea;
            border-radius: 8px;
            background: white;
            color: #667eea;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .mode-btn.active {
            background: #667eea;
            color: white;
        }

        .mode-btn:hover {
            transform: translateY(-2px);
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            height: 200px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .result-box {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            min-height: 150px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
            word-break: break-all;
            position: relative;
        }

        .result-box.has-result {
            border-color: #48bb78;
            background: #f0fff4;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 8px 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #5568d3;
        }

        .info {
            margin-top: 25px;
            padding: 20px;
            background: #ebf8ff;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .info h3 {
            color: #2c5282;
            margin-bottom: 10px;
        }

        .info ul {
            margin-left: 20px;
            color: #2c5282;
        }

        .info li {
            margin-bottom: 5px;
        }

        @media (max-width: 768px) {
            .mode-switch {
                flex-direction: column;
            }

            .mode-btn {
                width: 100%;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="../../index.html">← 返回首页</a>
            <h1>🔐 Base64 编解码</h1>
            <p>快速、安全的 Base64 加密解密工具</p>
        </header>

        <div class="card">
            <div class="mode-switch">
                <button class="mode-btn active" onclick="setMode('encode')">编码 (Encode)</button>
                <button class="mode-btn" onclick="setMode('decode')">解码 (Decode)</button>
            </div>

            <div class="input-group">
                <label id="inputLabel">输入文本：</label>
                <textarea id="input" placeholder="在此输入要编码的文本..."></textarea>
            </div>

            <div class="actions">
                <button class="btn btn-primary" onclick="process()">执行</button>
                <button class="btn btn-secondary" onclick="swap()">交换输入输出</button>
                <button class="btn btn-secondary" onclick="clearAll()">清空</button>
            </div>

            <div class="input-group">
                <label>结果：</label>
                <div class="result-box" id="result">
                    <button class="copy-btn" onclick="copyResult()">复制</button>
                    <span id="resultText"></span>
                </div>
            </div>

            <div class="info">
                <h3>ℹ️ 关于 Base64</h3>
                <ul>
                    <li>Base64 是一种基于 64 个可打印字符来表示二进制数据的表示方法</li>
                    <li>常用于在 URL、Cookie、邮件等场景传输二进制数据</li>
                    <li><strong>注意：</strong>Base64 不是加密算法，只是编码方式，不保证安全性</li>
                    <li>所有处理均在本地完成，数据不会上传服务器</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'encode';
        const input = document.getElementById('input');
        const resultText = document.getElementById('resultText');
        const resultBox = document.getElementById('result');
        const inputLabel = document.getElementById('inputLabel');

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            if (mode === 'encode') {
                inputLabel.textContent = '输入文本：';
                input.placeholder = '在此输入要编码的文本...';
            } else {
                inputLabel.textContent = '输入 Base64：';
                input.placeholder = '在此输入要解码的 Base64 字符串...';
            }
        }

        function process() {
            const text = input.value;
            if (!text) {
                alert('请输入内容！');
                return;
            }

            try {
                let result;
                if (currentMode === 'encode') {
                    result = btoa(unescape(encodeURIComponent(text)));
                } else {
                    result = decodeURIComponent(escape(atob(text)));
                }
                
                resultText.textContent = result;
                resultBox.classList.add('has-result');
            } catch (e) {
                resultText.textContent = '错误：' + e.message;
                resultBox.classList.remove('has-result');
                resultBox.style.borderColor = '#f56565';
                resultBox.style.background = '#fff5f5';
                setTimeout(() => {
                    resultBox.style.borderColor = '';
                    resultBox.style.background = '';
                }, 3000);
            }
        }

        function swap() {
            const temp = input.value;
            input.value = resultText.textContent;
            resultText.textContent = temp;
            if (temp) {
                resultBox.classList.add('has-result');
            } else {
                resultBox.classList.remove('has-result');
            }
        }

        function copyResult() {
            const text = resultText.textContent;
            if (text) {
                navigator.clipboard.writeText(text).then(() => {
                    const btn = document.querySelector('.copy-btn');
                    const originalText = btn.textContent;
                    btn.textContent = '已复制！';
                    setTimeout(() => {
                        btn.textContent = originalText;
                    }, 2000);
                });
            }
        }

        function clearAll() {
            input.value = '';
            resultText.textContent = '';
            resultBox.classList.remove('has-result');
        }

        // 支持 Tab 键
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = input.selectionStart;
                const end = input.selectionEnd;
                input.value = input.value.substring(0, start) + '\t' + input.value.substring(end);
                input.selectionStart = input.selectionEnd = start + 1;
            }
        });
    </script>
</body>
</html>

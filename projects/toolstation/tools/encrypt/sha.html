<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHA 加密 - CloverTools</title>
    <meta name="description" content="在线 SHA 哈希加密工具，支持 SHA1/SHA256/SHA512">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            padding: 20px 0 40px;
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        header a {
            color: white;
            text-decoration: none;
            opacity: 0.8;
        }

        header a:hover {
            opacity: 1;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            height: 120px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .options {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .options label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #555;
            padding: 10px 15px;
            background: #f8f9fa;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .options label:hover {
            background: #f0f0f0;
        }

        .options input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .results {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
        }

        .result-item {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .result-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .result-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-value {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            padding: 12px 15px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            word-break: break-all;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .copy-btn {
            padding: 6px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #5568d3;
        }

        .info {
            margin-top: 25px;
            padding: 20px;
            background: #ebf8ff;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .info h3 {
            color: #2c5282;
            margin-bottom: 10px;
        }

        .info ul {
            margin-left: 20px;
            color: #2c5282;
        }

        .info li {
            margin-bottom: 5px;
        }

        @media (max-width: 768px) {
            .options {
                flex-direction: column;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .result-value {
                flex-direction: column;
                align-items: stretch;
            }

            .copy-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="../../index.html">← 返回首页</a>
            <h1>🔐 SHA 加密</h1>
            <p>支持 SHA1、SHA256、SHA512 哈希算法</p>
        </header>

        <div class="card">
            <div class="input-group">
                <label>输入文本：</label>
                <textarea id="input" placeholder="在此输入要加密的文本..."></textarea>
            </div>

            <div class="options">
                <label>
                    <input type="radio" name="algorithm" value="sha1"> SHA-1 (160 位)
                </label>
                <label>
                    <input type="radio" name="algorithm" value="sha256" checked> SHA-256 (256 位)
                </label>
                <label>
                    <input type="radio" name="algorithm" value="sha512"> SHA-512 (512 位)
                </label>
            </div>

            <div class="actions">
                <button class="btn btn-primary" onclick="calculateSHA()">计算 SHA</button>
                <button class="btn btn-secondary" onclick="clearAll()">清空</button>
            </div>

            <div class="results" id="results" style="display: none;">
                <div class="result-item">
                    <div class="result-label">
                        <span id="resultLabel">SHA-256：</span>
                    </div>
                    <div class="result-value">
                        <span id="hashResult"></span>
                        <button class="copy-btn" onclick="copyResult()">复制</button>
                    </div>
                </div>
            </div>

            <div class="info">
                <h3>ℹ️ 关于 SHA 算法</h3>
                <ul>
                    <li>SHA（Secure Hash Algorithm）是安全哈希算法标准</li>
                    <li>SHA-1：160 位，已不再安全，不推荐用于安全场景</li>
                    <li>SHA-256：256 位，目前最常用，安全性好</li>
                    <li>SHA-512：512 位，安全性最高，输出更长</li>
                    <li>SHA 是单向哈希，<strong>不可逆</strong></li>
                    <li>所有计算在本地完成，数据不会上传服务器</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // 使用 Web Crypto API 计算 SHA 哈希
        async function calculateSHA() {
            const input = document.getElementById('input').value;
            const algorithm = document.querySelector('input[name="algorithm"]:checked').value;
            
            if (!input) {
                alert('请输入要加密的文本！');
                return;
            }

            try {
                // 将文本转换为 ArrayBuffer
                const encoder = new TextEncoder();
                const data = encoder.encode(input);
                
                // 计算哈希
                const hashBuffer = await crypto.subtle.digest(algorithm.toUpperCase(), data);
                
                // 转换为十六进制字符串
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
                
                // 显示结果
                document.getElementById('resultLabel').textContent = algorithm.toUpperCase() + '：';
                document.getElementById('hashResult').textContent = hashHex;
                document.getElementById('results').style.display = 'block';
            } catch (e) {
                alert('计算失败：' + e.message);
            }
        }

        function copyResult() {
            const text = document.getElementById('hashResult').textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '已复制！';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            });
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('results').style.display = 'none';
        }
    </script>
</body>
</html>

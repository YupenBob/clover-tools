<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 压缩/格式化 - CloverTools</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <style>
        .button-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .button-group button {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-minify {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .btn-format {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        .btn-copy {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        .button-group button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }
        .stats {
            font-size: 14px;
            color: #888;
            margin: 10px 0;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
        }
        textarea {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <header>
        <a href="../../">🏠 CloverTools</a>
        <nav>
            <a href="../../index.html#text">文本</a>
            <a href="../../index.html#json">JSON</a>
            <a href="../../index.html#encrypt">加密</a>
            <a href="../../index.html#time">时间</a>
            <a href="../../index.html#code">代码</a>
        </nav>
    </header>
    
    <main>
        <h1>🎨 CSS 压缩/格式化</h1>
        <p>压缩 CSS 减小文件大小，或格式化 CSS 提高可读性</p>
        
        <div class="tool-container">
            <div class="button-group">
                <button class="btn-minify" onclick="minifyCSS()">🗜️ 压缩 CSS</button>
                <button class="btn-format" onclick="formatCSS()">📋 格式化 CSS</button>
                <button class="btn-copy" onclick="copyOutput()">📄 复制结果</button>
            </div>
            
            <textarea id="input" rows="12" placeholder="粘贴 CSS 代码...
例如：
.body {
    margin: 0;
    padding: 0;
    background-color: #ffffff;
}"></textarea>
            
            <div class="stats" id="stats" style="display: none;"></div>
            
            <textarea id="output" rows="12" readonly placeholder="结果将显示在这里..."></textarea>
        </div>
    </main>
    
    <script>
        function minifyCSS() {
            const input = document.getElementById('input').value;
            if (!input.trim()) {
                alert('请输入 CSS 代码');
                return;
            }
            
            let result = input;
            
            // 移除注释
            result = result.replace(/\/\*[\s\S]*?\*\//g, '');
            
            // 移除多余空白
            result = result.replace(/\s+/g, ' ');
            
            // 移除 { 后的空格
            result = result.replace(/\{\s+/g, '{');
            
            // 移除 } 前的空格
            result = result.replace(/\s+\}/g, '}');
            
            // 移除 : 后的空格
            result = result.replace(/\:\s+/g, ':');
            
            // 移除 ; 后的空格
            result = result.replace(/\;\s+/g, ';');
            
            // 移除开头的空格
            result = result.trim();
            
            document.getElementById('output').value = result;
            updateStats(input, result, '压缩');
        }
        
        function formatCSS() {
            const input = document.getElementById('input').value;
            if (!input.trim()) {
                alert('请输入 CSS 代码');
                return;
            }
            
            let result = input;
            
            // 先压缩
            result = result.replace(/\/\*[\s\S]*?\*\//g, '');
            result = result.replace(/\s+/g, ' ');
            result = result.replace(/\{\s+/g, '{');
            result = result.replace(/\s+\}/g, '}');
            result = result.replace(/\:\s+/g, ':');
            result = result.replace(/\;\s+/g, ';');
            
            // 再格式化
            let formatted = '';
            let indent = 0;
            const tab = '    ';
            
            for (let i = 0; i < result.length; i++) {
                const char = result[i];
                
                if (char === '{') {
                    formatted += char + '\n';
                    indent++;
                    formatted += tab.repeat(indent);
                } else if (char === '}') {
                    formatted += '\n';
                    indent--;
                    formatted += tab.repeat(indent) + char + '\n';
                    if (i < result.length - 1) {
                        formatted += tab.repeat(indent);
                    }
                } else if (char === ';') {
                    formatted += char + '\n' + tab.repeat(indent);
                } else {
                    formatted += char;
                }
            }
            
            document.getElementById('output').value = formatted.trim();
            updateStats(input, formatted, '格式化');
        }
        
        function updateStats(original, result, action) {
            const originalSize = new Blob([original]).size;
            const resultSize = new Blob([result]).size;
            const ratio = ((resultSize - originalSize) / originalSize * 100).toFixed(1);
            
            let ratioText = '';
            if (action === '压缩' && ratio < 0) {
                ratioText = `📉 减小了 ${Math.abs(ratio).toFixed(1)}%`;
            } else if (action === '格式化' && ratio > 0) {
                ratioText = `📈 增加了 ${ratio.toFixed(1)}%（更易读）`;
            }
            
            document.getElementById('stats').innerHTML = `
                <strong>${action}结果</strong> | 
                原始：${(originalSize / 1024).toFixed(2)} KB | 
                结果：${(resultSize / 1024).toFixed(2)} KB | 
                ${ratioText}
            `;
            document.getElementById('stats').style.display = 'block';
        }
        
        function copyOutput() {
            const output = document.getElementById('output');
            if (!output.value.trim()) {
                alert('没有可复制的内容');
                return;
            }
            output.select();
            document.execCommand('copy');
            alert('✅ 已复制到剪贴板');
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown 预览 - CloverTools</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 { color: #333; margin-bottom: 0.5rem; }
        .desc { color: #666; margin-bottom: 1.5rem; }
        .editor-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            height: calc(100vh - 300px);
            min-height: 500px;
        }
        @media (max-width: 968px) {
            .editor-container { grid-template-columns: 1fr; height: auto; }
        }
        .editor, .preview {
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 1rem;
            overflow-y: auto;
        }
        .editor textarea {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            font-family: monospace;
            font-size: 0.9rem;
            resize: none;
            line-height: 1.6;
        }
        .preview {
            background: #fafafa;
            line-height: 1.8;
        }
        .preview h1, .preview h2, .preview h3 { margin: 1rem 0 0.5rem; }
        .preview p { margin-bottom: 1rem; }
        .preview code {
            background: #f0f0f0;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-family: monospace;
        }
        .preview pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 1rem 0;
        }
        .preview pre code {
            background: none;
            padding: 0;
            color: inherit;
        }
        .preview blockquote {
            border-left: 4px solid #667eea;
            padding-left: 1rem;
            color: #666;
            margin: 1rem 0;
        }
        .preview table {
            border-collapse: collapse;
            width: 100%;
            margin: 1rem 0;
        }
        .preview th, .preview td {
            border: 1px solid #ddd;
            padding: 0.5rem;
            text-align: left;
        }
        .preview th { background: #f0f0f0; }
        .preview ul, .preview ol { margin-left: 2rem; margin-bottom: 1rem; }
        .preview a { color: #667eea; }
        .preview img { max-width: 100%; }
        .toolbar {
            margin-bottom: 1rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .toolbar button {
            background: #f0f0f0;
            color: #333;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .toolbar button:hover { background: #e0e0e0; }
        .nav { margin-bottom: 1.5rem; }
        .nav a { color: #667eea; text-decoration: none; font-weight: 500; }
        .nav a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="../../">🏠 返回首页</a>
        </div>
        
        <h1>📝 Markdown 预览</h1>
        <p class="desc">实时预览 Markdown 渲染效果</p>
        
        <div class="toolbar">
            <button onclick="insert('# 标题')">标题</button>
            <button onclick="insert('**粗体**')">粗体</button>
            <button onclick="insert('*斜体*')">斜体</button>
            <button onclick="insert('[链接](https://)')">链接</button>
            <button onclick="insert('`代码`')">代码</button>
            <button onclick="insert('```js\ncode\n```')">代码块</button>
            <button onclick="insert('- 列表项')">列表</button>
            <button onclick="insert('> 引用')">引用</button>
            <button onclick="insert('| 表头 | 表头 |\n| --- | --- |\n| 单元格 | 单元格 |')">表格</button>
            <button onclick="clearAll()">清空</button>
        </div>
        
        <div class="editor-container">
            <div class="editor">
                <textarea id="input" placeholder="在此输入 Markdown..." oninput="update()"></textarea>
            </div>
            <div class="preview" id="preview"></div>
        </div>
    </div>
    
    <script>
        function update() {
            const input = document.getElementById('input').value;
            const preview = document.getElementById('preview');
            preview.innerHTML = marked.parse(input);
        }
        
        function insert(text) {
            const textarea = document.getElementById('input');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const before = textarea.value.substring(0, start);
            const after = textarea.value.substring(end);
            textarea.value = before + text + after;
            textarea.selectionStart = textarea.selectionEnd = start + text.length;
            textarea.focus();
            update();
        }
        
        function clearAll() {
            document.getElementById('input').value = '';
            update();
        }
        
        // 初始化示例
        document.getElementById('input').value = `# 欢迎使用 Markdown 预览

## 功能特点

- **实时渲染**：输入即刻看到效果
- **语法高亮**：支持代码块高亮
- **完整支持**：表格、列表、引用等

## 代码示例

\`\`\`javascript
function hello() {
    console.log("Hello, World!");
}
\`\`\`

## 表格

| 功能 | 状态 |
|------|------|
| 实时预览 | ✅ |
| 语法高亮 | ✅ |
| 导出 HTML | ⏳ |

> 开始写作吧！
`;
        update();
    </script>
</body>
</html>

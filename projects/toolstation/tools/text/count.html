<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字数统计 - CloverTools</title>
    <meta name="description" content="在线字数统计工具，支持中英文">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            padding: 20px 0 40px;
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        header a {
            color: white;
            text-decoration: none;
            opacity: 0.8;
        }

        header a:hover {
            opacity: 1;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            height: 300px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .stat-label {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .info {
            padding: 20px;
            background: #ebf8ff;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .info h3 {
            color: #2c5282;
            margin-bottom: 10px;
        }

        .info ul {
            margin-left: 20px;
            color: #2c5282;
        }

        .info li {
            margin-bottom: 5px;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="../../index.html">← 返回首页</a>
            <h1>📊 字数统计</h1>
            <p>实时统计字符数、单词数、行数等</p>
        </header>

        <div class="card">
            <div class="input-group">
                <label>输入文本：</label>
                <textarea id="input" placeholder="在此输入文本，实时统计字数..." oninput="count()"></textarea>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">总字符数</div>
                    <div class="stat-value" id="totalChars">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">不含空格</div>
                    <div class="stat-value" id="noSpaceChars">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">英文单词</div>
                    <div class="stat-value" id="words">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">中文字数</div>
                    <div class="stat-value" id="chineseChars">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">行数</div>
                    <div class="stat-value" id="lines">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">段落数</div>
                    <div class="stat-value" id="paragraphs">0</div>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary" onclick="copyStats()">复制统计</button>
                <button class="btn btn-secondary" onclick="clearAll()">清空</button>
            </div>

            <div class="info">
                <h3>ℹ️ 统计说明</h3>
                <ul>
                    <li><strong>总字符数</strong>：包含所有字符（包括空格、标点）</li>
                    <li><strong>不含空格</strong>：排除空格后的字符数</li>
                    <li><strong>英文单词</strong>：以空格分隔的英文单词数</li>
                    <li><strong>中文字数</strong>：汉字字符数（不含标点）</li>
                    <li><strong>行数</strong>：文本总行数</li>
                    <li><strong>段落数</strong>：以空行分隔的段落数</li>
                    <li>所有处理均在本地完成，数据不会上传服务器</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        function count() {
            const text = document.getElementById('input').value;

            // 总字符数
            document.getElementById('totalChars').textContent = text.length;

            // 不含空格
            document.getElementById('noSpaceChars').textContent = text.replace(/\s/g, '').length;

            // 英文单词数
            const words = text.trim().split(/\s+/).filter(w => w.length > 0);
            document.getElementById('words').textContent = words.length;

            // 中文字数（Unicode 范围：\u4e00-\u9fff）
            const chinese = text.match(/[\u4e00-\u9fff]/g) || [];
            document.getElementById('chineseChars').textContent = chinese.length;

            // 行数
            const lines = text.split(/\n/).length;
            document.getElementById('lines').textContent = lines;

            // 段落数（以空行分隔）
            const paragraphs = text.split(/\n\s*\n/).filter(p => p.trim().length > 0).length;
            document.getElementById('paragraphs').textContent = paragraphs || (text.length > 0 ? 1 : 0);
        }

        function copyStats() {
            const text = document.getElementById('input').value;
            if (!text) {
                alert('请输入内容！');
                return;
            }

            const stats = `字数统计结果：
总字符数：${document.getElementById('totalChars').textContent}
不含空格：${document.getElementById('noSpaceChars').textContent}
英文单词：${document.getElementById('words').textContent}
中文字数：${document.getElementById('chineseChars').textContent}
行数：${document.getElementById('lines').textContent}
段落数：${document.getElementById('paragraphs').textContent}`;

            navigator.clipboard.writeText(stats).then(() => {
                alert('已复制到剪贴板！');
            });
        }

        function clearAll() {
            document.getElementById('input').value = '';
            count();
        }

        // 初始化
        count();
    </script>
</body>
</html>

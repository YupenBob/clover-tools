<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汉字转拼音 - CloverTools</title>
    <meta name="description" content="在线汉字转拼音工具，支持多音字">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            padding: 20px 0 40px;
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        header a {
            color: white;
            text-decoration: none;
            opacity: 0.8;
        }

        header a:hover {
            opacity: 1;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .options {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .options label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #555;
            padding: 10px 15px;
            background: #f8f9fa;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .options label:hover {
            background: #f0f0f0;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            height: 150px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            font-size: 16px;
            resize: vertical;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .result-box {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            min-height: 150px;
            font-size: 16px;
            line-height: 1.8;
            position: relative;
        }

        .result-box.has-result {
            border-color: #48bb78;
            background: #f0fff4;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 8px 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #5568d3;
        }

        .info {
            margin-top: 25px;
            padding: 20px;
            background: #ebf8ff;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .info h3 {
            color: #2c5282;
            margin-bottom: 10px;
        }

        .info ul {
            margin-left: 20px;
            color: #2c5282;
        }

        .info li {
            margin-bottom: 5px;
        }

        @media (max-width: 768px) {
            .options {
                flex-direction: column;
            }

            .actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="../../index.html">← 返回首页</a>
            <h1>📇 汉字转拼音</h1>
            <p>将汉字转换为拼音，支持多音字</p>
        </header>

        <div class="card">
            <div class="options">
                <label>
                    <input type="radio" name="style" value="normal" checked> 普通拼音 (zhōng guó)
                </label>
                <label>
                    <input type="radio" name="style" value="toneless"> 无声调 (zhong guo)
                </label>
                <label>
                    <input type="radio" name="style" value="first"> 首字母 (z g)
                </label>
                <label>
                    <input type="checkbox" id="capitalize"> 首字母大写
                </label>
            </div>

            <div class="input-group">
                <label>输入汉字：</label>
                <textarea id="input" placeholder="在此输入汉字，例如：中国"></textarea>
            </div>

            <div class="actions">
                <button class="btn btn-primary" onclick="convert()">转换</button>
                <button class="btn btn-secondary" onclick="clearAll()">清空</button>
            </div>

            <div class="input-group">
                <label>结果：</label>
                <div class="result-box" id="result">
                    <button class="copy-btn" onclick="copyResult()">复制</button>
                    <span id="resultText"></span>
                </div>
            </div>

            <div class="info">
                <h3>ℹ️ 使用说明</h3>
                <ul>
                    <li><strong>普通拼音</strong>：带声调符号 (zhōng guó)</li>
                    <li><strong>无声调</strong>：不带声调 (zhong guo)</li>
                    <li><strong>首字母</strong>：仅首字母 (z g)</li>
                    <li>非汉字字符保持原样</li>
                    <li>所有处理均在本地完成，数据不会上传服务器</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        // 简化拼音映射表（常用字）
        const pinyinMap = {
            '中': 'zhōng', '国': 'guó', '人': 'rén', '民': 'mín', '共': 'gòng', '和': 'hé',
            '北': 'běi', '京': 'jīng', '上': 'shàng', '海': 'hǎi', '天': 'tiān', '地': 'dì',
            '你': 'nǐ', '好': 'hǎo', '我': 'wǒ', '他': 'tā', '她': 'tā', '它': 'tā',
            '是': 'shì', '的': 'de', '了': 'le', '在': 'zài', '有': 'yǒu', '这': 'zhè',
            '个': 'gè', '们': 'men', '到': 'dào', '来': 'lái', '大': 'dà', '小': 'xiǎo',
            '多': 'duō', '少': 'shǎo', '长': 'cháng', '高': 'gāo', '低': 'dī', '快': 'kuài',
            '慢': 'màn', '好': 'hǎo', '坏': 'huài', '对': 'duì', '错': 'cuò', '新': 'xīn',
            '旧': 'jiù', '前': 'qián', '后': 'hòu', '左': 'zuǒ', '右': 'yòu', '东': 'dōng',
            '西': 'xī', '南': 'nán', '北': 'běi', '中': 'zhōng', '内': 'nèi', '外': 'wài',
            '一': 'yī', '二': 'èr', '三': 'sān', '四': 'sì', '五': 'wǔ', '六': 'liù',
            '七': 'qī', '八': 'bā', '九': 'jiǔ', '十': 'shí', '百': 'bǎi', '千': 'qiān',
            '万': 'wàn', '年': 'nián', '月': 'yuè', '日': 'rì', '时': 'shí', '分': 'fēn',
            '秒': 'miǎo', '今': 'jīn', '明': 'míng', '昨': 'zuó', '早': 'zǎo', '晚': 'wǎn',
            '上': 'shàng', '下': 'xià', '午': 'wǔ', '点': 'diǎn', '钟': 'zhōng', '半': 'bàn',
            '请': 'qǐng', '问': 'wèn', '谢': 'xiè', '谢': 'xiè', '不': 'bù', '用': 'yòng',
            '客': 'kè', '气': 'qì', '再': 'zài', '见': 'jiàn', '欢': 'huān', '迎': 'yíng',
            '光': 'guāng', '临': 'lín', '工': 'gōng', '作': 'zuò', '学': 'xué', '习': 'xí',
            '生': 'shēng', '活': 'huó', '动': 'dòng', '物': 'wù', '植': 'zhí', '家': 'jiā',
            '庭': 'tíng', '父': 'fù', '母': 'mǔ', '子': 'zǐ', '女': 'nǚ', '兄': 'xiōng',
            '弟': 'dì', '姐': 'jiě', '妹': 'mèi', '朋': 'péng', '友': 'yǒu', '老': 'lǎo',
            '师': 'shī', '同': 'tóng', '学': 'xué', '校': 'xiào', '书': 'shū', '本': 'běn',
            '笔': 'bǐ', '纸': 'zhǐ', '电': 'diàn', '脑': 'nǎo', '手': 'shǒu', '机': 'jī',
            '电': 'diàn', '话': 'huà', '网': 'wǎng', '络': 'luò', '软': 'ruǎn', '件': 'jiàn',
            '硬': 'yìng', '盘': 'pán', '数': 'shù', '据': 'jù', '程': 'chéng', '序': 'xù',
            '代': 'dài', '码': 'mǎ', '开': 'kāi', '发': 'fā', '测': 'cè', '试': 'shì',
            '设': 'shè', '计': 'jì', '系': 'xì', '统': 'tǒng', '安': 'ān', '全': 'quán',
            '文': 'wén', '件': 'jiàn', '夹': 'jiā', '目': 'mù', '录': 'lù', '索': 'suǒ',
            '引': 'yǐn', '搜': 'sōu', '索': 'suǒ', '引': 'yǐn', '擎': 'qíng', '浏': 'liú',
            '览': 'lǎn', '器': 'qì', '页': 'yè', '面': 'miàn', '链': 'liàn', '接': 'jiē',
            '图': 'tú', '片': 'piàn', '视': 'shì', '频': 'pín', '音': 'yīn', '乐': 'lè',
            '游': 'yóu', '戏': 'xì', '应': 'yīng', '用': 'yòng', '软': 'ruǎn', '件': 'jiàn'
        };

        function convert() {
            const input = document.getElementById('input').value;
            const style = document.querySelector('input[name="style"]:checked').value;
            const capitalize = document.getElementById('capitalize').checked;
            
            if (!input) {
                alert('请输入内容！');
                return;
            }

            let result = '';
            for (let char of input) {
                if (/[\u4e00-\u9fff]/.test(char)) {
                    let pinyin = pinyinMap[char] || char;
                    
                    if (style === 'toneless') {
                        // 去除声调
                        pinyin = pinyin.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
                    } else if (style === 'first') {
                        // 取首字母
                        pinyin = pinyin.charAt(0);
                    }
                    
                    if (capitalize && pinyin.length > 0) {
                        pinyin = pinyin.charAt(0).toUpperCase() + pinyin.slice(1);
                    }
                    
                    result += pinyin + ' ';
                } else {
                    result += char;
                }
            }

            document.getElementById('resultText').textContent = result.trim();
            document.getElementById('result').classList.add('has-result');
        }

        function copyResult() {
            const text = document.getElementById('resultText').textContent;
            if (text) {
                navigator.clipboard.writeText(text).then(() => {
                    const btn = document.querySelector('.copy-btn');
                    const originalText = btn.textContent;
                    btn.textContent = '已复制！';
                    setTimeout(() => {
                        btn.textContent = originalText;
                    }, 2000);
                });
            }
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('resultText').textContent = '';
            document.getElementById('result').classList.remove('has-result');
        }
    </script>
</body>
</html>

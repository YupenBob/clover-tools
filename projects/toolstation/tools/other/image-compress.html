<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片压缩 - CloverTools</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <style>
        .preview-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .preview-box {
            flex: 1;
            min-width: 250px;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            text-align: center;
        }
        .preview-box img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .stats {
            font-size: 14px;
            color: #888;
            margin: 10px 0;
        }
        .compression-ratio {
            font-size: 18px;
            font-weight: bold;
            color: #4CAF50;
            margin: 10px 0;
        }
        .slider-container {
            margin: 20px 0;
        }
        .slider-container label {
            display: block;
            margin-bottom: 10px;
        }
        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.2);
            outline: none;
        }
        .download-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
            transition: transform 0.2s;
        }
        .download-btn:hover {
            transform: translateY(-2px);
        }
        .download-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <header>
        <a href="../../">🏠 CloverTools</a>
        <nav>
            <a href="../../index.html#text">文本</a>
            <a href="../../index.html#json">JSON</a>
            <a href="../../index.html#encrypt">加密</a>
            <a href="../../index.html#time">时间</a>
            <a href="../../index.html#other">其他</a>
        </nav>
    </header>
    
    <main>
        <h1>🖼️ 图片压缩</h1>
        <p>使用 Canvas API 本地压缩图片，支持 JPEG/PNG/WebP 格式</p>
        
        <div class="tool-container">
            <input type="file" id="imageInput" accept="image/*" style="margin: 20px 0;">
            
            <div class="slider-container">
                <label>压缩质量：<span id="qualityValue">80</span>%</label>
                <input type="range" id="qualitySlider" min="1" max="100" value="80">
            </div>
            
            <div class="slider-container">
                <label>最大宽度（像素）：<span id="widthValue">原图</span></label>
                <input type="range" id="widthSlider" min="100" max="4000" value="0" step="100">
            </div>
            
            <button onclick="compressImage()" id="compressBtn" disabled>开始压缩</button>
            
            <div class="preview-container" id="previewContainer" style="display: none;">
                <div class="preview-box">
                    <h3>原图</h3>
                    <img id="originalPreview" alt="原图预览">
                    <div class="stats" id="originalStats"></div>
                </div>
                <div class="preview-box">
                    <h3>压缩后</h3>
                    <img id="compressedPreview" alt="压缩后预览">
                    <div class="stats" id="compressedStats"></div>
                    <div class="compression-ratio" id="compressionRatio"></div>
                    <button class="download-btn" id="downloadBtn" onclick="downloadImage()">📥 下载压缩图片</button>
                </div>
            </div>
        </div>
    </main>
    
    <script>
        let originalImage = null;
        let compressedBlob = null;
        let originalFileName = 'image';
        
        const imageInput = document.getElementById('imageInput');
        const qualitySlider = document.getElementById('qualitySlider');
        const widthSlider = document.getElementById('widthSlider');
        const qualityValue = document.getElementById('qualityValue');
        const widthValue = document.getElementById('widthValue');
        const compressBtn = document.getElementById('compressBtn');
        const previewContainer = document.getElementById('previewContainer');
        
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                originalFileName = file.name.replace(/\.[^/.]+$/, '');
                const reader = new FileReader();
                reader.onload = function(event) {
                    originalImage = new Image();
                    originalImage.onload = function() {
                        widthSlider.max = originalImage.width;
                        widthSlider.value = 0;
                        widthValue.textContent = '原图 (' + originalImage.width + 'px)';
                        compressBtn.disabled = false;
                        document.getElementById('originalPreview').src = event.target.result;
                        document.getElementById('originalStats').textContent = 
                            `${originalImage.width} × ${originalImage.height} px | ${(file.size / 1024).toFixed(2)} KB`;
                    };
                    originalImage.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
        
        qualitySlider.addEventListener('input', function() {
            qualityValue.textContent = this.value;
        });
        
        widthSlider.addEventListener('input', function() {
            if (this.value == 0) {
                widthValue.textContent = '原图 (' + originalImage.width + 'px)';
            } else {
                widthValue.textContent = this.value + 'px';
            }
        });
        
        function compressImage() {
            if (!originalImage) return;
            
            const quality = parseInt(qualitySlider.value) / 100;
            let maxWidth = parseInt(widthSlider.value);
            if (maxWidth === 0) maxWidth = originalImage.width;
            
            const scale = Math.min(maxWidth / originalImage.width, 1);
            const newWidth = Math.floor(originalImage.width * scale);
            const newHeight = Math.floor(originalImage.height * scale);
            
            const canvas = document.createElement('canvas');
            canvas.width = newWidth;
            canvas.height = newHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(originalImage, 0, 0, newWidth, newHeight);
            
            canvas.toBlob(function(blob) {
                compressedBlob = blob;
                const url = URL.createObjectURL(blob);
                document.getElementById('compressedPreview').src = url;
                document.getElementById('compressedStats').textContent = 
                    `${newWidth} × ${newHeight} px | ${(blob.size / 1024).toFixed(2)} KB`;
                
                const ratio = ((1 - blob.size / (imageInput.files[0].size)) * 100).toFixed(1);
                const ratioElement = document.getElementById('compressionRatio');
                if (ratio > 0) {
                    ratioElement.textContent = `✨ 压缩了 ${ratio}%`;
                    ratioElement.style.color = '#4CAF50';
                } else {
                    ratioElement.textContent = `⚠️ 文件大小增加 ${Math.abs(ratio).toFixed(1)}%`;
                    ratioElement.style.color = '#ff9800';
                }
                
                previewContainer.style.display = 'flex';
            }, 'image/jpeg', quality);
        }
        
        function downloadImage() {
            if (!compressedBlob) return;
            const url = URL.createObjectURL(compressedBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = originalFileName + '-compressed.jpg';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>

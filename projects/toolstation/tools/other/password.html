<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码生成器 - CloverTools</title>
    <meta name="description" content="在线随机密码生成器，安全可靠的密码创建工具">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            padding: 20px 0 40px;
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        header a {
            color: white;
            text-decoration: none;
            opacity: 0.8;
        }

        header a:hover {
            opacity: 1;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .password-display {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: center;
        }

        .password-text {
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 24px;
            color: #333;
            word-break: break-all;
            margin-bottom: 15px;
            min-height: 36px;
        }

        .password-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-success:hover {
            background: #38a169;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .options {
            margin-bottom: 25px;
        }

        .option-group {
            margin-bottom: 20px;
        }

        .option-group label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
        }

        .checkbox-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            transition: background 0.2s;
        }

        .checkbox-item:hover {
            background: #f0f0f0;
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .length-slider {
            width: 100%;
            margin: 10px 0;
        }

        .length-value {
            text-align: center;
            font-size: 24px;
            color: #667eea;
            font-weight: bold;
        }

        .strength-meter {
            margin-top: 20px;
        }

        .strength-label {
            text-align: center;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
        }

        .strength-bar {
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
            border-radius: 5px;
        }

        .strength-fill.weak {
            background: #f56565;
            width: 25%;
        }

        .strength-fill.fair {
            background: #ed8936;
            width: 50%;
        }

        .strength-fill.good {
            background: #ecc94b;
            width: 75%;
        }

        .strength-fill.strong {
            background: #48bb78;
            width: 100%;
        }

        .info {
            margin-top: 25px;
            padding: 20px;
            background: #ebf8ff;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .info h3 {
            color: #2c5282;
            margin-bottom: 10px;
        }

        .info ul {
            margin-left: 20px;
            color: #2c5282;
        }

        .info li {
            margin-bottom: 5px;
        }

        .history {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 2px solid #e0e0e0;
        }

        .history h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .history-list {
            list-style: none;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: #f8f9fa;
            border-radius: 6px;
            margin-bottom: 8px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 14px;
        }

        .history-item button {
            padding: 5px 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .history-item button:hover {
            background: #5568d3;
        }

        @media (max-width: 768px) {
            .checkbox-group {
                grid-template-columns: 1fr;
            }

            .password-actions {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="../../index.html">← 返回首页</a>
            <h1>🔐 密码生成器</h1>
            <p>生成安全可靠的随机密码</p>
        </header>

        <div class="card">
            <div class="password-display">
                <div class="password-text" id="password">点击生成密码</div>
                <div class="password-actions">
                    <button class="btn btn-primary" onclick="generatePassword()">生成密码</button>
                    <button class="btn btn-success" onclick="copyPassword()">复制密码</button>
                </div>
            </div>

            <div class="strength-meter">
                <div class="strength-label">密码强度：<span id="strengthText">-</span></div>
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
            </div>

            <div class="options">
                <div class="option-group">
                    <label>密码长度：<span class="length-value" id="lengthValue">16</span></label>
                    <input type="range" class="length-slider" id="length" min="4" max="64" value="16" oninput="updateLength()">
                </div>

                <div class="option-group">
                    <label>字符类型：</label>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="checkbox" id="uppercase" checked> 大写字母 (A-Z)
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="lowercase" checked> 小写字母 (a-z)
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="numbers" checked> 数字 (0-9)
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="symbols" checked> 特殊符号 (!@#$...)
                        </label>
                    </div>
                </div>

                <div class="option-group">
                    <label>高级选项：</label>
                    <div class="checkbox-group">
                        <label class="checkbox-item">
                            <input type="checkbox" id="excludeAmbiguous"> 排除易混淆字符 (0,O,1,l)
                        </label>
                        <label class="checkbox-item">
                            <input type="checkbox" id="excludeSimilar"> 排除相似字符 (i,l,1,L,o,0)
                        </label>
                    </div>
                </div>
            </div>

            <div class="info">
                <h3>💡 密码安全建议</h3>
                <ul>
                    <li>使用至少 12 位以上的密码长度</li>
                    <li>混合使用大小写字母、数字和特殊符号</li>
                    <li>不要在不同网站使用相同的密码</li>
                    <li>定期更换重要账户的密码</li>
                    <li>使用密码管理器保存复杂密码</li>
                    <li>所有密码均在本地生成，不会上传服务器</li>
                </ul>
            </div>

            <div class="history" id="historySection" style="display: none;">
                <h3>📋 最近生成的密码</h3>
                <ul class="history-list" id="historyList"></ul>
            </div>
        </div>
    </div>

    <script>
        const passwordHistory = [];
        const MAX_HISTORY = 5;

        function updateLength() {
            document.getElementById('lengthValue').textContent = document.getElementById('length').value;
        }

        function generatePassword() {
            const length = parseInt(document.getElementById('length').value);
            const useUppercase = document.getElementById('uppercase').checked;
            const useLowercase = document.getElementById('lowercase').checked;
            const useNumbers = document.getElementById('numbers').checked;
            const useSymbols = document.getElementById('symbols').checked;
            const excludeAmbiguous = document.getElementById('excludeAmbiguous').checked;
            const excludeSimilar = document.getElementById('excludeSimilar').checked;

            let chars = '';
            if (useUppercase) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (useLowercase) chars += 'abcdefghijklmnopqrstuvwxyz';
            if (useNumbers) chars += '0123456789';
            if (useSymbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

            if (excludeAmbiguous || excludeSimilar) {
                chars = chars.replace(/[0O1lLi]/g, '');
            }

            if (chars === '') {
                alert('请至少选择一种字符类型！');
                return;
            }

            let password = '';
            const array = new Uint32Array(length);
            crypto.getRandomValues(array);

            for (let i = 0; i < length; i++) {
                password += chars[array[i] % chars.length];
            }

            document.getElementById('password').textContent = password;
            updateStrength(password);
            addToHistory(password);
        }

        function updateStrength(password) {
            let strength = 0;
            const length = password.length;

            if (length >= 8) strength++;
            if (length >= 12) strength++;
            if (length >= 16) strength++;

            if (/[a-z]/.test(password)) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            const strengthFill = document.getElementById('strengthFill');
            const strengthText = document.getElementById('strengthText');

            strengthFill.className = 'strength-fill';
            
            if (strength <= 3) {
                strengthFill.classList.add('weak');
                strengthText.textContent = '弱';
                strengthText.style.color = '#f56565';
            } else if (strength <= 5) {
                strengthFill.classList.add('fair');
                strengthText.textContent = '中等';
                strengthText.style.color = '#ed8936';
            } else if (strength <= 6) {
                strengthFill.classList.add('good');
                strengthText.textContent = '强';
                strengthText.style.color = '#d69e2e';
            } else {
                strengthFill.classList.add('strong');
                strengthText.textContent = '非常强';
                strengthText.style.color = '#48bb78';
            }
        }

        function copyPassword() {
            const password = document.getElementById('password').textContent;
            if (password && password !== '点击生成密码') {
                navigator.clipboard.writeText(password).then(() => {
                    const btn = document.querySelector('.btn-success');
                    const originalText = btn.textContent;
                    btn.textContent = '已复制！';
                    setTimeout(() => {
                        btn.textContent = originalText;
                    }, 2000);
                });
            }
        }

        function addToHistory(password) {
            passwordHistory.unshift(password);
            if (passwordHistory.length > MAX_HISTORY) {
                passwordHistory.pop();
            }

            const historySection = document.getElementById('historySection');
            const historyList = document.getElementById('historyList');

            historySection.style.display = 'block';
            historyList.innerHTML = '';

            passwordHistory.forEach((pwd, index) => {
                const li = document.createElement('li');
                li.className = 'history-item';
                li.innerHTML = `
                    <span>${pwd}</span>
                    <button onclick="copyHistoryPassword(${index})">复制</button>
                `;
                historyList.appendChild(li);
            });
        }

        function copyHistoryPassword(index) {
            navigator.clipboard.writeText(passwordHistory[index]).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '已复制！';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            });
        }

        // 页面加载时生成一个密码
        window.onload = generatePassword;
    </script>
</body>
</html>

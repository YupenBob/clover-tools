<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>颜色选择器 - CloverTools</title>
    <meta name="description" content="在线颜色选择器，支持 HEX/RGB/HSL 互转">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            padding: 20px 0 40px;
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        header a {
            color: white;
            text-decoration: none;
            opacity: 0.8;
        }

        header a:hover {
            opacity: 1;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .color-preview {
            width: 100%;
            height: 200px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 2px solid #e0e0e0;
            transition: background-color 0.3s;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
        }

        .input-row {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type="text"], input[type="color"] {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        input[type="color"] {
            width: 80px;
            height: 50px;
            padding: 5px;
            cursor: pointer;
        }

        input[type="text"] {
            flex: 1;
            min-width: 200px;
            font-family: 'Monaco', 'Menlo', monospace;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .result-card {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            position: relative;
        }

        .result-label {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .result-value {
            font-size: 1.2rem;
            font-weight: bold;
            font-family: 'Monaco', 'Menlo', monospace;
            color: #333;
            word-break: break-all;
        }

        .copy-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 6px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #5568d3;
        }

        .rgb-sliders {
            margin-bottom: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .slider-group:last-child {
            margin-bottom: 0;
        }

        .slider-group label {
            width: 50px;
            font-weight: 600;
        }

        .slider-group input[type="range"] {
            flex: 1;
            height: 8px;
            border-radius: 4px;
        }

        .slider-group span {
            width: 40px;
            text-align: right;
            font-family: 'Monaco', 'Menlo', monospace;
        }

        .info {
            padding: 20px;
            background: #ebf8ff;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .info h3 {
            color: #2c5282;
            margin-bottom: 10px;
        }

        .info ul {
            margin-left: 20px;
            color: #2c5282;
        }

        .info li {
            margin-bottom: 5px;
        }

        @media (max-width: 768px) {
            .input-row {
                flex-direction: column;
                align-items: stretch;
            }

            .results-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="../../index.html">← 返回首页</a>
            <h1>🎨 颜色选择器</h1>
            <p>支持 HEX/RGB/HSL 格式互转</p>
        </header>

        <div class="card">
            <div class="color-preview" id="colorPreview"></div>

            <div class="input-group">
                <label>选择颜色：</label>
                <div class="input-row">
                    <input type="color" id="colorPicker" value="#667eea" oninput="updateFromPicker()">
                    <input type="text" id="hexInput" value="#667EEA" onchange="updateFromHex()">
                </div>
            </div>

            <div class="rgb-sliders">
                <div class="slider-group">
                    <label style="color: #f56565;">R</label>
                    <input type="range" id="rSlider" min="0" max="255" value="102" oninput="updateFromRGB()">
                    <span id="rValue">102</span>
                </div>
                <div class="slider-group">
                    <label style="color: #48bb78;">G</label>
                    <input type="range" id="gSlider" min="0" max="255" value="126" oninput="updateFromRGB()">
                    <span id="gValue">126</span>
                </div>
                <div class="slider-group">
                    <label style="color: #4299e1;">B</label>
                    <input type="range" id="bSlider" min="0" max="255" value="234" oninput="updateFromRGB()">
                    <span id="bValue">234</span>
                </div>
            </div>

            <div class="results-grid">
                <div class="result-card">
                    <div class="result-label">HEX</div>
                    <div class="result-value" id="hexResult">#667EEA</div>
                    <button class="copy-btn" onclick="copy('hexResult')">复制</button>
                </div>
                <div class="result-card">
                    <div class="result-label">RGB</div>
                    <div class="result-value" id="rgbResult">rgb(102, 126, 234)</div>
                    <button class="copy-btn" onclick="copy('rgbResult')">复制</button>
                </div>
                <div class="result-card">
                    <div class="result-label">HSL</div>
                    <div class="result-value" id="hslResult">hsl(229, 76%, 66%)</div>
                    <button class="copy-btn" onclick="copy('hslResult')">复制</button>
                </div>
            </div>

            <div class="info">
                <h3>ℹ️ 颜色格式说明</h3>
                <ul>
                    <li><strong>HEX</strong>：十六进制颜色码，如 #667EEA，用于 CSS、设计</li>
                    <li><strong>RGB</strong>：红绿蓝三原色，如 rgb(102, 126, 234)，用于屏幕显示</li>
                    <li><strong>HSL</strong>：色相/饱和度/亮度，如 hsl(229, 76%, 66%)，更直观</li>
                    <li>所有处理均在本地完成，数据不会上传服务器</li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        function updateColor(hex, r, g, b) {
            // 更新预览
            document.getElementById('colorPreview').style.backgroundColor = hex;
            document.getElementById('colorPicker').value = hex;
            document.getElementById('hexInput').value = hex.toUpperCase();

            // 更新滑块
            document.getElementById('rSlider').value = r;
            document.getElementById('gSlider').value = g;
            document.getElementById('bSlider').value = b;
            document.getElementById('rValue').textContent = r;
            document.getElementById('gValue').textContent = g;
            document.getElementById('bValue').textContent = b;

            // 更新结果
            document.getElementById('hexResult').textContent = hex.toUpperCase();
            document.getElementById('rgbResult').textContent = `rgb(${r}, ${g}, ${b})`;
            
            const hsl = rgbToHsl(r, g, b);
            document.getElementById('hslResult').textContent = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
        }

        function updateFromPicker() {
            const hex = document.getElementById('colorPicker').value;
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            updateColor(hex, r, g, b);
        }

        function updateFromHex() {
            let hex = document.getElementById('hexInput').value.trim();
            if (!hex.startsWith('#')) {
                hex = '#' + hex;
            }
            if (/^#[0-9A-Fa-f]{6}$/.test(hex)) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                updateColor(hex, r, g, b);
            }
        }

        function updateFromRGB() {
            const r = parseInt(document.getElementById('rSlider').value);
            const g = parseInt(document.getElementById('gSlider').value);
            const b = parseInt(document.getElementById('bSlider').value);
            
            document.getElementById('rValue').textContent = r;
            document.getElementById('gValue').textContent = g;
            document.getElementById('bValue').textContent = b;

            const hex = '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
            updateColor(hex, r, g, b);
        }

        function rgbToHsl(r, g, b) {
            r /= 255;
            g /= 255;
            b /= 255;

            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            let h, s;
            const l = (max + min) / 2;

            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);

                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }

            return {
                h: Math.round(h * 360),
                s: Math.round(s * 100),
                l: Math.round(l * 100)
            };
        }

        function copy(elementId) {
            const text = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '已复制！';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            });
        }

        // 初始化
        updateFromPicker();
    </script>
</body>
</html>

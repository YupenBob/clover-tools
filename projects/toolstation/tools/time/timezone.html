<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时区转换器 - CloverTools</title>
    <link rel="stylesheet" href="../../styles/main.css">
    <style>
        .converter-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .timezone-card {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        .timezone-card h3 {
            margin: 0 0 10px;
            font-size: 16px;
            color: #888;
        }
        .timezone-select {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .timezone-select option {
            background: #1a1a2e;
            color: white;
        }
        .time-display {
            font-size: 32px;
            font-weight: bold;
            margin: 15px 0;
            font-family: 'Consolas', 'Monaco', monospace;
        }
        .date-display {
            font-size: 14px;
            color: #888;
        }
        .offset-display {
            font-size: 12px;
            color: #667eea;
            margin-top: 10px;
        }
        .world-clock {
            margin: 30px 0;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .world-clock h3 {
            margin: 0 0 20px;
        }
        .clock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .clock-item {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .clock-city {
            font-size: 14px;
            color: #888;
            margin-bottom: 8px;
        }
        .clock-time {
            font-size: 20px;
            font-weight: bold;
            font-family: 'Consolas', 'Monaco', monospace;
        }
        .clock-date {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        .input-group {
            margin: 20px 0;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }
        .input-group label {
            display: block;
            margin-bottom: 10px;
            color: #888;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 15px 0;
        }
        .refresh-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <header>
        <a href="../../">🏠 CloverTools</a>
        <nav>
            <a href="../../index.html#text">文本</a>
            <a href="../../index.html#json">JSON</a>
            <a href="../../index.html#encrypt">加密</a>
            <a href="../../index.html#time">时间</a>
            <a href="../../index.html#other">其他</a>
        </nav>
    </header>
    
    <main>
        <h1>🌍 时区转换器</h1>
        <p>转换不同时区的时间，支持全球主要城市</p>
        
        <div class="tool-container">
            <div class="input-group">
                <label>选择基准时间</label>
                <input type="datetime-local" id="baseTime">
            </div>
            
            <div class="converter-grid">
                <div class="timezone-card">
                    <h3>源时区</h3>
                    <select class="timezone-select" id="fromTimezone" onchange="convertTime()"></select>
                    <div class="time-display" id="fromTime">--:--:--</div>
                    <div class="date-display" id="fromDate">----</div>
                    <div class="offset-display" id="fromOffset">UTC+?</div>
                </div>
                
                <div class="timezone-card">
                    <h3>目标时区</h3>
                    <select class="timezone-select" id="toTimezone" onchange="convertTime()"></select>
                    <div class="time-display" id="toTime">--:--:--</div>
                    <div class="date-display" id="toDate">----</div>
                    <div class="offset-display" id="toOffset">UTC+?</div>
                </div>
            </div>
            
            <button class="refresh-btn" onclick="updateAllTimes()">🔄 刷新当前时间</button>
            
            <div class="world-clock">
                <h3>🌐 世界时钟</h3>
                <div class="clock-grid" id="worldClock"></div>
            </div>
        </div>
    </main>
    
    <script>
        const timezones = [
            { value: 'UTC', label: 'UTC (协调世界时)', city: 'UTC' },
            { value: 'Asia/Shanghai', label: '中国标准时间', city: '北京' },
            { value: 'Asia/Tokyo', label: '日本标准时间', city: '东京' },
            { value: 'Asia/Seoul', label: '韩国标准时间', city: '首尔' },
            { value: 'Asia/Singapore', label: '新加坡时间', city: '新加坡' },
            { value: 'Asia/Bangkok', label: '泰国时间', city: '曼谷' },
            { value: 'Asia/Dubai', label: '阿联酋时间', city: '迪拜' },
            { value: 'Europe/London', label: '格林威治时间', city: '伦敦' },
            { value: 'Europe/Paris', label: '中欧时间', city: '巴黎' },
            { value: 'Europe/Berlin', label: '德国时间', city: '柏林' },
            { value: 'Europe/Moscow', label: '莫斯科时间', city: '莫斯科' },
            { value: 'America/New_York', label: '美国东部时间', city: '纽约' },
            { value: 'America/Chicago', label: '美国中部时间', city: '芝加哥' },
            { value: 'America/Denver', label: '美国山地时间', city: '丹佛' },
            { value: 'America/Los_Angeles', label: '美国太平洋时间', city: '洛杉矶' },
            { value: 'America/Sao_Paulo', label: '巴西时间', city: '圣保罗' },
            { value: 'Australia/Sydney', label: '澳大利亚东部时间', city: '悉尼' },
            { value: 'Pacific/Auckland', label: '新西兰时间', city: '奥克兰' }
        ];
        
        function init() {
            // Set default time to now
            const now = new Date();
            const local = now.toISOString().slice(0, 16);
            document.getElementById('baseTime').value = local;
            
            // Populate timezone selects
            const fromSelect = document.getElementById('fromTimezone');
            const toSelect = document.getElementById('toTimezone');
            
            const localTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
            
            timezones.forEach(tz => {
                const option1 = new Option(tz.label, tz.value);
                const option2 = new Option(tz.label, tz.value);
                fromSelect.add(option1);
                toSelect.add(option2);
                
                if (tz.value === localTz) {
                    fromSelect.value = tz.value;
                }
            });
            
            // Default to Shanghai for "to"
            toSelect.value = 'Asia/Shanghai';
            
            // Build world clock
            buildWorldClock();
            
            // Initial conversion
            convertTime();
            
            // Update world clock every second
            setInterval(updateWorldClock, 1000);
        }
        
        function convertTime() {
            const baseTimeInput = document.getElementById('baseTime').value;
            const fromTz = document.getElementById('fromTimezone').value;
            const toTz = document.getElementById('toTimezone').value;
            
            if (!baseTimeInput) return;
            
            const baseDate = new Date(baseTimeInput);
            
            // Display from time
            displayTime(baseDate, fromTz, 'from');
            
            // Convert to target timezone
            const toTimeStr = baseDate.toLocaleString('en-US', { timeZone: toTz });
            const toDate = new Date(toTimeStr);
            
            // Adjust for the original time components
            const year = baseDate.getFullYear();
            const month = baseDate.getMonth();
            const day = baseDate.getDate();
            const hours = baseDate.getHours();
            const minutes = baseDate.getMinutes();
            
            // Calculate time difference
            const fromOffset = getTimezoneOffset(fromTz, baseDate);
            const toOffset = getTimezoneOffset(toTz, baseDate);
            const diffHours = toOffset - fromOffset;
            
            const convertedDate = new Date(baseDate.getTime() + diffHours * 60 * 60 * 1000);
            
            displayTime(convertedDate, toTz, 'to');
        }
        
        function displayTime(date, timezone, prefix) {
            const timeStr = date.toLocaleTimeString('zh-CN', { 
                timeZone: timezone,
                hour12: false 
            });
            const dateStr = date.toLocaleDateString('zh-CN', { 
                timeZone: timezone,
                year: 'numeric',
                month: 'long',
                day: 'numeric',
                weekday: 'long'
            });
            const offset = getOffsetString(timezone, date);
            
            document.getElementById(prefix + 'Time').textContent = timeStr;
            document.getElementById(prefix + 'Date').textContent = dateStr;
            document.getElementById(prefix + 'Offset').textContent = offset;
        }
        
        function getTimezoneOffset(timezone, date) {
            const tzStr = date.toLocaleString('en-US', { timeZone: timezone, timeZoneName: 'longOffset' });
            const match = tzStr.match(/GMT([+-]\d+)/);
            if (match) {
                return parseInt(match[1]);
            }
            // Fallback: calculate offset
            const localStr = date.toLocaleString('en-US', { timeZone: timezone });
            const localDate = new Date(localStr);
            const utcDate = new Date(date.toLocaleString('en-US', { timeZone: 'UTC' }));
            return (localDate - utcDate) / (1000 * 60 * 60);
        }
        
        function getOffsetString(timezone, date) {
            const offset = getTimezoneOffset(timezone, date);
            const sign = offset >= 0 ? '+' : '';
            const hours = Math.floor(Math.abs(offset));
            const minutes = (Math.abs(offset) % 1) * 60;
            return `UTC${sign}${offset}${minutes > 0 ? ':' + minutes.toString().padStart(2, '0') : ''}`;
        }
        
        function buildWorldClock() {
            const container = document.getElementById('worldClock');
            container.innerHTML = '';
            
            timezones.forEach(tz => {
                const div = document.createElement('div');
                div.className = 'clock-item';
                div.id = 'clock-' + tz.value.replace(/\//g, '-');
                div.innerHTML = `
                    <div class="clock-city">${tz.city}</div>
                    <div class="clock-time" id="time-${tz.value.replace(/\//g, '-')}">--:--</div>
                    <div class="clock-date" id="date-${tz.value.replace(/\//g, '-')}">--/--</div>
                `;
                container.appendChild(div);
            });
        }
        
        function updateWorldClock() {
            const now = new Date();
            
            timezones.forEach(tz => {
                const timeId = 'time-' + tz.value.replace(/\//g, '-');
                const dateId = 'date-' + tz.value.replace(/\//g, '-');
                
                const timeStr = now.toLocaleTimeString('zh-CN', { 
                    timeZone: tz.value,
                    hour: '2-digit',
                    minute: '2-digit'
                });
                const dateStr = now.toLocaleDateString('zh-CN', { 
                    timeZone: tz.value,
                    month: 'short',
                    day: 'numeric'
                });
                
                const timeEl = document.getElementById(timeId);
                const dateEl = document.getElementById(dateId);
                
                if (timeEl) timeEl.textContent = timeStr;
                if (dateEl) dateEl.textContent = dateStr;
            });
        }
        
        function updateAllTimes() {
            const now = new Date();
            const local = now.toISOString().slice(0, 16);
            document.getElementById('baseTime').value = local;
            convertTime();
        }
        
        // Initialize on load
        init();
    </script>
</body>
</html>

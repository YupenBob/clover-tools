  <script>
    CT.initTheme();

    CT.initKeyboardShortcuts();

    // Share: copy current URL to clipboard
    document.getElementById("shareBtn").onclick = function() { navigator.clipboard.writeText(window.location.href).then(function() { CT.showToast("\u94fe\u63a5\u5df2\u590d\u5236\uff01"); }).catch(function() { CT.showToast("\u590d\u5236\u5931\u8d25"); }); };

    function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
var KW=['SELECT','FROM','WHERE','AND','OR','JOIN','LEFT','RIGHT','INNER','OUTER','FULL','CROSS','ON','AS','ORDER','BY','GROUP','HAVING','LIMIT','OFFSET','INSERT','INTO','VALUES','UPDATE','SET','DELETE','CREATE','TABLE','ALTER','DROP','INDEX','PRIMARY','KEY','FOREIGN','REFERENCES','UNIQUE','NOT','NULL','DEFAULT','DISTINCT','COUNT','SUM','AVG','MAX','MIN','IN','LIKE','BETWEEN','EXISTS','CASE','WHEN','THEN','ELSE','END','UNION','ALL','ASC','DESC','VIEW','TRUNCATE'];var KW_SET=new Set(KW);
function formatSql(sql,compress){if(!sql||!sql.trim())return'';var s=sql.trim(),lit=false,out='',i=0,ch,buf='';function flushBuf(){if(!buf)return;var up=buf.toUpperCase();if(KW_SET.has(up)&&!lit)out+=up;else out+=buf;buf='';}for(;i<s.length;i++){ch=s[i];if(ch==="'"&&(i===0||s[i-1]!=='\\')){lit=!lit;buf+=ch;}else if(lit){buf+=ch;}else if(/[\s,;()]/ .test(ch)){flushBuf();out+=ch;if(ch===';'||ch===',')out+='\n';}else{buf+=ch;}}flushBuf();var lines=out.split('\n').filter(function(l){return l.trim();});if(compress){return lines.join(' ').replace(/\s+/g,' ').replace(/\s*,\s*/g,', ').replace(/\s*;\s*/g,';').trim();}var kwMap={'SELECT':2,'FROM':2,'WHERE':2,'JOIN':2,'LEFT JOIN':2,'RIGHT JOIN':2,'INNER JOIN':2,'ON':4,'AND':4,'OR':4,'ORDER BY':2,'GROUP BY':2,'HAVING':2,'LIMIT':2,'OFFSET':2,'INSERT INTO':2,'VALUES':2,'UPDATE':2,'SET':4,'DELETE FROM':2};var result=[],indent=0;lines.forEach(function(l){var trimmed=l.trim();if(!trimmed)return;var up=trimmed.toUpperCase();var dedent=false;if(up.startsWith('FROM')&&indent>0)dedent=true;if(up.startsWith('ORDER BY')||up.startsWith('GROUP BY')||up.startsWith('LIMIT')||up.startsWith('OFFSET'))dedent=true;if(up.startsWith('UNION')||up.startsWith('ELSE')||up.startsWith('END'))indent=Math.max(0,indent-2);if(dedent)indent=Math.max(0,indent-2);result.push('  '.repeat(indent/2)+trimmed);for(var k in kwMap){if(up.startsWith(k+' ')){indent+=kwMap[k];break;}}});return result.join('\n');}
document.getElementById('formatBtn').onclick=function(){document.getElementById('outputSql').value=formatSql(document.getElementById('inputSql').value,false);};
document.getElementById('compressBtn').onclick=function(){document.getElementById('outputSql').value=formatSql(document.getElementById('inputSql').value,true);};
document.getElementById('clearBtn').onclick=function(){document.getElementById('inputSql').value='';document.getElementById('outputSql').value='';};
document.getElementById('copySql').onclick=function(){copyToClipboard(document.getElementById('outputSql').value);if(window.CT&&CT.showToast)CT.showToast('已复制');};
  </script>

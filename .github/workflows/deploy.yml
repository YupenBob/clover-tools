name: Deploy to Vercel

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'tools.json'
      - 'generator.js'
      - 'template/**'
      - 'templates/**'
      - 'keywords.json'
      - 'public/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate static files
        run: node generator.js

      - name: Deploy to Vercel
        run: npx vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

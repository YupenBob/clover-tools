  <style>
    .page-body { padding: 2.5rem 0 4rem; }
    .breadcrumb { font-size: 0.85rem; opacity: 0.6; margin-bottom: 0.5rem; }
    .breadcrumb a { color: var(--primary); text-decoration: none; }
    .nav-icon { width: 1.1rem; height: 1.1rem; vertical-align: middle; margin-right: 0.25rem; }
    .nav-icon-link { display: inline-flex !important; align-items: center; gap: 0.1rem; }
    .nav-icon-link span { font-size: 0.9rem; }
    .share-icon { width: 1rem; height: 1rem; vertical-align: middle; margin-right: 0.25rem; }

    .tool-card { background: var(--card-bg); border-radius: var(--radius); padding: 1.75rem; box-shadow: var(--card-shadow); margin-bottom: 1.5rem; }
    .section-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 0.6rem; opacity: 0.8; }
    .form-row { display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end; }
    .field { flex: 1; min-width: 140px; }
    .field label { display: block; font-size: 0.82rem; margin-bottom: 0.35rem; opacity: 0.7; }
    .field select, .field input { width: 100%; padding: 0.55rem; font-size: 0.92rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); }
    .field select:focus, .field input:focus { outline: 2px solid var(--primary); border-color: transparent; }
    textarea { width: 100%; min-height: 90px; padding: 0.6rem; font-size: 0.95rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-family: monospace; resize: vertical; }
    textarea:focus { outline: 2px solid var(--primary); border-color: transparent; }
    .btn { padding: 0.55rem 1.2rem; font-size: 0.92rem; font-weight: 600; border: none; border-radius: 6px; cursor: pointer; transition: opacity 0.2s; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary { background: var(--bg-secondary); color: var(--text); }
    .btn-secondary:hover { opacity: 0.8; }
    .btn-group { display: flex; gap: 0.75rem; margin-top: 1rem; flex-wrap: wrap; }

    .qr-preview { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; min-height: 280px; }
    .qr-preview canvas { max-width: 100%; }

    .qr-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-secondary); opacity: 0.5; font-size: 0.95rem; padding: 2rem; border: 2px dashed var(--border); border-radius: 12px; text-align: center; }
    .qr-placeholder-icon { font-size: 3rem; margin-bottom: 0.5rem; }

    .color-row { display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
    .color-row input[type="color"] { width: 48px; height: 36px; border: 1px solid var(--border); border-radius: 6px; cursor: pointer; padding: 2px; background: var(--bg); }
    .error-msg { color: var(--primary); font-size: 0.88rem; margin-top: 0.5rem; }
  </style>
  <script src="https://cdn.counter.dev/script.js" data-id="4e8cb07b-485c-4bc4-a3d0-c2839c943037" data-utcoffset="8"></script>
</head>
<body>
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <symbol id="icon-home" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></symbol>
    <symbol id="icon-github" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></symbol>
    <symbol id="icon-share" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="13"/></symbol>
    <symbol id="icon-sun" viewBox="0 0 24 24" fill="currentColor"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1z"/></symbol>
    <symbol id="icon-moon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/></symbol>
    <symbol id="icon-info" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></symbol>
  </svg>

  <header class="site-header">
    <div class="container">
      <a href="/" class="site-logo">CloverTools</a>
      <nav class="site-nav site-nav-desktop">
        <a href="/" class="nav-icon-link" title="工具首页"><svg class="nav-icon" aria-hidden="true"><use href="#icon-home"/></svg><span>工具</span></a>
        <a href="https://github.com/YupenBob/clover-tools" target="_blank" class="nav-icon-link" title="GitHub"><svg class="nav-icon" aria-hidden="true"><use href="#icon-github"/></svg><span>GitHub</span></a>
        <button class="theme-toggle" id="themeToggle" title="切换主题"><svg class="icon-sun" style="display:none"><use href="#icon-sun"/></svg><svg class="icon-moon"><use href="#icon-moon"/></svg></button>
      </nav>
    </div>
  </header>

  <main class="page-body">
    <div class="container">
      <div class="breadcrumb"><a href="/">← 返回工具箱</a></div>
      <div class="tool-header">
        <h1>二维码生成器</h1>
        <p class="description">输入文本或URL，一键生成高清二维码，可自定义尺寸、颜色与纠错级别</p>
      </div>

      <div class="tool-layout">
        <div class="tool-card">
          <div class="section-title">输入内容</div>
          <textarea id="qrContent" placeholder="输入二维码内容，如：https://example.com 或 13800138000"></textarea>
          <div class="error-msg" id="errorMsg" style="display:none;"></div>

          <div class="form-row" style="margin-top:1rem;">
            <div class="field">
              <label>尺寸 (px)</label>
              <select id="qrSize">
                <option value="128">128×128</option>
                <option value="256" selected>256×256</option>
                <option value="512">512×512</option>
              </select>
            </div>
            <div class="field">
              <label>纠错级别</label>
              <select id="qrError">
                <option value="L">L (7%)</option>
                <option value="M" selected>M (15%)</option>
                <option value="Q">Q (25%)</option>
                <option value="H">H (30%)</option>
              </select>
            </div>
          </div>

          <div class="color-row" style="margin-top:0.75rem;">
            <div class="field" style="flex:0 0 auto;">
              <label>前景色</label>
              <input type="color" id="qrFgColor" value="#000000">
            </div>
            <div class="field" style="flex:0 0 auto;">
              <label>背景色</label>
              <input type="color" id="qrBgColor" value="#ffffff">
            </div>
            <div style="flex:1;" class="field">
              <label>&nbsp;</label>
              <button class="btn btn-secondary" id="btnResetColor" style="padding:0.5rem 0.8rem; font-size:0.82rem;">重置颜色</button>
            </div>
          </div>

          <div class="btn-group">
            <button class="btn btn-primary" id="btnGenerate">⚡ 生成二维码</button>
          </div>
        </div>

        <div class="tool-card">
          <div class="section-title">二维码预览</div>
          <div class="qr-preview" id="qrPreview">
            <div class="qr-placeholder">
              <div class="qr-placeholder-icon">⬜</div>
              <div>输入内容后点击「生成二维码」</div>
            </div>
          </div>
          <div class="btn-group" id="downloadGroup" style="display:none; justify-content:center;">
            <button class="btn btn-primary" id="btnDownload">📥 下载 PNG</button>
            <button class="btn btn-secondary" id="btnCopyQR">📋 复制图片</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <button class="share-btn" id="shareBtn" title="分享此工具"><svg class="share-icon" aria-hidden="true"><use href="#icon-share"/></svg>分享</button>
  <footer class="site-footer">
    <div class="site-footer-inner">
      <p style="margin:0;">Made with 🍀 by Clover · Open Source · No tracking · No server</p>
    </div>
  </footer>
  <div id="toast"></div>

  <script>
  CT.initTheme();
  CT.initKeyboardShortcuts();
  CT.initReveal();
  CT.initCopyPulse();
  document.getElementById('shareBtn').onclick = function() { navigator.clipboard.writeText(window.location.href).then(function() { CT.showToast('链接已复制！'); }).catch(function() { CT.showToast('复制失败'); }); };

  var lastCanvas = null;

  function showError(msg) {
    var el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function clearError() { document.getElementById('errorMsg').style.display = 'none'; }

  function generateQR() {
    clearError();
    var content = document.getElementById('qrContent').value.trim();
    if (!content) { showError('请输入二维码内容'); return; }

    var size = parseInt(document.getElementById('qrSize').value);
    var errorLevel = document.getElementById('qrError').value;
    var fgColor = document.getElementById('qrFgColor').value;
    var bgColor = document.getElementById('qrBgColor').value;

    var preview = document.getElementById('qrPreview');
    preview.innerHTML = '<div style="font-size:1.2rem;color:var(--text-secondary);">⏳ 生成中...</div>';

    try {
      QRCode.toCanvas(content, {
        width: size,
        errorCorrectionLevel: errorLevel,
        color: { dark: fgColor, light: bgColor }
      }, function(error, canvas) {
        if (error) {
          showError('生成失败：' + error.message);
          preview.innerHTML = '<div class="qr-placeholder"><div class="qr-placeholder-icon">⬜</div><div>输入内容后点击「生成二维码」</div></div>';
          return;
        }
        lastCanvas = canvas;
        preview.innerHTML = '';
        preview.appendChild(canvas);
        document.getElementById('downloadGroup').style.display = 'flex';
      });
    } catch (e) {
      showError('生成失败：' + e.message);
    }
  }

  function downloadPNG() {
    if (!lastCanvas) return;
    var url = lastCanvas.toDataURL('image/png');
    var a = document.createElement('a');
    a.href = url;
    a.download = 'qrcode-' + Date.now() + '.png';
    a.click();
  }

  function copyImage() {
    if (!lastCanvas) return;
    lastCanvas.toBlob(function(blob) {
      navigator.clipboard.write([
        new ClipboardItem({ 'image/png': blob })
      ]).then(function() {
        CT.showToast('图片已复制到剪贴板！');
      }).catch(function() {
        CT.showToast('复制失败，请右键保存图片');
      });
    });
  }

  document.getElementById('btnGenerate').addEventListener('click', generateQR);
  document.getElementById('btnDownload').addEventListener('click', downloadPNG);
  document.getElementById('btnCopyQR').addEventListener('click', copyImage);
  document.getElementById('btnResetColor').addEventListener('click', function() {
    document.getElementById('qrFgColor').value = '#000000';
    document.getElementById('qrBgColor').value = '#ffffff';
  });

  // Enter key to generate
  document.getElementById('qrContent').addEventListener('keydown', function(e) {
    if (e.ctrlKey && e.key === 'Enter') generateQR();
  });
  </script>
</body>
</html>

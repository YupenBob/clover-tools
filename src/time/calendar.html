    .year-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }

    .months-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
    .month-block { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .month-header { background: var(--primary); color: #fff; text-align: center; padding: 0.5rem; font-weight: 600; font-size: 0.95rem; }
    .month-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
    .month-table th { background: var(--bg-secondary); padding: 0.35rem; font-weight: 600; border-bottom: 1px solid var(--border); color: var(--text-secondary); }
    .month-table td { padding: 0.25rem 0.3rem; text-align: center; border-bottom: 1px solid var(--border); vertical-align: top; min-height: 44px; cursor: pointer; transition: background 0.15s; }
    .month-table td:hover { background: var(--bg-secondary); }
    .month-table tr:last-child td { border-bottom: none; }
    .date-num { font-weight: 600; display: block; }
    .lunar-char { font-size: 0.68rem; color: var(--text-secondary); display: block; line-height: 1.2; }
    .today-mark { background: rgba(199,0,57,0.12); border-radius: 50%; width: 24px; height: 24px; display: inline-flex; align-items: center; justify-content: center; }
    .holiday-mark { color: var(--primary); font-weight: 600; }
    .weekend-day { color: var(--text-secondary); }
    .today-header { color: var(--primary); }

    .detail-panel { background: var(--card-bg); border-radius: var(--radius); padding: 1.25rem; box-shadow: var(--card-shadow); }
    .detail-panel h3 { font-size: 1.1rem; margin-bottom: 0.75rem; }
    .detail-row { display: flex; gap: 1rem; padding: 0.5rem 0; border-bottom: 1px solid var(--border); }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { font-size: 0.85rem; color: var(--text-secondary); min-width: 80px; }
    .detail-value { font-weight: 600; }

    @media (max-width: 600px) {
      .months-grid { grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    }
    @media (max-width: 400px) {
      .months-grid { grid-template-columns: 1fr; }
    }
  </style>

  <script>
  CT.initTheme();
  CT.initKeyboardShortcuts();
  document.getElementById('shareBtn').onclick = function() { navigator.clipboard.writeText(window.location.href).then(function() { CT.showToast('链接已复制！'); }).catch(function() { CT.showToast('复制失败'); }); };

  var MONTHS_CN = ['正月','二月','三月','四月','五月','六月','七月','八月','九月','十月','冬月','腊月'];
  var DAYS_CN = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
    '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
    '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
  var WEEKDAY_CN = ['周日','周一','周二','周三','周四','周五','周六'];
  var WEEKDAY_FULL = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];

  // Solar → Lunar (simplified from lunar-solar-converter.html)
  function solarToLunar(date) {
    var y = date.getFullYear();
    var yd = LUNAR_DATA[String(y)];
    if (!yd) return null;
    var sp = yd.start.split('-');
    var lunarYearStart = new Date(parseInt(sp[0]), parseInt(sp[1]) - 1, parseInt(sp[2]));
    var totalDays = Math.floor((date - lunarYearStart) / 86400000) + 1;
    var days = yd.days;
    var leap = yd.leap;
    var isLeap = false;
    var monthIdx = 0;
    for (var i = 0; i < days.length; i++) {
      var mDays = days[i];
      if (isLeap) {
        if (totalDays <= mDays) return { year: y, month: monthIdx, day: totalDays, isLeap: true };
        totalDays -= mDays;
        isLeap = false;
        monthIdx++;
      } else {
        if (leap > 0 && monthIdx + 1 === leap && !isLeap) {
          if (totalDays <= mDays) return { year: y, month: monthIdx + 1, day: totalDays, isLeap: false };
          totalDays -= mDays;
          isLeap = true;
        } else {
          if (totalDays <= mDays) return { year: y, month: monthIdx + 1, day: totalDays, isLeap: false };
          totalDays -= mDays;
          monthIdx++;
        }
      }
    }
    return null;
  }

  var currentYear = new Date().getFullYear();

  function formatLunarDate(lr) {
    if (!lr) return '';
    var leapStr = lr.isLeap ? '（闰）' : '';
    return lr.year + '年 ' + MONTHS_CN[lr.month - 1] + leapStr + ' ' + DAYS_CN[lr.day - 1];
  }

  var HOLIDAYS = {
    '01-01': '元旦', '02-14': '情人节', '03-08': '妇女节', '03-12': '植树节',
    '04-01': '愚人节', '04-05': '清明节', '05-01': '劳动节', '05-04': '青年节',
    '06-01': '儿童节', '06-18': '端午节', '07-01': '建党节', '08-01': '建军节',
    '09-10': '教师节', '10-01': '国庆节', '10-31': '万圣节',
    '11-11': '双十一', '12-24': '平安夜', '12-25': '圣诞节', '12-31': '跨年夜'
  };

  function getHoliday(mm, dd) {
    var key = mm + '-' + (dd < 10 ? '0' + dd : '' + dd);
    return HOLIDAYS[key] || null;
  }

  function isWeekend(y, m, d) {
    var wd = new Date(y, m - 1, d).getDay();
    return wd === 0 || wd === 6;
  }

  function buildCalendar(year) {
    document.getElementById('yearDisplay').textContent = year + ' 年';

    var grid = document.getElementById('monthsGrid');
    var html = '';
    for (var month = 1; month <= 12; month++) {
      var firstDay = new Date(year, month - 1, 1).getDay();
      var daysInMonth = new Date(year, month, 0).getDate();

      html += '<div class="month-block"><div class="month-header">' + month + ' 月</div>';
      html += '<table class="month-table"><thead><tr>';
      ['日','一','二','三','四','五','六'].forEach(function(w) {
        html += '<th>' + w + '</th>';
      });
      html += '</tr></thead><tbody><tr>';

      // Pad empty cells
      for (var i = 0; i < firstDay; i++) html += '<td></td>';

      for (var day = 1; day <= daysInMonth; day++) {
        var wd = new Date(year, month - 1, day).getDay();
        if (wd === 0 && day !== 1) html += '</tr><tr>';

        var isToday = (year === new Date().getFullYear() && month === new Date().getMonth() + 1 && day === new Date().getDate());
        var isHoliday = getHoliday(month, day);
        var isWeekendDay = isWeekend(year, month, day);
        var lr = null;
        try { lr = solarToLunar(new Date(year, month - 1, day)); } catch(e) {}

        var cellClass = '';
        if (isToday) cellClass += ' today-header';
        if (isWeekendDay && !isHoliday) cellClass += ' weekend-day';
        if (isHoliday) cellClass += ' holiday-mark';

        var todayClass = isToday ? ' today-mark' : '';
        var lunarStr = lr ? DAYS_CN[lr.day - 1] : '';
        if (lr && lr.isLeap) lunarStr = '闰' + lunarStr;

        var clickHandler = "showDetail(" + year + "," + month + "," + day + ")";

        html += '<td class="' + cellClass + '" onclick="' + clickHandler + '">';
        html += '<span class="date-num' + todayClass + '">' + day + '</span>';
        if (lunarStr) html += '<span class="lunar-char">' + lunarStr + '</span>';
        html += '</td>';
      }

      // Fill remaining cells
      var totalCells = firstDay + daysInMonth;
      var remaining = 7 - (totalCells % 7);
      if (remaining < 7) {
        for (var j = 0; j < remaining; j++) html += '<td></td>';
      }
      html += '</tr></tbody></table></div>';
    }
    grid.innerHTML = html;
  }

  function showDetail(year, month, day) {
    var date = new Date(year, month - 1, day);
    var weekday = WEEKDAY_FULL[date.getDay()];
    var holiday = getHoliday(month, day);
    var lr = null;
    try { lr = solarToLunar(date); } catch(e) {}

    document.getElementById('detailTitle').textContent = year + '年' + month + '月' + day + '日 详情';
    document.getElementById('detailSolar').textContent = year + '年' + month + '月' + day + '日';
    document.getElementById('detailLunar').textContent = lr ? formatLunarDate(lr) : '（超出农历数据范围）';
    document.getElementById('detailWeekday').textContent = weekday;

    var holidayRow = document.getElementById('detailHolidayRow');
    if (holiday) {
      document.getElementById('detailHoliday').textContent = holiday;
      holidayRow.style.display = 'flex';
    } else {
      holidayRow.style.display = 'none';
    }

    document.getElementById('detailPanel').style.display = 'block';
  }

  document.getElementById('btnPrev').addEventListener('click', function() {
    if (currentYear > 1900) { currentYear--; buildCalendar(currentYear); }
  });
  document.getElementById('btnNext').addEventListener('click', function() {
    if (currentYear < 2100) { currentYear++; buildCalendar(currentYear); }
  });

  buildCalendar(currentYear);
  </script>

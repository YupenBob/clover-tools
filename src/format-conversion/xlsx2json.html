  <header class="site-header">

  <main class="page-body">
    <div class="container">
      <div class="breadcrumb"><a href="/">← 返回工具箱</a></div>
      <div class="tool-header">
        <h1>XLSX 转 JSON</h1>
        <p class="description">将Excel文件（.xlsx/.xls）转换为JSON格式，纯浏览器本地处理，保护数据隐私</p>
      </div>

      <div class="tool-layout">
        <div class="tool-card">
          <div class="info-box">
            <strong>隐私说明：</strong>文件仅在本地浏览器处理，不会上传到任何服务器。
          </div>

          <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📁</div>
            <div class="upload-text">点击选择文件，或拖拽文件到此处<br><strong>支持 .xlsx / .xls 格式</strong></div>
          </div>
          <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">

          <div id="fileInfo" class="file-info" style="display:none;">
            <span class="file-icon">📊</span>
            <div class="file-details">
              <div class="file-name" id="fileName"></div>
              <div class="file-meta" id="fileMeta"></div>
            </div>
          </div>

          <div class="sheet-tabs" id="sheetTabs" style="display:none;"></div>

          <div class="field" style="display:none;" id="headerRowField">
            <label>标题行（第几行作为JSON键名，留空则使用列字母 A/B/C）</label>
            <input type="number" id="headerRow" value="1" min="1" placeholder="1">
          </div>

          <div class="btn-group">
            <button class="btn btn-primary" id="btnConvert">⚡ 转换为 JSON</button>
            <button class="btn btn-secondary" id="btnDownload" style="display:none;">📥 下载 JSON 文件</button>
          </div>

          <div class="error-msg" id="errorMsg" style="display:none;"></div>
        </div>

        <div class="tool-card" id="outputCard" style="display:none;">
          <div class="section-title">JSON 预览（前 20 条）</div>
          <textarea id="outputJson" readonly></textarea>
          <div class="btn-group">
            <button class="btn btn-secondary" id="btnCopyJson">📋 复制 JSON</button>
            <button class="btn btn-secondary" id="btnClearFile">🗑 清空文件</button>
          </div>
          <div id="statsInfo" style="font-size:0.82rem; opacity:0.6; margin-top:0.5rem;"></div>
        </div>
      </div>
    </div>
  </main>

  <button class="share-btn" id="shareBtn" title="分享此工具"><svg class="share-icon" aria-hidden="true"><use href="#icon-share"/></svg>分享</button>
  <footer class="site-footer">
    <div class="site-footer-inner">
      <p style="margin:0;">Made with 🍀 by Clover · Open Source · No tracking · No server</p>
    </div>
  </footer>
  <div id="toast"></div>

  <script>
  CT.initTheme();
  CT.initKeyboardShortcuts();
  CT.initReveal();
  CT.initCopyPulse();
  document.getElementById('shareBtn').onclick = function() { navigator.clipboard.writeText(window.location.href).then(function() { CT.showToast('链接已复制！'); }).catch(function() { CT.showToast('复制失败'); }); };

  var workbook = null;
  var currentSheet = null;
  var jsonData = null;

  function showError(msg) {
    var el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }
  function clearError() { document.getElementById('errorMsg').style.display = 'none'; }

  function handleFile(file) {
    clearError();
    if (!file) return;

    var ext = file.name.split('.').pop().toLowerCase();
    if (!['xlsx', 'xls', 'csv'].includes(ext)) {
      showError('不支持的文件格式，请上传 .xlsx、.xls 或 .csv 文件');
      return;
    }

    var reader = new FileReader();
    reader.onload = function(e) {
      try {
        var data = new Uint8Array(e.target.result);
        workbook = XLSX.read(data, { type: 'array', cellDates: true });
        currentSheet = workbook.SheetNames[0];

        document.getElementById('fileName').textContent = file.name;
        document.getElementById('fileMeta').textContent = file.name.endsWith('.csv') ? 'CSV文件' : 'Excel文件 (' + workbook.SheetNames.length + ' 个工作表)';
        document.getElementById('fileInfo').style.display = 'flex';
        document.getElementById('headerRowField').style.display = 'block';

        // Build sheet tabs
        var tabsEl = document.getElementById('sheetTabs');
        tabsEl.style.display = 'flex';
        tabsEl.innerHTML = workbook.SheetNames.map(function(name, i) {
          var active = name === currentSheet ? 'active' : '';
          return '<button class="sheet-tab ' + active + '" onclick="selectSheet(\'' + name.replace(/'/g, "\\'") + '\')">' + name + '</button>';
        }).join('');

        document.getElementById('outputCard').style.display = 'none';
        document.getElementById('btnDownload').style.display = 'none';

      } catch (err) {
        showError('文件解析失败：' + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function selectSheet(name) {
    currentSheet = name;
    document.querySelectorAll('.sheet-tab').forEach(function(tab) {
      tab.classList.toggle('active', tab.textContent === name);
    });
  }

  function convertToJson() {
    clearError();
    if (!workbook || !currentSheet) {
      showError('请先上传文件');
      return;
    }

    try {
      var sheet = workbook.Sheets[currentSheet];
      var headerRow = parseInt(document.getElementById('headerRow').value) || 1;
      var json = XLSX.utils.sheet_to_json(sheet, {
        header: headerRow,
        defval: '',
        raw: false
      });

      // If header is a number, use range header
      if (typeof json[0] === 'number') {
        json = XLSX.utils.sheet_to_json(sheet, { defval: '', raw: false });
      }

      // Check if first row is header-like
      var firstRow = json[0] || {};
      var keys = Object.keys(firstRow);
      var isHeaderRow = keys.some(function(k) { return /^[A-Z]+$/i.test(String(k)); });

      if (isHeaderRow && headerRow >= 1) {
        // Use first row as header
        var opts = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '', raw: false });
        var headers = opts[headerRow - 1] || [];
        json = XLSX.utils.sheet_to_json(sheet, { header: headers, defval: '', raw: false });
      }

      jsonData = json;
      var jsonStr = JSON.stringify(json, null, 2);
      var preview = json.slice(0, 20);
      var previewStr = JSON.stringify(preview, null, 2);

      document.getElementById('outputJson').value = previewStr + (json.length > 20 ? '\n\n... 共 ' + json.length + ' 行，仅显示前 20 条' : '');
      document.getElementById('outputCard').style.display = 'block';
      document.getElementById('btnDownload').style.display = 'inline-block';
      document.getElementById('statsInfo').textContent = '共 ' + json.length + ' 条记录，' + (keys.length || Object.keys(json[0]||{}).length) + ' 个字段';

    } catch (err) {
      showError('转换失败：' + err.message);
    }
  }

  function downloadJson() {
    if (!jsonData) return;
    var blob = new Blob([JSON.stringify(jsonData, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'converted.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  // Drag and drop
  var zone = document.getElementById('uploadZone');
  zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('dragover'); });
  zone.addEventListener('dragleave', function() { zone.classList.remove('dragover'); });
  zone.addEventListener('drop', function(e) {
    e.preventDefault();
    zone.classList.remove('dragover');
    var file = e.dataTransfer.files[0];
    handleFile(file);
  });

  document.getElementById('fileInput').addEventListener('change', function() {
    handleFile(this.files[0]);
  });

  document.getElementById('btnConvert').addEventListener('click', convertToJson);
  document.getElementById('btnDownload').addEventListener('click', downloadJson);
  document.getElementById('btnCopyJson').addEventListener('click', function() {
    var text = JSON.stringify(jsonData, null, 2);
    navigator.clipboard.writeText(text).then(function() { CT.showToast('JSON已复制！'); }).catch(function() { CT.showToast('复制失败'); });
  });
  document.getElementById('btnClearFile').addEventListener('click', function() {
    workbook = null;
    jsonData = null;
    currentSheet = null;
    document.getElementById('fileInput').value = '';
    document.getElementById('fileInfo').style.display = 'none';
    document.getElementById('sheetTabs').style.display = 'none';
    document.getElementById('outputCard').style.display = 'none';
    document.getElementById('btnDownload').style.display = 'none';
    clearError();
  });
  </script>
</body>

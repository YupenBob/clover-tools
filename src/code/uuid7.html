      <div class="tool-layout">
        <div class="tool-card">
          <div class="info-box">
            <strong>UUID v7 格式说明</strong><br>
            UUIDv7 = 48位时间戳（毫秒） + 16位随机数 + 64位随机数<br>
            示例：<code>0191a2b3-c800-7xxx-xxxx-xxxxxxxxxxxx</code>
            <br>时间部分（<code>0191a2b3-c800</code>）可直接提取Unix毫秒时间戳。
          </div>

          <div class="field">
            <label>自定义时间戳（可选，留空则使用当前时间）</label>
            <input type="datetime-local" id="customTime">
          </div>

          <div class="btn-group">
            <button class="btn btn-primary" id="btnGenerate">🎲 生成 UUID v7</button>
            <button class="btn btn-secondary" id="btnBatch">📦 批量生成</button>
          </div>
        </div>

        <div class="tool-card">
          <div class="section-title">生成结果</div>
          <div class="result-display" id="resultDisplay" title="点击复制" onclick="copyResult()">点击「生成」获取 UUID v7</div>
          <div class="btn-group">
            <button class="btn btn-secondary" id="btnCopy">📋 复制</button>
            <button class="btn btn-secondary" id="btnClearHistory">🗑 清空历史</button>
          </div>
        </div>

        <div class="tool-card" id="historyCard" style="display:none;">

  <script>
  CT.initTheme();
  CT.initKeyboardShortcuts();
  document.getElementById('shareBtn').onclick = function() { navigator.clipboard.writeText(window.location.href).then(function() { CT.showToast('链接已复制！'); }).catch(function() { CT.showToast('复制失败'); }); };

  var history = [];

  function getRand12() {
    var arr = new Uint8Array(12);
    crypto.getRandomValues(arr);
    return Array.from(arr).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
  }
  function getRand8() {
    var arr = new Uint8Array(8);
    crypto.getRandomValues(arr);
    return Array.from(arr).map(function(b) { return b.toString(16).padStart(2, '0'); }).join('');
  }

  function unixMsToUuidBytes(ms) {
    var hex = Math.floor(ms).toString(16).padStart(12, '0');
    // First 48 bits = time (ms), last 16 bits of first 48 = version 7 + 12 bits rand
    var versioned = hex.slice(0, 12); // 12 hex = 48 bits
    // Replace last 4 bits with version 7 (0111 = 7)
    var timeHigh12 = versioned.slice(0, 11); // 11 hex chars = 44 bits
    var timeLow4 = parseInt(versioned.charAt(11), 16);
    timeLow4 = (timeLow4 & 0x03) | 0x07; // top 2 bits 01, bottom 2 bits = version 7
    var v7TimeHigh = timeHigh12 + timeLow4.toString(16);
    // version 7 format: xxxxxxxx-xxxx-7xxx-xxxx-xxxxxxxxxxxx
    // First 12 hex chars (48 bits): tttttttt-ttt(t) -> first 11 hex = 44 bits time, last hex char's top 4 bits = 7
    return v7TimeHigh;
  }

  function generateUUIDv7(customMs) {
    var ms = customMs || Date.now();
    var msHex = Math.floor(ms).toString(16).padStart(12, '0');
    // Structure: time_low(8 hex) - time_mid(4 hex) - version7(4 hex) + 12 bits - clock_seq(4 hex) - node(12 hex)
    // Simplified: first 48 bits of timestamp (ms) + rand
    var timeHigh48 = msHex.slice(0, 12); // 12 hex = 48 bits
    // Set version bits (4 bits at position 12)
    var first11 = timeHigh48.slice(0, 11); // 11 hex = 44 bits
    var lastChar = parseInt(timeHigh48.charAt(11), 16);
    lastChar = (lastChar & 0x0F) | 0x70; // top 4 bits = 7 (UUID v7)
    var timeWithVersion = first11 + lastChar.toString(16); // 12 hex with version 7

    var rand12 = getRand12();
    var rand8 = getRand8();

    var uuid = timeWithVersion.slice(0,8) + '-' + timeWithVersion.slice(8,12) + '-' + rand12.slice(0,4) + '-' + rand12.slice(4,8) + '-' + rand8;
    return uuid.toLowerCase();
  }

  function showResult(uuid, ts) {
    var el = document.getElementById('resultDisplay');
    el.textContent = uuid;

    history.unshift({ uuid: uuid, ts: ts || Date.now() });
    if (history.length > 20) history = history.slice(0, 20);
    renderHistory();
    document.getElementById('historyCard').style.display = 'block';
  }

  function renderHistory() {
    var list = document.getElementById('historyList');
    list.innerHTML = history.map(function(item, i) {
      var d = new Date(item.ts);
      var timeStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0') + ':' + String(d.getSeconds()).padStart(2,'0');
      return '<li onclick="useHistoryItem(' + i + ')"><span class="uuid-text">' + item.uuid + '</span><span class="uuid-time">' + timeStr + '</span></li>';
    }).join('');
  }

  function useHistoryItem(idx) {
    var item = history[idx];
    document.getElementById('resultDisplay').textContent = item.uuid;
    navigator.clipboard.writeText(item.uuid).then(function() { CT.showToast('已复制！'); });
  }

  function copyResult() {
    var text = document.getElementById('resultDisplay').textContent;
    if (text.indexOf('点击') === 0) return;
    navigator.clipboard.writeText(text).then(function() { CT.showToast('已复制！'); }).catch(function() { CT.showToast('复制失败'); });
  }

  document.getElementById('btnGenerate').addEventListener('click', function() {
    var customInput = document.getElementById('customTime').value;
    var customMs = null;
    if (customInput) customMs = new Date(customInput).getTime();
    var uuid = generateUUIDv7(customMs);
    showResult(uuid);
  });

  document.getElementById('btnBatch').addEventListener('click', function() {
    var count = prompt('输入要生成的数量（1-100）', '10');
    count = parseInt(count);
    if (isNaN(count) || count < 1 || count > 100) return;
    var uuids = [];
    for (var i = 0; i < count; i++) uuids.push(generateUUIDv7());
    var text = uuids.join('\n');
    navigator.clipboard.writeText(text).then(function() {
      CT.showToast('已复制 ' + count + ' 个UUID到剪贴板！');
      if (count > 0) showResult(uuids[0]);
    });
  });

  document.getElementById('btnCopy').addEventListener('click', copyResult);
  document.getElementById('btnClearHistory').addEventListener('click', function() {
    history = [];
    document.getElementById('historyCard').style.display = 'none';
  });

  // Auto-generate on load
  (function() {
    var uuid = generateUUIDv7();
    showResult(uuid);
  })();
  </script>

  <main class="page-body">
    <div class="container">

        <h1>JSON压缩/格式化</h1>
        <p class="description">压缩JSON去除冗余空格用于生产，格式化JSON便于阅读调试</p>
      </div>

      <div class="tool-layout">
        <div class="mode-tabs">
          <button class="mode-tab active" id="tabCompress">📦 压缩模式</button>
          <button class="mode-tab" id="tabFormat">🎨 格式化模式</button>
        </div>

        <div class="tool-card">
          <div class="section-title-row">
            <h3>输入 JSON</h3>
            <div style="display:flex; gap:0.5rem;">
              <button class="btn btn-secondary" id="btnSample" style="font-size:0.8rem; padding:0.35rem 0.8rem;">📝 填入示例</button>
              <button class="btn btn-secondary" id="btnClearInput" style="font-size:0.8rem; padding:0.35rem 0.8rem;">🗑 清空</button>
            </div>
          </div>
          <textarea id="inputJson" placeholder="粘贴或输入 JSON 数据..."></textarea>
          <div class="stats-bar">
            <span id="inputChars">0 字符</span>
            <span id="inputBytes">0 字节</span>
            <span id="inputLines">0 行</span>
          </div>
          <div class="error-msg" id="inputError" style="display:none;"></div>

          <div class="btn-group" style="margin-top:0.75rem;">
            <button class="btn btn-primary" id="btnProcess">⚡ 执行</button>
            <button class="btn btn-secondary" id="btnCopyOutput">📋 复制结果</button>
          </div>
        </div>

        <div class="tool-card">
          <div class="section-title-row">
            <h3>输出结果</h3>
            <button class="btn btn-secondary" id="btnClearOutput" style="font-size:0.8rem; padding:0.35rem 0.8rem;">🗑 清空</button>
          </div>
          <textarea id="outputJson" readonly placeholder="处理结果将在此显示..."></textarea>
          <div class="stats-bar">
            <span id="outputChars">0 字符</span>
            <span id="outputBytes">0 字节</span>
            <span id="compressionRatio"></span>
          </div>
          <div class="error-msg" id="outputError" style="display:none;"></div>
        </div>
      </div>
    </div>
  </main>

  <button class="share-btn" id="shareBtn" title="分享此工具"><svg class="share-icon" aria-hidden="true"><use href="#icon-share"/></svg>分享</button>

  <div id="toast"></div>

  <script>
  CT.initTheme();
  CT.initKeyboardShortcuts();
  document.getElementById('shareBtn').onclick = function() { navigator.clipboard.writeText(window.location.href).then(function() { CT.showToast('链接已复制！'); }).catch(function() { CT.showToast('复制失败'); }); };

  var mode = 'compress';

  var SAMPLE_JSON = '{"name":"CloverTools","version":"1.0","features":["JSON压缩","JSON格式化","语法校验"],"stats":{"tools":145,"categories":9,"dailyActive":200},"settings":{"theme":"auto","language":"zh-CN","notifications":true}}';

  function updateStats(input, output) {
    document.getElementById('inputChars').textContent = (input.length) + ' 字符';
    document.getElementById('inputBytes').textContent = new Blob([input]).size + ' 字节';
    document.getElementById('inputLines').textContent = (input.split('\n').length) + ' 行';

    if (output !== undefined) {
      document.getElementById('outputChars').textContent = output.length + ' 字符';
      document.getElementById('outputBytes').textContent = new Blob([output]).size + ' 字节';
      if (input.length > 0 && output.length > 0) {
        var ratio = ((1 - output.length / input.length) * 100).toFixed(1);
        document.getElementById('compressionRatio').textContent = '压缩率 ' + ratio + '%';
      } else {
        document.getElementById('compressionRatio').textContent = '';
      }
    }
  }

  function showError(elId, msg) {
    var el = document.getElementById(elId);
    el.textContent = msg;
    el.style.display = 'block';
  }
  function clearError(elId) { document.getElementById(elId).style.display = 'none'; }

  function process() {
    clearError('inputError');
    clearError('outputError');
    var input = document.getElementById('inputJson').value;
    updateStats(input, undefined);

    if (!input.trim()) {
      showError('inputError', '请输入JSON数据');
      document.getElementById('outputJson').value = '';
      return;
    }

    var parsed, result;
    try {
      parsed = JSON.parse(input);
    } catch (e) {
      var msg = 'JSON语法错误：' + e.message;
      // Try to extract position
      var match = e.message.match(/position\s+(\d+)/);
      if (match) {
        var pos = parseInt(match[1]);
        var lines = input.substring(0, pos).split('\n');
        var line = lines.length;
        var col = lines[lines.length - 1].length + 1;
        msg += '（第' + line + '行第' + col + '列）';
      }
      showError('inputError', msg);
      return;
    }

    if (mode === 'compress') {
      result = JSON.stringify(parsed);
    } else {
      result = JSON.stringify(parsed, null, 2);
    }

    document.getElementById('outputJson').value = result;
    updateStats(input, result);
  }

  function setMode(m) {
    mode = m;
    document.getElementById('tabCompress').classList.toggle('active', m === 'compress');
    document.getElementById('tabFormat').classList.toggle('active', m === 'format');
  }

  document.getElementById('tabCompress').addEventListener('click', function() { setMode('compress'); });
  document.getElementById('tabFormat').addEventListener('click', function() { setMode('format'); });
  document.getElementById('btnProcess').addEventListener('click', process);
  document.getElementById('btnClearInput').addEventListener('click', function() {
    document.getElementById('inputJson').value = '';
    clearError('inputError');
    updateStats('', undefined);
  });
  document.getElementById('btnClearOutput').addEventListener('click', function() {
    document.getElementById('outputJson').value = '';
    clearError('outputError');
    document.getElementById('outputChars').textContent = '0 字符';
    document.getElementById('outputBytes').textContent = '0 字节';
    document.getElementById('compressionRatio').textContent = '';
  });
  document.getElementById('btnSample').addEventListener('click', function() {
    document.getElementById('inputJson').value = SAMPLE_JSON;
    updateStats(SAMPLE_JSON, undefined);
    clearError('inputError');
  });
  document.getElementById('btnCopyOutput').addEventListener('click', function() {
    var text = document.getElementById('outputJson').value;
    if (!text) { CT.showToast('结果为空'); return; }
    navigator.clipboard.writeText(text).then(function() { CT.showToast('已复制！'); }).catch(function() { CT.showToast('复制失败'); });
  });

  document.getElementById('inputJson').addEventListener('input', function() {
    updateStats(this.value, undefined);
    clearError('inputError');
  });

  document.getElementById('outputJson').addEventListener('click', function() {
    this.select();
  });
  </script>

            <span id="outputChars">0 字符</span>
            <span id="outputLines">0 行</span>

  <script>
  CT.initTheme();
  CT.initKeyboardShortcuts();
  document.getElementById('shareBtn').onclick = function() { navigator.clipboard.writeText(window.location.href).then(function() { CT.showToast('链接已复制！'); }).catch(function() { CT.showToast('复制失败'); }); };

  var mode = 'compress';

  var SAMPLE_XML = '<?xml version="1.0" encoding="UTF-8"?><root><user id="1"><name>张三</name><email>zhangsan@example.com</email></user><user id="2"><name>李四</name><email>lisi@example.com</email></user></root>';

  function updateStats(input, output) {
    document.getElementById('inputChars').textContent = (input.length) + ' 字符';
    document.getElementById('inputLines').textContent = (input.split('\n').length) + ' 行';
    if (output !== undefined) {
      document.getElementById('outputChars').textContent = output.length + ' 字符';
      document.getElementById('outputLines').textContent = (output.split('\n').length) + ' 行';
      if (input.length > 0 && output.length > 0 && mode === 'compress') {
        var ratio = ((1 - output.length / input.length) * 100).toFixed(1);
        document.getElementById('compressionRatio').textContent = '压缩率 ' + ratio + '%';
      } else {
        document.getElementById('compressionRatio').textContent = '';
      }
    }
  }

  function showError(elId, msg) {
    var el = document.getElementById(elId);
    el.textContent = msg;
    el.style.display = 'block';
  }
  function clearError(elId) { document.getElementById(elId).style.display = 'none'; }

  function formatXML(xmlStr, indentSize) {
    var formatted = '';
    var xml = xmlStr.replace(/>\s*</g, '><').trim();
    var indent = '';
    var indentStr = indentSize == 1 ? '\t' : Array(indentSize + 1).join(' ');
    var stack = [];
    var tokens = xml.match(/<[^>]+>|[^<]+/g) || [];

    var inTag = false;
    var content = '';
    var xmlDeclaration = '';

    // Extract XML declaration
    var declMatch = xml.match(/<\?xml[^?]*\?>/);
    if (declMatch) {
      formatted = declMatch[0] + '\n';
      xml = xml.replace(declMatch[0], '').trim();
    }

    var level = 0;
    var buffer = '';
    var i = 0;

    function processTag(tag) {
      if (tag.match(/<\?[^?]*\?>/)) {
        return tag;
      }
      if (tag.match(/<\/\w/)) {
        // Closing tag
        level--;
        var indentL = Array(level + 1).join(indentStr);
        return indentL + tag;
      }
      if (tag.match(/<([^/>\s]+)([^>]*)>/)) {
        // Opening tag
        if (!tag.match(/\/>$/)) {
          level++;
        }
        var indentL = Array(level + 1).join(indentStr);
        return indentL + tag;
      }
      return tag;
    }

    // Simple regex-based formatter
    var result = '';
    var lines = xml.split(/(<[^>]*>)/);
    var level = 0;
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (!line) continue;
      if (line.match(/^<\?\w/)) {
        result += line + '\n';
      } else if (line.match(/^<\//)) {
        level--;
        result += Array(level + 1).join(indentStr) + line + '\n';
      } else if (line.match(/\/>$/)) {
        result += Array(level + 1).join(indentStr) + line + '\n';
      } else if (line.match(/^<\w/)) {
        result += Array(level + 1).join(indentStr) + line;
        if (!line.match(/^<[^>]+br|img|input|hr|meta|link/i)) {
          level++;
        }
        if (line.match(/<\/\w/)) level--;
        result += '\n';
      } else {
        result += Array(level + 1).join(indentStr) + line + '\n';
      }
    }

    return formatted + result.trim();
  }

  function compressXML(xmlStr) {
    return xmlStr.replace(/>\s+</g, '><').replace(/\s+/g, ' ').trim();
  }

  function validateXML(xmlStr) {
    try {
      var parser = new DOMParser();
      var doc = parser.parseFromString(xmlStr, 'text/xml');
      var parseError = doc.querySelector('parsererror');
      if (parseError) {
        var errText = parseError.textContent || 'XML语法错误';
        var lineMatch = errText.match(/line\s*(\d+)/i);
        var colMatch = errText.match(/column\s*(\d+)/i);
        var msg = 'XML语法错误';
        if (lineMatch) msg += '（第' + lineMatch[1] + '行';
        if (colMatch) msg += '第' + colMatch[1] + '列）';
        return { valid: false, msg: msg };
      }
      return { valid: true };
    } catch (e) {
      return { valid: false, msg: 'XML解析失败：' + e.message };
    }
  }

  function process() {
    clearError('inputError');
    clearError('outputError');
    var input = document.getElementById('inputXml').value;
    updateStats(input, undefined);

    if (!input.trim()) {
      showError('inputError', '请输入XML数据');
      document.getElementById('outputXml').value = '';
      return;
    }

    var validation = validateXML(input);
    if (!validation.valid) {
      showError('inputError', validation.msg);
      return;
    }

    var indentSize = parseInt(document.getElementById('indentSize').value);
    var result;

    if (mode === 'compress') {
      result = compressXML(input);
    } else {
      result = formatXML(input, indentSize);
    }

    document.getElementById('outputXml').value = result;
    updateStats(input, result);
  }

  function setMode(m) {
    mode = m;
    document.getElementById('tabCompress').classList.toggle('active', m === 'compress');
    document.getElementById('tabFormat').classList.toggle('active', m === 'format');
  }

  document.getElementById('tabCompress').addEventListener('click', function() { setMode('compress'); });
  document.getElementById('tabFormat').addEventListener('click', function() { setMode('format'); });
  document.getElementById('btnProcess').addEventListener('click', process);
  document.getElementById('btnClearInput').addEventListener('click', function() {
    document.getElementById('inputXml').value = '';
    clearError('inputError');
    updateStats('', undefined);
  });
  document.getElementById('btnClearOutput').addEventListener('click', function() {
    document.getElementById('outputXml').value = '';
    clearError('outputError');
    document.getElementById('outputChars').textContent = '0 字符';
    document.getElementById('outputLines').textContent = '0 行';
    document.getElementById('compressionRatio').textContent = '';
  });
  document.getElementById('btnSample').addEventListener('click', function() {
    document.getElementById('inputXml').value = SAMPLE_XML;
    updateStats(SAMPLE_XML, undefined);
    clearError('inputError');
  });
  document.getElementById('btnCopyOutput').addEventListener('click', function() {
    var text = document.getElementById('outputXml').value;
    if (!text) { CT.showToast('结果为空'); return; }
    navigator.clipboard.writeText(text).then(function() { CT.showToast('已复制！'); }).catch(function() { CT.showToast('复制失败'); });
  });

  document.getElementById('inputXml').addEventListener('input', function() {
    updateStats(this.value, undefined);
    clearError('inputError');
  });

  document.getElementById('outputXml').addEventListener('click', function() {
    this.select();
  });
  </script>

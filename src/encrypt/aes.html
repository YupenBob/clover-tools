  <main class="page-body">
    <div class="container">
      <div class="breadcrumb"><a href="/">← 返回工具箱</a></div>
      <div class="tool-header">
        <h1>AES加密/解密</h1>
        <p class="description">AES对称加密算法，支持AES-128/AES-192/AES-256，CBC模式，支持PKCS7填充</p>
      </div>

      <div class="tool-layout">
        <div class="tool-card">
          <div class="info-box">
            <strong>模式说明：</strong>AES-CBC需要相同的密钥和IV（初始化向量）才能正确加解密。请妥善保管密钥，切勿泄露。
          </div>

          <div class="form-row">
            <div class="field">
              <label>密钥长度</label>
              <select id="keySize">
                <option value="128">AES-128（16字节密钥）</option>
                <option value="192">AES-192（24字节密钥）</option>
                <option value="256">AES-256（32字节密钥）</option>
              </select>
            </div>
            <div class="field">
              <label>输出格式</label>
              <select id="outputFmt">
                <option value="hex">Hex（十六进制）</option>
                <option value="base64">Base64</option>
              </select>
            </div>
          </div>

          <div class="form-row" style="margin-top:1rem;">
            <div class="field" style="flex:2;">
              <label>密钥（Password / Key）</label>
              <input type="text" id="keyInput" placeholder="输入加密密钥，如：your-secret-key" />
            </div>
            <div class="field" style="flex:1;">
              <label>IV向量（可选，默认自动生成）</label>
              <input type="text" id="ivInput" placeholder="16字节HEX或留空" />
            </div>
          </div>

          <div style="margin-top:1rem;">
            <label class="section-title">输入文本</label>
            <textarea id="plainText" placeholder="输入待加密或待解密的文本..."></textarea>
          </div>

          <div class="btn-group">
            <button class="btn btn-primary" id="btnEncrypt">🔒 加密</button>
            <button class="btn btn-secondary" id="btnDecrypt">🔓 解密</button>
            <button class="btn btn-secondary" id="btnClear">清空</button>
          </div>

          <div class="result-box" id="ivBox" style="display:none;">
            <h3>本次使用的IV向量（解密时需保持一致）</h3>
            <div class="result-text" id="ivResult"></div>
          </div>

          <div class="result-box" id="resultBox" style="display:none;">
            <h3 id="resultLabel">结果</h3>
            <div class="result-text" id="resultText"></div>
            <div style="margin-top:0.5rem; display:flex; gap:0.5rem;">
              <button class="btn btn-secondary" id="btnCopy" style="font-size:0.85rem; padding:0.4rem 1rem;">📋 复制</button>
            </div>
          </div>

          <div class="error-msg" id="errorMsg" style="display:none;"></div>
        </div>
      </div>
    </div>
  </main>

  <button class="share-btn" id="shareBtn" title="分享此工具"><svg class="share-icon" aria-hidden="true"><use href="#icon-share"/></svg>分享</button>

  <div id="toast"></div>

  <script>
  CT.initTheme();
  CT.initKeyboardShortcuts();
  CT.initReveal();
  CT.initCopyPulse();
  document.getElementById('shareBtn').onclick = function() { navigator.clipboard.writeText(window.location.href).then(function() { CT.showToast('链接已复制！'); }).catch(function() { CT.showToast('复制失败'); }); };

  function showError(msg) {
    var el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
    document.getElementById('resultBox').style.display = 'none';
    document.getElementById('ivBox').style.display = 'none';
  }
  function clearError() { document.getElementById('errorMsg').style.display = 'none'; }
  function showResult(label, text) {
    document.getElementById('resultLabel').textContent = label;
    document.getElementById('resultText').textContent = text;
    document.getElementById('resultBox').style.display = 'block';
  }
  function showIV(iv) {
    document.getElementById('ivResult').textContent = iv;
    document.getElementById('ivBox').style.display = 'block';
  }

  function strToBytes(str) { return new TextEncoder().encode(str); }
  function bytesToHex(bytes) { return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join(''); }
  function hexToBytes(hex) { var bytes = new Uint8Array(hex.length / 2); for (var i = 0; i < bytes.length; i++) bytes[i] = parseInt(hex.substr(i * 2, 2), 16); return bytes; }

  async function deriveKey(password, keySize) {
    var keyMaterial = await crypto.subtle.importKey('raw', strToBytes(password), 'PBKDF2', false, ['deriveKey']);
    var salt = new Uint8Array(8);
    crypto.getRandomValues(salt);
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
      keyMaterial,
      { name: 'AES-CBC', length: parseInt(keySize) },
      false,
      ['encrypt', 'decrypt']
    ).then(function(key) { return { key: key, salt: salt }; });
  }

  async function doEncrypt() {
    clearError();
    var keySize = document.getElementById('keySize').value;
    var outputFmt = document.getElementById('outputFmt').value;
    var password = document.getElementById('keyInput').value.trim();
    var ivHex = document.getElementById('ivInput').value.trim();
    var plainText = document.getElementById('plainText').value;

    if (!password) { showError('请输入密钥'); return; }
    if (!plainText) { showError('请输入待加密文本'); return; }

    try {
      var ivBytes = ivHex ? hexToBytes(ivHex) : new Uint8Array(16);
      crypto.getRandomValues(ivBytes.slice(0, 0));
      if (!ivHex) crypto.getRandomValues(ivBytes);

      var result = await deriveKey(password, keySize);
      var key = result.key;
      var salt = new Uint8Array([1,2,3,4,5,6,7,8]);

      var encrypted = await crypto.subtle.encrypt({ name: 'AES-CBC', iv: ivBytes }, key, strToBytes(plainText));
      var encryptedBytes = new Uint8Array(encrypted);

      var output;
      if (outputFmt === 'hex') {
        var combined = new Uint8Array(salt.length + ivBytes.length + encryptedBytes.length);
        combined.set(salt, 0);
        combined.set(ivBytes, salt.length);
        combined.set(encryptedBytes, salt.length + ivBytes.length);
        output = bytesToHex(combined);
        showIV(bytesToHex(ivBytes));
      } else {
        var combined = new Uint8Array(salt.length + ivBytes.length + encryptedBytes.length);
        combined.set(salt, 0);
        combined.set(ivBytes, salt.length);
        combined.set(encryptedBytes, salt.length + ivBytes.length);
        output = btoa(String.fromCharCode.apply(null, combined));
        showIV(bytesToHex(ivBytes));
      }

      showResult('加密结果（Base64格式）', output);
    } catch (e) { showError('加密失败：' + e.message); }
  }

  async function doDecrypt() {
    clearError();
    var outputFmt = document.getElementById('outputFmt').value;
    var password = document.getElementById('keyInput').value.trim();
    var ivHex = document.getElementById('ivInput').value.trim();
    var cipherText = document.getElementById('plainText').value.trim();

    if (!password) { showError('请输入密钥'); return; }
    if (!cipherText) { showError('请输入密文'); return; }

    try {
      var combined, salt, ivBytes, encryptedBytes;

      if (outputFmt === 'hex') {
        combined = hexToBytes(cipherText);
        salt = combined.slice(0, 8);
        ivBytes = combined.slice(8, 24);
        encryptedBytes = combined.slice(24);
      } else {
        var binary = atob(cipherText);
        combined = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) combined[i] = binary.charCodeAt(i);
        salt = combined.slice(0, 8);
        ivBytes = combined.slice(8, 24);
        encryptedBytes = combined.slice(24);
      }

      if (ivBytes.length !== 16) { showError('IV长度无效，应为16字节'); return; }
      if (!ivHex) { document.getElementById('ivInput').value = bytesToHex(ivBytes); showIV(bytesToHex(ivBytes)); }

      var keyMaterial = await crypto.subtle.importKey('raw', strToBytes(password), 'PBKDF2', false, ['deriveKey']);
      var key = await crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: salt, iterations: 100000, hash: 'SHA-256' },
        keyMaterial,
        { name: 'AES-CBC', length: 256 },
        false,
        ['decrypt']
      );

      var decrypted = await crypto.subtle.decrypt({ name: 'AES-CBC', iv: ivBytes }, key, encryptedBytes);
      var plain = new TextDecoder().decode(decrypted);
      showResult('解密结果（原文）', plain);
    } catch (e) { showError('解密失败：密钥或IV不正确，或密文格式有误 (' + e.message + ')'); }
  }

  document.getElementById('btnEncrypt').addEventListener('click', doEncrypt);
  document.getElementById('btnDecrypt').addEventListener('click', doDecrypt);
  document.getElementById('btnClear').addEventListener('click', function() {
    document.getElementById('plainText').value = '';
    document.getElementById('errorMsg').style.display = 'none';
    document.getElementById('resultBox').style.display = 'none';
    document.getElementById('ivBox').style.display = 'none';
  });
  document.getElementById('btnCopy').addEventListener('click', function() {
    var text = document.getElementById('resultText').textContent;
    navigator.clipboard.writeText(text).then(function() { CT.showToast('已复制！'); }).catch(function() { CT.showToast('复制失败'); });
  });
  </script>

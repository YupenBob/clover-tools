<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PAGE_OG_TITLE}}</title>

  <!-- Open Graph -->
  <meta property="og:title" content="{{PAGE_OG_TITLE}}">
  <meta property="og:description" content="{{PAGE_OG_DESC}}">
  <meta property="og:image" content="{{PAGE_OG_IMAGE}}">
  <meta property="og:url" content="{{PAGE_URL}}">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="CloverTools">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@CloverTools">
  <meta name="twitter:title" content="{{PAGE_OG_TITLE}}">
  <meta name="twitter:description" content="{{PAGE_OG_DESC}}">
  <meta name="twitter:image" content="{{PAGE_OG_IMAGE}}">

  <!-- Canonical -->
  <link rel="canonical" href="{{PAGE_CANONICAL_URL}}">
  <link rel="stylesheet" href="{{CSS_PATH}}">
  <link rel="icon" href="/src/clover-logo.svg" type="image/svg+xml">
  <script>
    (function() {
      var saved = localStorage.getItem('clover-theme');
      if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  {{PAGE_STYLES}}
</head>
<body>
  {{CHUNK_SVG_SPRITE}}

  {{CHUNK_SITE_HEADER}}

  <main class="page-body">
    <div class="container">
      {{PAGE_CONTENT}}
    </div>
  </main>

  {{CHUNK_SITE_FOOTER}}

  <script>
    // Global keyboard shortcuts
    document.addEventListener('keydown', function(e) {
      var tag = e.target.tagName;
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
      if (e.key === 'Escape') {
        var t = document.getElementById('toast');
        if (t) t.classList.remove('show');
      }
    });

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => showToast('复制成功！')).catch(() => showToast('复制失败'));
    }

    {{THEME_TOGGLE_SCRIPT}}
  </script>
  {{PAGE_SCRIPT}}
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloverTools - 轻量级开发者工具箱</title>
  <link rel="stylesheet" href="/src/shared.css">
  <style>
    /* Homepage-only styles */
    .page-hero { padding: 3.5rem 0 2.5rem; text-align: center; }
    .page-hero h1 { font-size: 3rem; margin-bottom: 0.75rem; }
    .page-hero .subtitle { font-size: 1.15rem; opacity: 0.65; }
    .categories { padding: 0 0 3rem; }
    footer { margin-top: auto; }
  </style>
  <!-- Counter.dev analytics -->
  <script src="https://cdn.counter.dev/script.js" data-id="4e8cb07b-485c-4bc4-a3d0-c2839c943037" data-utcoffset="8"></script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-logo">🍀 CloverTools</a>
      <nav class="site-nav">
        <a href="/">工具</a>
        <a href="https://github.com/YupenBob/clover-tools" target="_blank">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="page-body">
    <div class="container">
      <div class="hero">
        <h1>🍀 CloverTools</h1>
        <p class="subtitle">轻量级开发者工具箱 · 无需后端 · 完全本地运行</p>
        <div class="search-box">
          <input type="text" id="tool-search" placeholder="搜索工具... (Ctrl+K)" autocomplete="off">
        </div>
      </div>
      <div class="categories" id="categories">
        {{CATEGORIES_HTML}}
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>Made with 🍀 by Clover · Open Source · No tracking · No server</p>
  </footer>

  <div id="toast"></div>

  <script>
    // Search
    const searchInput = document.getElementById('tool-search');
    const categoryCards = document.querySelectorAll('.category');
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      categoryCards.forEach(card => {
        const items = card.querySelectorAll('li');
        let anyVisible = false;
        items.forEach(li => {
          const text = li.textContent.toLowerCase();
          const show = !q || text.includes(q);
          li.style.display = show ? '' : 'none';
          if (show) anyVisible = true;
        });
        card.style.display = anyVisible ? '' : 'none';
      });
    });
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        searchInput.focus();
      }
    });

    // Toast
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>

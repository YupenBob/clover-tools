<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PAGE_OG_TITLE}}</title>
  <meta name="description" content="{{PAGE_META_DESC}}">
  <meta name="keywords" content="{{PAGE_KEYWORDS}}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{PAGE_OG_TITLE}}">
  <meta property="og:description" content="{{PAGE_OG_DESC}}">
  <meta property="og:image" content="{{PAGE_OG_IMAGE}}">
  <meta property="og:url" content="{{PAGE_URL}}">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="CloverTools">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@CloverTools">
  <meta name="twitter:title" content="{{PAGE_OG_TITLE}}">
  <meta name="twitter:description" content="{{PAGE_OG_DESC}}">
  <meta name="twitter:image" content="{{PAGE_OG_IMAGE}}">

  <!-- Canonical -->
  <link rel="canonical" href="{{PAGE_CANONICAL_URL}}">
  <link rel="stylesheet" href="/src/shared.css">
  <link rel="icon" href="/src/clover-logo.svg" type="image/svg+xml">
  <!-- Bootstrap Icons CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="/src/shared.js"></script>
  <style>
    /* Homepage-only styles */
    .page-hero { padding: 3.5rem 0 2.5rem; text-align: center; }
    .page-hero h1 { font-size: 3rem; margin-bottom: 0.75rem; }
    .page-hero .subtitle { font-size: 1.15rem; opacity: 0.65; }
    .categories { padding: 0 0 3rem; }
    footer { margin-top: auto; }
    /* SVG icon sizing */
    .nav-icon { width: 1.1rem; height: 1.1rem; vertical-align: middle; margin-right: 0.25rem; }
    .nav-icon-link { display: inline-flex !important; align-items: center; gap: 0.1rem; }
    .nav-icon-link span { font-size: 0.9rem; }
    .btn-icon { width: 1.1rem; height: 1.1rem; vertical-align: middle; margin-right: 0.3rem; }
    /* Tool list icons (Bootstrap Icons) */
    .category li a { display: flex; align-items: center; gap: 0.35rem; }
    .category li a i[class^="bi-"] { font-size: 1.05rem; color: var(--primary); flex-shrink: 0; }
    .category li a .tool-name { flex-shrink: 0; }
    .category li a .tool-desc { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* Stats bar */
    .stats-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      margin: 1.25rem auto 0;
      padding: 0;
      list-style: none;
      flex-wrap: wrap;
    }
    .stats-bar li {
      font-size: 1.05rem;
      color: var(--primary);
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .stats-bar li .stats-num {
      font-size: 1.35rem;
      font-weight: 800;
    }
    .stats-bar li .stats-label {
      font-size: 0.9rem;
      font-weight: 600;
      opacity: 0.75;
    }
    .stats-bar li + li::before {
      content: '·';
      color: var(--text-secondary);
      opacity: 0.4;
      margin-right: 1.5rem;
      font-size: 1.5rem;
      font-weight: 400;
    }
    @media (max-width: 480px) {
      .stats-bar { gap: 0.6rem; }
      .stats-bar li { font-size: 0.88rem; }
      .stats-bar li .stats-num { font-size: 1.05rem; }
      .stats-bar li .stats-label { font-size: 0.75rem; }
      .stats-bar li + li::before { display: none; }
    }

    /* Quick tools row */
    .quick-tools {
      margin: 2rem auto 0;
      max-width: 700px;
    }
    /* Category grid */
    .cat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 0.75rem;
      max-width: 750px;
      margin: 2rem auto 0;
      padding: 0 0.5rem;
    }
    .cat-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      padding: 1rem 0.5rem;
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: var(--card-shadow);
      font-size: 0.8rem;
      color: var(--text);
      font-weight: 600;
    }
    .cat-btn i[class^="bi-"] {
      font-size: 1.6rem;
      color: var(--primary);
    }
    .cat-btn em {
      font-style: normal;
      font-size: 0.7rem;
      opacity: 0.55;
    }
    .cat-btn:hover, .cat-btn.active {
      transform: translateY(-3px);
      border-color: var(--primary);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }
    .cat-btn.active {
      background: var(--primary);
      color: #fff;
    }
    .cat-btn.active i[class^="bi-"] {
      color: #fff;
    }
    .cat-btn.active em {
      color: rgba(255,255,255,0.7);
    }
    @media (max-width: 600px) {
      .cat-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 0.5rem;
      }
      .cat-btn {
        padding: 0.7rem 0.25rem;
        font-size: 0.7rem;
      }
      .cat-btn i[class^="bi-"] {
        font-size: 1.3rem;
      }
    }

    .quick-tools-title {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.5;
      text-align: center;
      margin-bottom: 0.9rem;
      font-weight: 600;
    }
    .quick-tools-row {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    @media (max-width: 600px) {
      .quick-tools-row {
        flex-wrap: nowrap;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
        justify-content: flex-start;
        padding-bottom: 0.5rem;
      }
      .quick-tool-card {
        scroll-snap-align: start;
        flex-shrink: 0;
      }
    }
    .quick-tool-card {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.1rem;
      background: var(--card-bg);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.88rem;
      font-weight: 500;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      box-shadow: var(--card-shadow);
    }
    .quick-tool-card i[class^="bi-"] {
      font-size: 1.1rem;
      color: var(--primary);
      flex-shrink: 0;
    }
    .quick-tool-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      border-color: var(--primary);
      color: var(--primary);
    }
  </style>
  <!-- Counter.dev analytics -->
  <script src="https://cdn.counter.dev/script.js" data-id="4e8cb07b-485c-4bc4-a3d0-c2839c943037" data-utcoffset="8"></script>
</head>
<body>
  {{SVG_SPRITE}}

  {{SITE_HEADER}}

  <main class="page-body">
    <div class="container">
      <div class="hero">
        <h1 style="display:flex;flex-direction:column;align-items:center;gap:0.3em;"><img src="/src/clover-logo.svg" alt="🍀" style="height:4em;margin:0;">CloverTools</h1>
        <p class="subtitle">开发者的瑞士军刀 · 随手即用，无需注册</p>
        <div class="search-box">
          <input type="text" id="tool-search" placeholder="搜索工具... (Ctrl+K)" autocomplete="off">
        </div>
        <div class="btn-row" style="justify-content:center;margin-top:1rem;">
          <button class="btn-random" id="randomToolBtn"><svg class="btn-icon" aria-hidden="true"><use href="#icon-dice"/></svg>随机工具</button>
        </div>

        <!-- Stats bar -->
        <ul class="stats-bar">
          <li><span class="stats-num">{{TOOL_COUNT}}</span><span class="stats-label">个在线工具</span></li>
          <li><span class="stats-num">220</span><span class="stats-label">篇解决文章</span></li>
          <li><span class="stats-num" id="busuanzi_value_site_pv">-</span><span class="stats-label">次帮助</span></li>
        </ul>

        <!-- Quick tools -->
        <div class="quick-tools">
          <div class="quick-tools-title">热门工具 · 随取随用</div>
          <div class="quick-tools-row">
            <a href="/tools/network/json-format.html" class="quick-tool-card"><i class="bi bi-braces"></i>JSON 格式化</a>
            <a href="/tools/encrypt/base64.html" class="quick-tool-card"><i class="bi bi-lock"></i>Base64 编解码</a>
            <a href="/tools/code/regex-tester.html" class="quick-tool-card"><i class="bi bi-code-slash"></i>正则测试</a>
            <a href="/tools/encrypt/url.html" class="quick-tool-card"><i class="bi bi-link-45deg"></i>URL 编码</a>
            <a href="/tools/time/timestamp.html" class="quick-tool-card"><i class="bi bi-clock"></i>时间戳转换</a>
          </div>

          <div class="quick-tools-title" style="margin-top:2rem;">特别推荐</div>
          <div class="quick-tools-row" style="justify-content:center;">
            <a href="https://aiti.xsanye.cn" target="_blank" class="quick-tool-card" style="background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:transparent;"><i class="bi bi-person-badge"></i> AITI 硅基人格测试</a>
          </div>
        </div>
      </div>

      <!-- Category icon grid -->
      {{CATEGORY_GRID_HTML}}

      <div class="categories" id="categories">
        {{CATEGORIES_HTML}}
      </div>
    </div>
  </main>

  {{SITE_FOOTER}}

  <div id="toast"></div>

  <script>
    CT.initTheme();
    CT.initKeyboardShortcuts();

    // Category grid filter
    const catBtns = document.querySelectorAll('.cat-btn');
    const categoryCards = document.querySelectorAll('.category');
    catBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const cat = btn.dataset.cat;
        const isActive = btn.classList.contains('active');
        catBtns.forEach(b => b.classList.remove('active'));
        if (!isActive) {
          btn.classList.add('active');
          categoryCards.forEach(card => {
            const h2 = card.querySelector('h2');
            card.style.display = h2 && h2.textContent === cat ? '' : 'none';
          });
        } else {
          categoryCards.forEach(card => card.style.display = '');
        }
      });
    });

    // Search
    const searchInput = document.getElementById('tool-search');
    const categoryCards = document.querySelectorAll('.category');
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      categoryCards.forEach(card => {
        const items = card.querySelectorAll('li');
        let anyVisible = false;
        items.forEach(li => {
          const text = li.textContent.toLowerCase();
          const show = !q || text.includes(q);
          li.style.display = show ? '' : 'none';
          if (show) anyVisible = true;
        });
        card.style.display = anyVisible ? '' : 'none';
      });
    });
    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        searchInput.focus();
      }
    });

    // Random tool: fetch tools.json and jump to a random tool page
    document.getElementById('randomToolBtn').addEventListener('click', function() {
      fetch('/tools.json')
        .then(function(res) { return res.json(); })
        .then(function(categories) {
          var allTools = [];
          categories.forEach(function(cat) {
            cat.tools.forEach(function(tool) {
              allTools.push(tool);
            });
          });
          if (allTools.length === 0) {
            CT.showToast('暂无可用工具');
            return;
          }
          var idx = Math.floor(Math.random() * allTools.length);
          var tool = allTools[idx];
          window.location.href = '/tools/' + tool.path;
        })
        .catch(function() {
          CT.showToast('加载工具列表失败');
        });
    });
  </script>
  <script>
    (function() {
      var base = 56490;
      var el = document.getElementById('busuanzi_value_site_pv');
      if (!el) return;
      function addBase() {
        var v = parseInt(el.textContent || '0', 10);
        if (v > 0) {
          el.textContent = v + base;
          observer.disconnect();
        }
      }
      addBase();
      var observer = new MutationObserver(addBase);
      observer.observe(el, { childList: true, characterData: true, subtree: true });
    })();
  </script>
  <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
</body>
</html>

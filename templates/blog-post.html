<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PAGE_TITLE}}</title>
  <meta name="description" content="{{PAGE_DESC}}">
  <meta name="keywords" content="{{PAGE_KEYWORDS}}">
  <link rel="canonical" href="{{PAGE_CANONICAL_URL}}">
  <meta property="og:title" content="{{PAGE_OG_TITLE}}">
  <meta property="og:description" content="{{PAGE_OG_DESC}}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="{{PAGE_URL}}">
  <meta property="og:image" content="{{PAGE_OG_IMAGE}}">
  <link rel="stylesheet" href="/src/shared.css">
  <style>
    .article-header { text-align: center; max-width: 720px; margin: 0 auto 2rem; }
    .article-category { display: inline-block; background: var(--primary); color: #fff; padding: 0.2rem 0.8rem; border-radius: 20px; font-size: 0.8rem; margin-bottom: 1rem; }
    .article-title { font-size: 1.8rem; line-height: 1.4; margin-bottom: 0.8rem; color: var(--text); }
    .article-meta { font-size: 0.85rem; opacity: 0.6; margin-bottom: 1.5rem; }
    .article-body { max-width: 720px; margin: 0 auto; line-height: 1.8; }
    .article-body h2 { font-size: 1.3rem; margin: 2rem 0 1rem; color: var(--primary); }
    .article-body p { margin-bottom: 1rem; }
    .article-body ul, .article-body ol { margin: 1rem 0 1rem 1.5rem; }
    .article-body li { margin-bottom: 0.5rem; }
    .article-body code { background: var(--bg-secondary); padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.9em; font-family: monospace; }
    .article-body pre { background: var(--bg-secondary); padding: 1rem; border-radius: 8px; overflow-x: auto; margin: 1rem 0; }
    .article-body pre code { background: none; padding: 0; }
    .tool-cta { background: linear-gradient(135deg, #c70039 0%, #8b5cf6 100%); color: #fff; padding: 1.2rem 1.5rem; border-radius: 12px; margin: 2rem 0; text-align: center; }
    .tool-cta h3 { margin-bottom: 0.5rem; font-size: 1.1rem; }
    .tool-cta a { display: inline-block; background: #fff; color: #c70039; padding: 0.5rem 1.5rem; border-radius: 8px; text-decoration: none; font-weight: 600; margin-top: 0.5rem; transition: transform 0.2s; }
    .tool-cta a:hover { transform: translateY(-2px); }
    .faq { margin-top: 2.5rem; }
    .faq-item { margin-bottom: 1.2rem; padding: 1rem; background: var(--bg-secondary); border-radius: 8px; }
    .faq-item strong { color: var(--primary); }
    .breadcrumb { max-width: 720px; margin: 0 auto 1.5rem; font-size: 0.85rem; opacity: 0.7; }
    .breadcrumb a { color: var(--primary); text-decoration: none; }
    .back-link { display: inline-flex; align-items: center; gap: 0.3rem; color: var(--primary); text-decoration: none; margin-bottom: 1.5rem; font-size: 0.9rem; }
    .back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    {{SITE_HEADER}}
    <div class="article-header">
      <span class="article-category">{{ARTICLE_CATEGORY}}</span>
      <h1 class="article-title">{{ARTICLE_TITLE}}</h1>
      <div class="article-meta">📅 {{ARTICLE_DATE}} · 👤 CloverTools · 🔧 问题解决</div>
    </div>
    <div class="article-body">
      <div class="breadcrumb">
        <a href="/">首页</a> &gt; <a href="/blog/">博客</a> &gt; {{ARTICLE_TITLE}}
      </div>
      <a href="/" class="back-link">← 返回工具首页</a>

      {{ARTICLE_CONTENT}}

      <div class="tool-cta">
        <h3>💡 遇到同类问题？用工具快速解决</h3>
        <p style="opacity:0.9;font-size:0.9rem;margin-bottom:0.8rem;">试试这些配套工具，无需注册，打开即用</p>
        {{TOOL_LINKS}}
      </div>

      <div class="faq">
        <h2>❓ 常见问题</h2>
        {{FAQ_CONTENT}}
      </div>
    </div>
    {{SITE_FOOTER}}
  </div>
  <script src="/src/shared.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PAGE_OG_TITLE}}</title>
  <meta name="description" content="{{PAGE_META_DESC}}">
  <meta name="keywords" content="{{PAGE_KEYWORDS}}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{PAGE_OG_TITLE}}">
  <meta property="og:description" content="{{PAGE_OG_DESC}}">
  <meta property="og:image" content="{{PAGE_OG_IMAGE}}">
  <meta property="og:url" content="{{PAGE_URL}}">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="CloverTools">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@CloverTools">
  <meta name="twitter:title" content="{{PAGE_OG_TITLE}}">
  <meta name="twitter:description" content="{{PAGE_OG_DESC}}">
  <meta name="twitter:image" content="{{PAGE_OG_IMAGE}}">

  <!-- Canonical -->
  <link rel="canonical" href="{{PAGE_CANONICAL_URL}}">
  <link rel="stylesheet" href="/src/shared.css">
  <link rel="icon" href="/src/clover-logo.svg" type="image/svg+xml">
  <script src="../../src/shared.js"></script>
  <style>
    /* Tool page layout - override defaults */
    .page-body { padding: 2.5rem 0 4rem; }
    .breadcrumb { font-size: 0.85rem; opacity: 0.6; margin-bottom: 0.5rem; }
    .breadcrumb a { color: var(--primary); text-decoration: none; }
    /* SVG icon sizing */
    .nav-icon { width: 1.1rem; height: 1.1rem; vertical-align: middle; margin-right: 0.25rem; }
    .nav-icon-link { display: inline-flex !important; align-items: center; gap: 0.1rem; }
    .nav-icon-link span { font-size: 0.9rem; }
    .share-icon { width: 1rem; height: 1rem; vertical-align: middle; margin-right: 0.25rem; }
  </style>
  <!-- Counter.dev analytics -->
  <script src="https://cdn.counter.dev/script.js" data-id="4e8cb07b-485c-4bc4-a3d0-c2839c943037" data-utcoffset="8"></script>
  <!-- Vercel Analytics -->
  <script src="https://vercel.com/analytics.js" defer></script>
  <!-- Vercel Speed Insights -->
  <script src="https://vercel.com/speed-insights.js" defer></script>
</head>
<body>
  {{SVG_SPRITE}}

  {{SITE_HEADER}}

  <main class="page-body">
    <div class="container">
      <div class="breadcrumb"><a href="/">← 返回工具箱</a></div>
      <div class="tool-header">
        <h1>{{TOOL_NAME}}</h1>
        <p class="description">{{TOOL_DESC}}</p>
      </div>
      <div class="tool-layout {{LAYOUT_CLASS}}">
        {{TOOL_CONTENT}}
      </div>
    </div>
  </main>

  {{SITE_FOOTER_WITH_SHARE}}

  <div id="toast"></div>

  <script>
    CT.initTheme();

    CT.initKeyboardShortcuts();

    // Share: copy current URL to clipboard
    {{SHARE_BTN_SCRIPT}}

    {{TOOL_SCRIPT}}
  </script>
</body>
</html>

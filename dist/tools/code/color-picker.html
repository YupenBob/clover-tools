    /* Sliders */

  <script>
    CT.initTheme();

    var h = 0, s = 100, l = 50;

    var satBrightBox = document.getElementById('satBrightBox');
    var satBrightCursor = document.getElementById('satBrightCursor');
    var hueBar = document.getElementById('hueBar');
    var hueCursor = document.getElementById('hueCursor');
    var colorPreview = document.getElementById('colorPreview');
    var hSlider = document.getElementById('hSlider');
    var sSlider = document.getElementById('sSlider');
    var lSlider = document.getElementById('lSlider');
    var hValue = document.getElementById('hValue');
    var sValue = document.getElementById('sValue');
    var lValue = document.getElementById('lValue');
    var hexInput = document.getElementById('hexInput');
    var hexOutput = document.getElementById('hexOutput');
    var rgbOutput = document.getElementById('rgbOutput');
    var rgbaOutput = document.getElementById('rgbaOutput');
    var hslOutput = document.getElementById('hslOutput');
    var hsvOutput = document.getElementById('hsvOutput');
    var paletteGrid = document.getElementById('paletteGrid');

    // HSL to RGB
    function hslToRgb(h, s, l) {
      s /= 100;
      l /= 100;
      var c = (1 - Math.abs(2 * l - 1)) * s;
      var x = c * (1 - Math.abs((h / 60) % 2 - 1));
      var m = l - c / 2;
      var r = 0, g = 0, b = 0;
      if (h < 60) { r = c; g = x; b = 0; }
      else if (h < 120) { r = x; g = c; b = 0; }
      else if (h < 180) { r = 0; g = c; b = x; }
      else if (h < 240) { r = 0; g = x; b = c; }
      else if (h < 300) { r = x; g = 0; b = c; }
      else { r = c; g = 0; b = x; }
      return [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255)];
    }

    // RGB to HEX
    function rgbToHex(r, g, b) {
      return '#' + [r, g, b].map(function(x) { return x.toString(16).padStart(2, '0'); }).join('').toUpperCase();
    }

    // HEX to RGB
    function hexToRgb(hex) {
      var h = hex.replace('#', '');
      if (h.length === 3) h = h.split('').map(function(x) { return x + x; }).join('');
      if (h.length !== 6) return null;
      return [parseInt(h.substr(0, 2), 16), parseInt(h.substr(2, 2), 16), parseInt(h.substr(4, 2), 16)];
    }

    // RGB to HSL
    function rgbToHsl(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      var max = Math.max(r, g, b), min = Math.min(r, g, b);
      var h = 0, s = 0, l = (max + min) / 2;
      if (max !== min) {
        var d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
          case g: h = ((b - r) / d + 2) / 6; break;
          case b: h = ((r - g) / d + 4) / 6; break;
        }
      }
      return [Math.round(h * 360), Math.round(s * 100), Math.round(l * 100)];
    }

    // RGB to HSV
    function rgbToHsv(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      var max = Math.max(r, g, b), min = Math.min(r, g, b);
      var h = 0, v = max, d = max - min;
      s = max === 0 ? 0 : d / max;
      if (max !== min) {
        switch (max) {
          case r: h = (g - b) / d + (g < b ? 6 : 0); break;
          case g: h = (b - r) / d + 2; break;
          case b: h = (r - g) / d + 4; break;
        }
        h /= 6;
      }
      return [Math.round(h * 360), Math.round(s * 100), Math.round(v * 100)];
    }

    // HSV to RGB
    function hsvToRgb(h, s, v) {
      s /= 100; v /= 100;
      var c = v * s;
      var x = c * (1 - Math.abs((h / 60) % 2 - 1));
      var m = v - c;
      var r = 0, g = 0, b = 0;
      if (h < 60) { r = c; g = x; b = 0; }
      else if (h < 120) { r = x; g = c; b = 0; }
      else if (h < 180) { r = 0; g = c; b = x; }
      else if (h < 240) { r = 0; g = x; b = c; }
      else if (h < 300) { r = x; g = 0; b = c; }
      else { r = c; g = 0; b = x; }
      return [Math.round((r + m) * 255), Math.round((g + m) * 255), Math.round((b + m) * 255)];
    }

    function update() {
      // Update saturation/brightness box background
      satBrightBox.style.background = 'linear-gradient(to right, #fff 0%, transparent 100%), linear-gradient(to bottom, transparent 0%, #000 100%), hsl(' + h + ', 100%, 50%)';

      // Update cursor positions
      var sbRect = satBrightBox.getBoundingClientRect();
      satBrightCursor.style.left = (s / 100 * sbRect.width) + 'px';
      satBrightCursor.style.top = ((100 - l) / 100 * sbRect.height) + 'px';

      var hbRect = hueBar.getBoundingClientRect();
      hueCursor.style.left = (h / 360 * hbRect.width) + 'px';

      // Update sliders
      hSlider.value = h;
      sSlider.value = s;
      lSlider.value = l;
      hValue.textContent = h + '°';
      sValue.textContent = s + '%';
      lValue.textContent = l + '%';

      // Compute RGB
      var rgb = hslToRgb(h, s, l);
      var hex = rgbToHex(rgb[0], rgb[1], rgb[2]);
      var hslArr = [h, s, l];
      var hsv = rgbToHsv(rgb[0], rgb[1], rgb[2]);

      // Update preview
      colorPreview.style.backgroundColor = hex;

      // Update outputs
      hexOutput.value = hex;
      rgbOutput.value = 'rgb(' + rgb.join(', ') + ')';
      rgbaOutput.value = 'rgba(' + rgb.join(', ') + ', 1)';
      hslOutput.value = 'hsl(' + h + ', ' + s + '%, ' + l + '%)';
      hsvOutput.value = 'hsv(' + hsv[0] + '°, ' + hsv[1] + '%, ' + hsv[2] + '%)';
      hexInput.value = hex;
    }

    // Saturation/Brightness picker
    var isDraggingSB = false;
    satBrightBox.addEventListener('mousedown', function(e) {
      isDraggingSB = true;
      pickSB(e);
    });
    document.addEventListener('mousemove', function(e) {
      if (isDraggingSB) pickSB(e);
    });
    document.addEventListener('mouseup', function() { isDraggingSB = false; });
    function pickSB(e) {
      var rect = satBrightBox.getBoundingClientRect();
      var x = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      var y = Math.max(0, Math.min(1, (e.clientY - rect.top) / rect.height));
      s = Math.round(x * 100);
      l = Math.round((1 - y) * 100);
      update();
    }

    // Hue bar
    var isDraggingHue = false;
    hueBar.addEventListener('mousedown', function(e) {
      isDraggingHue = true;
      pickHue(e);
    });
    document.addEventListener('mousemove', function(e) {
      if (isDraggingHue) pickHue(e);
    });
    document.addEventListener('mouseup', function() { isDraggingHue = false; });
    function pickHue(e) {
      var rect = hueBar.getBoundingClientRect();
      var x = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      h = Math.round(x * 360);
      update();
    }

    // Sliders
    hSlider.addEventListener('input', function() { h = parseInt(hSlider.value); update(); });
    sSlider.addEventListener('input', function() { s = parseInt(sSlider.value); update(); });
    lSlider.addEventListener('input', function() { l = parseInt(lSlider.value); update(); });

    // Hex input
    document.getElementById('applyHex').addEventListener('click', function() {
      var rgb = hexToRgb(hexInput.value);
      if (!rgb) { CT.showToast('无效的 HEX 颜色值'); return; }
      var hslArr = rgbToHsl(rgb[0], rgb[1], rgb[2]);
      h = hslArr[0]; s = hslArr[1]; l = hslArr[2];
      update();
    });
    hexInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('applyHex').click();
    });

    // Copy buttons
    document.querySelectorAll('.copy-btn-sm').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var targetId = this.dataset.target;
        var val = document.getElementById(targetId).value;
        navigator.clipboard.writeText(val).then(function() {
          CT.showToast('已复制：' + val);
        }).catch(function() {
          CT.showToast('复制失败');
        });
      });
    });

    // Random color
    document.getElementById('randomBtn').addEventListener('click', function() {
      h = Math.floor(Math.random() * 360);
      s = 60 + Math.floor(Math.random() * 40);
      l = 30 + Math.floor(Math.random() * 40);
      update();
    });

    // Share
    document.getElementById('shareBtn').addEventListener('click', function() {
      var url = window.location.href.split('?')[0] + '?hex=' + encodeURIComponent(hexOutput.value);
      navigator.clipboard.writeText(url).then(function() {
        CT.showToast('分享链接已复制！');
      }).catch(function() {
        CT.showToast('复制失败');
      });
    });

    // Load from URL
    var urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('hex')) {
      var rgb = hexToRgb(urlParams.get('hex'));
      if (rgb) {
        var hslArr = rgbToHsl(rgb[0], rgb[1], rgb[2]);
        h = hslArr[0]; s = hslArr[1]; l = hslArr[2];
      }
    }

    // Build palette
    var palette = [
      '#FF0000','#FF4500','#FFA500','#FFD700','#FFFF00','#9ACD32',
      '#32CD32','#00FF00','#00FA9A','#00CED1','#1E90FF','#0000FF',
      '#8A2BE2','#EE82EE','#FF69B4','#FFC0CB','#FFFFFF','#D3D3D3',
      '#A9A9A9','#808080','#404040','#000000','#006400','#8B0000'
    ];
    var paletteHtml = '';
    for (var i = 0; i < palette.length; i++) {
      paletteHtml += '<div class="palette-swatch" style="background:' + palette[i] + '" data-hex="' + palette[i] + '" title="' + palette[i] + '"></div>';
    }
    paletteGrid.innerHTML = paletteHtml;
    paletteGrid.addEventListener('click', function(e) {
      var swatch = e.target.closest('.palette-swatch');
      if (!swatch) return;
      var rgb = hexToRgb(swatch.dataset.hex);
      if (rgb) {
        var hslArr = rgbToHsl(rgb[0], rgb[1], rgb[2]);
        h = hslArr[0]; s = hslArr[1]; l = hslArr[2];
        update();
      }
    });

    update();
  </script>
</body>
</html>

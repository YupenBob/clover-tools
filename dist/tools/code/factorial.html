        <div class="tool-card"><h3>阶乘计算</h3><div style="display:flex;gap:0.5rem;align-items:center;"><input type="number" id="numInput" value="20" placeholder="输入非负整数..." style="flex:1;padding:0.5rem;border:1px solid var(--border);border-radius:8px;font-size:0.9rem;"><span style="font-size:1.2rem;font-weight:700;color:var(--primary);">!</span><button class="btn btn-primary" id="calcBtn">计算</button></div></div><div class="tool-card" style="margin-top:1rem;"><h3>计算结果 <button class="copy-btn" id="copyResult">复制</button></h3><div id="factorialResult" style="font-family:monospace;font-size:0.82rem;line-height:1.8;word-break:break-all;padding:0.5rem;background:var(--bg-secondary);border-radius:8px;min-height:60px;"></div></div><div class="tool-card" style="margin-top:1rem;"><h3>结果位数</h3><div id="digitCount" style="font-size:0.9rem;padding:0.5rem;background:var(--bg-secondary);border-radius:8px;"></div></div>

  <script>
    CT.initTheme();

    CT.initKeyboardShortcuts();

    // Share: copy current URL to clipboard
    document.getElementById("shareBtn").onclick = function() { navigator.clipboard.writeText(window.location.href).then(function() { CT.showToast("\u94fe\u63a5\u5df2\u590d\u5236\uff01"); }).catch(function() { CT.showToast("\u590d\u5236\u5931\u8d25"); }); };

    function bigFactorial(n){if(n<0)return null;if(n===0||n===1)return'1';var result='1';for(var i=2;i<=n;i++){var carry=0,t=result.length-1;result=result.split('').reverse();for(var j=0;j<=t;j++){var v=(parseInt(result[j])||0)*i+carry;result[j]=(v%10).toString();carry=Math.floor(v/10);}while(carry>0){result.push((carry%10).toString());carry=Math.floor(carry/10);}result.reverse();result=result.join('');}return result;}
document.getElementById('calcBtn').onclick=function(){var n=parseInt(document.getElementById('numInput').value);if(isNaN(n)||n<0){if(window.CT&&CT.showToast)CT.showToast('请输入非负整数');return;}if(n>3000){if(window.CT&&CT.showToast)CT.showToast('数字过大，请输入 3000 以内');return;}var result=bigFactorial(n);document.getElementById('factorialResult').innerHTML='<div style="word-break:break-all;"><b>'+n+'!</b> = <span style="color:var(--primary);font-weight:600;">'+result+'</span></div>';document.getElementById('digitCount').innerHTML='结果共 <b style="color:var(--primary);">'+result.length+'</b> 位数字';};
document.getElementById('copyResult').onclick=function(){copyToClipboard(document.getElementById('factorialResult').innerText);if(window.CT&&CT.showToast)CT.showToast('已复制');};
document.getElementById('calcBtn').click();
  </script>

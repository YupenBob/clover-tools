      <div class="tool-layout ">
        <div class="tool-card"><h3>请求配置</h3><div class="input-row" style="gap:0.5rem;flex-wrap:wrap;margin-bottom:0.5rem;"><input type="text" id="urlInput" placeholder="https://api.example.com/endpoint" style="flex:1;min-width:200px;padding:0.5rem;font-size:0.9rem;border:1px solid var(--border);border-radius:8px;"><select id="methodSelect" style="padding:0.5rem;font-size:0.9rem;border:1px solid var(--border);border-radius:8px;"><option value="GET">GET</option><option value="POST">POST</option><option value="PUT">PUT</option><option value="DELETE">DELETE</option><option value="PATCH">PATCH</option><option value="HEAD">HEAD</option><option value="OPTIONS">OPTIONS</option></select></div><div style="margin-bottom:0.5rem;"><label style="font-size:0.8rem;opacity:0.7;display:block;margin-bottom:0.3rem;">Headers (每行一个，格式: Key: Value)</label><textarea id="headersInput" placeholder="Content-Type: application/json&#10;Authorization: Bearer xxx" style="width:100%;min-height:60px;padding:0.5rem;font-size:0.85rem;border:1px solid var(--border);border-radius:8px;resize:vertical;font-family:monospace;"></textarea></div><div style="margin-bottom:0.5rem;"><label style="font-size:0.8rem;opacity:0.7;display:block;margin-bottom:0.3rem;">Body</label><textarea id="bodyInput" placeholder="{&#10;  &quot;key&quot;: &quot;value&quot;&#10;}" style="width:100%;min-height:80px;padding:0.5rem;font-size:0.85rem;border:1px solid var(--border);border-radius:8px;resize:vertical;font-family:monospace;"></textarea></div><div class="btn-row"><button class="btn btn-primary" id="sendBtn">发送请求</button></div></div><div class="output-box" id="resultBox" style="display:none;"><h3>响应</h3><div id="statusBar" style="margin-bottom:0.5rem;font-size:0.9rem;"></div><div id="respTime" style="margin-bottom:0.5rem;font-size:0.8rem;opacity:0.6;"></div><div style="margin-bottom:0.5rem;"><label style="font-size:0.8rem;opacity:0.7;">响应 Headers</label><pre id="respHeaders" style="background:#f5f5f5;padding:0.5rem;border-radius:6px;font-size:0.8rem;max-height:150px;overflow:auto;white-space:pre-wrap;word-break:break-all;margin:0.3rem 0 0;"></pre></div><div><label style="font-size:0.8rem;opacity:0.7;">响应 Body</label><textarea id="respBody" readonly style="width:100%;min-height:150px;padding:0.5rem;font-size:0.85rem;border:1px solid var(--border);border-radius:8px;resize:vertical;font-family:monospace;margin-top:0.3rem;"></textarea></div></div>

  <div id="toast"></div>

  <script>
    CT.initTheme();

    CT.initKeyboardShortcuts();

    // Share: copy current URL to clipboard
    document.getElementById("shareBtn").onclick = function() { navigator.clipboard.writeText(window.location.href).then(function() { CT.showToast("\u94fe\u63a5\u5df2\u590d\u5236\uff01"); }).catch(function() { CT.showToast("\u590d\u5236\u5931\u8d25"); }); };

    var sendBtn = document.getElementById('sendBtn');
var urlInput = document.getElementById('urlInput');
var methodSelect = document.getElementById('methodSelect');
var headersInput = document.getElementById('headersInput');
var bodyInput = document.getElementById('bodyInput');
var resultBox = document.getElementById('resultBox');
var statusBar = document.getElementById('statusBar');
var respTime = document.getElementById('respTime');
var respHeaders = document.getElementById('respHeaders');
var respBody = document.getElementById('respBody');
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
sendBtn.onclick = function() {
  var url = urlInput.value.trim();
  if (!url) { if (window.CT && CT.showToast) CT.showToast('请输入 URL'); return; }
  if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
  var method = methodSelect.value;
  var headers = {};
  headersInput.value.split('\n').forEach(function(line) {
    var idx = line.indexOf(':');
    if (idx > 0) { headers[line.slice(0, idx).trim()] = line.slice(idx + 1).trim(); }
  });
  var body = method !== 'GET' && method !== 'HEAD' ? bodyInput.value : undefined;
  var startTime = Date.now();
  sendBtn.disabled = true; sendBtn.textContent = '请求中...';
  fetch(url, { method: method, headers: headers, body: body }).then(function(res) {
    var ms = Date.now() - startTime;
    var statusColor = res.status >= 200 && res.status < 300 ? '#22c55e' : res.status >= 400 ? '#ef4444' : '#f59e0b';
    statusBar.innerHTML = '<b>状态码</b>: <span style="color:' + statusColor + ';font-weight:700;">' + res.status + '</span> <span style="opacity:0.6;">' + res.statusText + '</span>';
    respTime.textContent = '耗时: ' + ms + ' ms';
    var h = [];
    res.headers.forEach(function(v, k) { h.push(escHtml(k) + ': ' + escHtml(v)); });
    respHeaders.textContent = h.join('\n');
    return res.text().then(function(txt) { return { text: txt, contentType: res.headers.get('content-type') || '' }; });
  }).then(function(data) {
    var ct = data.contentType;
    if (ct.indexOf('json') !== -1) {
      try { respBody.value = JSON.stringify(JSON.parse(data.text), null, 2); }
      catch(e) { respBody.value = data.text; }
    } else { respBody.value = data.text; }
    resultBox.style.display = 'block';
  }).catch(function(err) {
    respBody.value = '请求错误: ' + err.message;
    resultBox.style.display = 'block';
  }).finally(function() {
    sendBtn.disabled = false; sendBtn.textContent = '发送请求';
  });
};

  </script>

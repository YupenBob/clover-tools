        <p class="description">实时测试正则表达式，高亮匹配文本，显示分组和匹配次数</p>
      </div>
      <div class="tool-layout ">
        <div class="tool-card"><h3>正则表达式</h3><div style="display:flex;gap:0.5rem;align-items:center;"><input type="text" id="regexInput" placeholder="如: \d+\.\d+" style="flex:1;padding:0.5rem;border:1px solid var(--border);border-radius:8px;font-size:0.9rem;font-family:monospace;"><select id="flagSelect" style="padding:0.4rem;border:1px solid var(--border);border-radius:8px;"><option value="g">g</option><option value="gi">gi</option><option value="gim">gim</option><option value="m">m</option></select></div><div id="regexError" style="color:#ef4444;font-size:0.8rem;margin-top:0.3rem;"></div></div><div class="tool-card" style="margin-top:1rem;"><h3>测试文本</h3><textarea id="testInput" placeholder="输入要匹配的文本..." style="width:100%;min-height:120px;padding:0.5rem;font-size:0.85rem;border:1px solid var(--border);border-radius:8px;resize:vertical;font-family:monospace;"></textarea></div><div class="tool-card" style="margin-top:1rem;"><h3>匹配结果</h3><div id="stats" style="font-size:0.85rem;margin-bottom:0.5rem;"></div><div id="highlighted" style="font-family:monospace;font-size:0.85rem;line-height:1.8;padding:0.5rem;background:var(--bg-secondary);border-radius:8px;white-space:pre-wrap;word-break:break-all;min-height:60px;"></div><div id="groups" style="margin-top:0.5rem;font-size:0.82rem;"></div></div>
      </div>
    </div>

  <div id="toast"></div>

  <script>
    CT.initTheme();

    CT.initKeyboardShortcuts();

    // Share: copy current URL to clipboard
    document.getElementById("shareBtn").onclick = function() { navigator.clipboard.writeText(window.location.href).then(function() { CT.showToast("\u94fe\u63a5\u5df2\u590d\u5236\uff01"); }).catch(function() { CT.showToast("\u590d\u5236\u5931\u8d25"); }); };

    function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function runRegex(){var pattern=document.getElementById('regexInput').value;var flags=document.getElementById('flagSelect').value;var text=document.getElementById('testInput').value;document.getElementById('regexError').textContent='';document.getElementById('highlighted').innerHTML='';document.getElementById('stats').innerHTML='';document.getElementById('groups').innerHTML='';if(!pattern)return;try{var re=new RegExp(pattern,flags);if(!text)return;var matches=[],m;if(flags.indexOf('g')!==-1){while((m=re.exec(text))!==null){matches.push(m);if(m[0].length===0)re.lastIndex++;}}else{m=text.match(re);if(m)matches=[m];}if(matches.length===0){document.getElementById('stats').innerHTML='<span style="color:#ef4444;">&#10007; 无匹配</span>';}else{document.getElementById('stats').innerHTML='<span style="color:#22c55e;">&#10003; 匹配 '+matches.length+' 处</span>';var parts=[],lastIndex=0;matches.forEach(function(m){parts.push(escHtml(text.slice(lastIndex,m.index)));parts.push('<span style="background:#dcfce7;color:#16a34a;padding:1px 3px;border-radius:3px;font-weight:700;">'+escHtml(m[0])+'</span>');lastIndex=m.index+m[0].length;});parts.push(escHtml(text.slice(lastIndex)));document.getElementById('highlighted').innerHTML=parts.join('');if(matches.length<=10){var gHtml='<div style="display:grid;gap:0.3rem;">';matches.forEach(function(m,i){gHtml+='<div style="padding:0.3rem 0.5rem;background:var(--bg-secondary);border-radius:6px;"><b>#'+(i+1)+'</b>: '+escHtml(m[0]);if(m.length>1){gHtml+=' <span style="color:var(--text-secondary);">分组: ';for(var j=1;j<m.length;j++)gHtml+='['+escHtml(m[j]||'')+'] ';gHtml+='</span>';}gHtml+=' <span style="color:var(--text-secondary);font-size:0.75rem;">位置:'+m.index+'</span></div>';});gHtml+='</div>';document.getElementById('groups').innerHTML=gHtml;}}}catch(e){document.getElementById('regexError').textContent='正则错误: '+e.message;}}
document.getElementById('regexInput').addEventListener('input',runRegex);
document.getElementById('testInput').addEventListener('input',runRegex);
document.getElementById('flagSelect').addEventListener('change',runRegex);
  </script>

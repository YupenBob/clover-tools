        <div class="tool-card"><h3>输入 JSON</h3><textarea id="input" placeholder='{"id": 1, "name": "test"}' style="width:100%;min-height:120px;padding:0.5rem;font-size:0.85rem;border:1px solid var(--border);border-radius:8px;resize:vertical;font-family:monospace;"></textarea><div class="input-row" style="margin-top:0.5rem;"><select id="langSelect" style="padding:0.4rem;font-size:0.9rem;border:1px solid var(--border);border-radius:8px;"><option value="typescript">TypeScript</option><option value="java">Java</option><option value="csharp">C#</option><option value="go">Go</option><option value="sql">SQL</option></select><button class="btn btn-primary" id="genBtn" style="margin-left:0.5rem;">生成</button></div></div><div class="output-box"><h3>输出 <button class="copy-btn" id="copyOutput">复制</button></h3><textarea id="output" readonly style="width:100%;min-height:150px;padding:0.5rem;font-size:0.85rem;border:1px solid var(--border);border-radius:8px;resize:vertical;font-family:monospace;"></textarea></div>

  <script>
    CT.initTheme();

    CT.initKeyboardShortcuts();

    // Share: copy current URL to clipboard
    document.getElementById("shareBtn").onclick = function() { navigator.clipboard.writeText(window.location.href).then(function() { CT.showToast("\u94fe\u63a5\u5df2\u590d\u5236\uff01"); }).catch(function() { CT.showToast("\u590d\u5236\u5931\u8d25"); }); };

    var input = document.getElementById('input');
var output = document.getElementById('output');
var langSelect = document.getElementById('langSelect');
var genBtn = document.getElementById('genBtn');
function esc(s) { return s.replace(/'/g, "\\'"); }
function upperFirst(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function toTypeScript(obj, name) {
  var lines = ['interface ' + upperFirst(name) + ' {'];
  Object.entries(obj).forEach(function(e) {
    var k = e[0], v = e[1];
    var t = typeof v === 'number' ? (Number.isInteger(v) ? 'number' : 'number') : typeof v === 'boolean' ? 'boolean' : typeof v === 'string' ? 'string' : 'any';
    if (Array.isArray(v)) t = t + '[]';
    lines.push('  ' + k + ': ' + t + ';');
  });
  lines.push('}');
  return lines.join('\n');
}
function toJava(obj, name) {
  var lines = ['public class ' + upperFirst(name) + ' {'];
  Object.entries(obj).forEach(function(e) {
    var k = e[0], v = e[1];
    var t = typeof v === 'number' ? (Number.isInteger(v) ? 'int' : 'double') : typeof v === 'boolean' ? 'boolean' : typeof v === 'string' ? 'String' : 'Object';
    if (Array.isArray(v)) t = 'List<' + t.replace('[]','') + '>';
    lines.push('  private ' + t + ' ' + k + ';');
    lines.push('  public ' + t + ' get' + upperFirst(k) + '() { return ' + k + '; }');
    lines.push('  public void set' + upperFirst(k) + '(' + t + ' ' + k + ') { this.' + k + ' = ' + k + '; }');
  });
  lines.push('}');
  return lines.join('\n');
}
function toCSharp(obj, name) {
  var lines = ['public class ' + upperFirst(name) + ' {'];
  Object.entries(obj).forEach(function(e) {
    var k = e[0], v = e[1];
    var t = typeof v === 'number' ? (Number.isInteger(v) ? 'int' : 'double') : typeof v === 'boolean' ? 'bool' : typeof v === 'string' ? 'string' : 'object';
    if (Array.isArray(v)) t = 'List<' + t.replace('[]','') + '>';
    lines.push('  public ' + t + ' ' + upperFirst(k) + ' { get; set; }');
  });
  lines.push('}');
  return lines.join('\n');
}
function toGo(obj, name) {
  var lines = ['type ' + upperFirst(name) + ' struct {'];
  Object.entries(obj).forEach(function(e) {
    var k = e[0], v = e[1];
    var t = typeof v === 'number' ? (Number.isInteger(v) ? 'int' : 'float64') : typeof v === 'boolean' ? 'bool' : typeof v === 'string' ? 'string' : 'interface{}';
    if (Array.isArray(v)) t = '[]' + t.replace('[]','');
    lines.push('  ' + upperFirst(k) + ' ' + t + ' `json:"' + k + '"`');
  });
  lines.push('}');
  return lines.join('\n');
}
function toSQL(obj, name) {
  var table = upperFirst(name).replace(/[^a-zA-Z0-9_]/g, '');
  var keys = Object.keys(obj);
  if (keys.length === 0) return '-- Empty object';
  var cols = keys.map(function(k) { return '  ' + k.replace(/[^a-zA-Z0-9_]/g, '_') + ' TEXT'; }).join(',\n');
  return 'CREATE TABLE ' + table + ' (\n' + cols + '\n);\n\nINSERT INTO ' + table + ' (' + keys.map(function(k) { return k.replace(/[^a-zA-Z0-9_]/g, '_'); }).join(', ') + ') VALUES\n(' + keys.map(function() { return '?'; }).join(', ') + ');';
}
genBtn.onclick = function() {
  try {
    var json = JSON.parse(input.value.trim());
    var lang = langSelect.value;
    var rootKey = 'Root';
    if (typeof json === 'object' && !Array.isArray(json)) {
      var keys = Object.keys(json);
      if (keys.length > 0) rootKey = keys[0];
    }
    if (lang === 'typescript') output.value = toTypeScript(Array.isArray(json) ? (json[0] || {}) : json, rootKey);
    else if (lang === 'java') output.value = toJava(Array.isArray(json) ? (json[0] || {}) : json, rootKey);
    else if (lang === 'csharp') output.value = toCSharp(Array.isArray(json) ? (json[0] || {}) : json, rootKey);
    else if (lang === 'go') output.value = toGo(Array.isArray(json) ? (json[0] || {}) : json, rootKey);
    else if (lang === 'sql') output.value = toSQL(Array.isArray(json) ? (json[0] || {}) : json, rootKey);
  } catch(e) { output.value = 'JSON 解析错误: ' + e.message; }
};
document.getElementById('copyOutput').onclick = function() { copyToClipboard(output.value); };
input.addEventListener('input', function() { if (input.value.trim() === '') output.value = ''; });

  </script>

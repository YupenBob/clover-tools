        <p class="description">连接 WebSocket 服务器并测试收发消息</p>
      </div>
      <div class="tool-layout ">
        <div class="tool-card"><h3>连接配置</h3><div class="input-row" style="gap:0.5rem;margin-bottom:0.5rem;"><input type="text" id="wsUrl" placeholder="wss://echo.websocket.org" style="flex:1;padding:0.5rem;font-size:0.9rem;border:1px solid var(--border);border-radius:8px;"><button class="btn btn-primary" id="connectBtn" style="padding:0.5rem 1rem;">连接</button></div><h3>发送消息</h3><div class="input-row" style="gap:0.5rem;margin-bottom:0.5rem;"><input type="text" id="wsMessage" placeholder="输入消息..." style="flex:1;padding:0.5rem;font-size:0.9rem;border:1px solid var(--border);border-radius:8px;"><button class="btn btn-secondary" id="sendBtn" style="padding:0.5rem 1rem;">发送</button></div></div><div class="output-box"><h3>消息日志</h3><div id="wsLog" style="background:#f5f5f5;border-radius:8px;padding:0.5rem;min-height:150px;max-height:300px;overflow:auto;font-family:monospace;font-size:0.82rem;white-space:pre-wrap;word-break:break-all;"></div></div>

  <div id="toast"></div>

  <script>
    CT.initTheme();

    CT.initKeyboardShortcuts();

    // Share: copy current URL to clipboard
    document.getElementById("shareBtn").onclick = function() { navigator.clipboard.writeText(window.location.href).then(function() { CT.showToast("\u94fe\u63a5\u5df2\u590d\u5236\uff01"); }).catch(function() { CT.showToast("\u590d\u5236\u5931\u8d25"); }); };

    var ws = null;
var wsLog = document.getElementById('wsLog');
var wsUrl = document.getElementById('wsUrl');
var connectBtn = document.getElementById('connectBtn');
var sendBtn = document.getElementById('sendBtn');
var wsMessage = document.getElementById('wsMessage');
function log(msg, type) {
  var cls = type === 'recv' ? 'color:#22c55e;' : type === 'err' ? 'color:#ef4444;' : 'color:#333;';
  wsLog.innerHTML += '<div style="' + cls + '">' + (type ? '[' + type.toUpperCase() + '] ' : '') + escHtml(String(msg)) + '</div>';
  wsLog.scrollTop = wsLog.scrollHeight;
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
connectBtn.onclick = function() {
  if (ws && ws.readyState === WebSocket.OPEN) { ws.close(); connectBtn.textContent = '连接'; return; }
  var url = wsUrl.value.trim();
  if (!url) { if (window.CT && CT.showToast) CT.showToast('请输入 WebSocket URL'); return; }
  try {
    ws = new WebSocket(url);
    ws.onopen = function() { log('已连接', 'info'); connectBtn.textContent = '断开'; };
    ws.onmessage = function(e) { log(e.data, 'recv'); };
    ws.onerror = function(e) { log('连接错误', 'err'); };
    ws.onclose = function() { log('连接已关闭', 'info'); connectBtn.textContent = '连接'; };
  } catch(e) { log(e.message, 'err'); }
};
sendBtn.onclick = function() {
  if (!ws || ws.readyState !== WebSocket.OPEN) { if (window.CT && CT.showToast) CT.showToast('请先建立连接'); return; }
  var msg = wsMessage.value;
  if (!msg) return;
  ws.send(msg);
  log(msg, 'send');
  wsMessage.value = '';
};
wsMessage.addEventListener('keydown', function(e) { if (e.key === 'Enter') sendBtn.click(); });

  </script>

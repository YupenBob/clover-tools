  <script>
  CT.initTheme();
  CT.initKeyboardShortcuts();

  document.getElementById('shareBtn').onclick = function() {
    navigator.clipboard.writeText(window.location.href).then(function() { CT.showToast('链接已复制！'); }).catch(function() { CT.showToast('复制失败'); });
  };

  // ── Lunar data is loaded via lunar-data.js (shared with lunar-birthday.html) ──

  var MONTHS_CN = ['正月','二月','三月','四月','五月','六月','七月','八月','九月','十月','冬月','腊月'];
  var DAYS_CN = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
    '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
    '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];

  function dayToCN(d) { return DAYS_CN[d - 1] || ''; }

  var weekdays = ['周日','周一','周二','周三','周四','周五','周六'];

  // Lunar → Solar
  function lunarToSolar(year, month, day, isLeap) {
    var yd = LUNAR_DATA[String(year)];
    if (!yd) throw new Error('年份超出范围（1900-2100）');
    var leap = yd.leap;
    var days = yd.days;
    var total = day - 1;
    if (isLeap) {
      if (month !== leap) throw new Error('该年农历' + month + '月不是闰月');
      for (var i = 0; i < days.length; i++) {
        if (i + 1 === leap + 1) { total += days[i]; break; }
        total += days[i];
      }
    } else {
      var monthIdx = 0;
      for (var i = 0; i < days.length; i++) {
        if (leap > 0 && i + 1 === leap + 1) { continue; }
        monthIdx++;
        if (monthIdx === month) break;
        total += days[i];
      }
    }
    var sp = yd.start.split('-');
    var startDate = new Date(parseInt(sp[0]), parseInt(sp[1]) - 1, parseInt(sp[2]));
    return new Date(startDate.getTime() + total * 86400000);
  }

  // Solar → Lunar
  function solarToLunar(date) {
    var y = date.getFullYear();
    var m = date.getMonth() + 1;
    var d = date.getDate();
    var result = { year: y, month: 1, day: 1, isLeap: false };

    // Find the lunar year whose start falls on or before this solar date
    var startYear = y;
    // Try current year first
    var ydStart = LUNAR_DATA[String(y)];
    if (!ydStart) throw new Error('年份超出范围（1900-2100）');
    var sp = ydStart.start.split('-');
    var lunarYearStart = new Date(parseInt(sp[0]), parseInt(sp[1]) - 1, parseInt(sp[2]));

    if (date < lunarYearStart) {
      startYear = y - 1;
      ydStart = LUNAR_DATA[String(startYear)];
      if (!ydStart) throw new Error('年份超出范围（1900-2100）');
      sp = ydStart.start.split('-');
      lunarYearStart = new Date(parseInt(sp[0]), parseInt(sp[1]) - 1, parseInt(sp[2]));
    }

    var totalDays = Math.floor((date - lunarYearStart) / 86400000);
    var days = ydStart.days;
    var leap = ydStart.leap;
    var isLeap = false;
    var lunarMonth = 1;
    var lunarDay = 1;

    // If leap month exists before the current month position, we need to account for it
    var monthIdx = 0;
    for (var i = 0; i < days.length; i++) {
      var mDays = days[i];
      if (isLeap) {
        // We're in a leap month
        if (totalDays < mDays) {
          lunarDay = totalDays + 1;
          return { year: startYear, month: monthIdx, day: lunarDay, isLeap: true };
        }
        totalDays -= mDays;
        isLeap = false;
        monthIdx++;
      } else {
        // Normal month
        if (leap > 0 && monthIdx + 1 === leap && !isLeap) {
          // This is the leap month position - check if date falls in leap month
          if (totalDays < mDays) {
            lunarDay = totalDays + 1;
            return { year: startYear, month: monthIdx + 1, day: lunarDay, isLeap: false };
          }
          totalDays -= mDays;
          isLeap = true;
        } else {
          if (totalDays < mDays) {
            lunarDay = totalDays + 1;
            return { year: startYear, month: monthIdx + 1, day: lunarDay, isLeap: false };
          }
          totalDays -= mDays;
          monthIdx++;
        }
      }
    }
    // Fallback: remaining days into last month
    return { year: startYear, month: monthIdx, day: totalDays + 1, isLeap: isLeap };
  }

  function showResult(fromLabel, fromVal, toLabel, toVal, weekday, lunarYear) {
    document.getElementById('resFromLabel').textContent = fromLabel;
    document.getElementById('resFrom').textContent = fromVal;
    document.getElementById('resToLabel').textContent = toLabel;
    document.getElementById('resTo').textContent = toVal;
    document.getElementById('resWeekday').textContent = weekday;
    var yrRow = document.getElementById('resYearRow');
    if (lunarYear !== null) {
      yrRow.style.display = 'flex';
      document.getElementById('resYear').textContent = lunarYear + ' 年（' + (lunarYear < 0 ? '公元前' + Math.abs(lunarYear) + '年' : lunarYear + ' 年') + '）';
    } else {
      yrRow.style.display = 'none';
    }
    document.getElementById('resultBox').style.display = 'block';
  }

  // Tab switching
  document.getElementById('tabSolar').addEventListener('click', function() {
    document.getElementById('tabSolar').classList.add('active');
    document.getElementById('tabLunar').classList.remove('active');
    document.getElementById('panelSolar').classList.add('active');
    document.getElementById('panelLunar').classList.remove('active');
    document.getElementById('resultBox').style.display = 'none';
  });
  document.getElementById('tabLunar').addEventListener('click', function() {
    document.getElementById('tabLunar').classList.add('active');
    document.getElementById('tabSolar').classList.remove('active');
    document.getElementById('panelLunar').classList.add('active');
    document.getElementById('panelSolar').classList.remove('active');
    document.getElementById('resultBox').style.display = 'none';
  });

  // Populate year select
  (function() {
    var sel = document.getElementById('lunarYear');
    var html = '';
    for (var y = 2005; y >= 1900; y--) {
      html += '<option value="' + y + '">' + y + ' 年</option>';
    }
    sel.innerHTML = html;

    // Populate day select
    var daySel = document.getElementById('lunarDay');
    var dayHtml = '';
    for (var d = 1; d <= 30; d++) {
      dayHtml += '<option value="' + d + '">' + dayToCN(d) + '</option>';
    }
    daySel.innerHTML = dayHtml;
  })();

  // Solar → Lunar
  document.getElementById('btnSolarToLunar').addEventListener('click', function() {
    try {
      var y = parseInt(document.getElementById('solarYear').value);
      var m = parseInt(document.getElementById('solarMonth').value);
      var d = parseInt(document.getElementById('solarDay').value);
      if (!y || !m || !d || y < 1900 || y > 2100 || m < 1 || m > 12 || d < 1 || d > 31) {
        CT.showToast('请输入有效的公历日期');
        return;
      }
      var date = new Date(y, m - 1, d);
      var lr = solarToLunar(date);
      var leapStr = lr.isLeap ? '（闰）' : '';
      var lunarDateStr = lr.year + ' 年 ' + MONTHS_CN[lr.month - 1] + leapStr + ' ' + dayToCN(lr.day);
      var solarStr = y + ' 年 ' + m + ' 月 ' + d + ' 日';
      showResult('公历日期', solarStr, '农历日期', lunarDateStr, weekdays[date.getDay()], null);
    } catch(e) {
      CT.showToast(e.message || '转换失败');
    }
  });

  // Lunar → Solar
  document.getElementById('btnLunarToSolar').addEventListener('click', function() {
    try {
      var year = parseInt(document.getElementById('lunarYear').value);
      var month = parseInt(document.getElementById('lunarMonth').value);
      var day = parseInt(document.getElementById('lunarDay').value);
      var isLeap = document.getElementById('leapMonth').checked;
      var solar = lunarToSolar(year, month, day, isLeap);
      var leapStr = isLeap ? '（闰）' : '';
      var lunarStr = year + ' 年 ' + MONTHS_CN[month - 1] + leapStr + ' ' + dayToCN(day);
      var solarStr = solar.getFullYear() + ' 年 ' + (solar.getMonth() + 1) + ' 月 ' + solar.getDate() + ' 日';
      showResult('农历日期', lunarStr, '公历日期', solarStr, weekdays[solar.getDay()], null);
    } catch(e) {
      CT.showToast(e.message || '转换失败');
    }
  });
  </script>

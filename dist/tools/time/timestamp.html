    /* Tabs */

    .tab-btn {
      padding: 0.6rem 1.2rem;
      border: 2px solid var(--border);

    .tab-btn:hover { border-color: var(--primary); }
    .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Live clock */
    .live-clock {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }
    .live-clock .label { font-size: 0.8rem; color: var(--text-2); margin-bottom: 0.3rem; }
    .live-clock .timestamp-row { display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; }
    .live-clock .ts-value { font-size: 1.5rem; font-weight: 700; color: var(--primary); font-family: monospace; }
    .live-clock .ts-unit { font-size: 0.75rem; color: var(--text-2); }

    /* Input group */
    .input-group { margin-bottom: 1rem; }
    .input-group label { display: block; font-size: 0.85rem; color: var(--text-2); margin-bottom: 0.3rem; }
    .input-group input {
      width: 100%;
      padding: 0.55rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 0.5rem;
      background: var(--surface);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      box-sizing: border-box;
    }
    .input-group input:focus { outline: none; border-color: var(--primary); }

    /* Date inputs row */
    .date-inputs { display: grid; grid-template-columns: repeat(6, 1fr); gap: 0.5rem; }
    @media (max-width: 600px) { .date-inputs { grid-template-columns: repeat(3, 1fr); } }

    /* Result box */
    .result-box {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1rem 1.25rem;
      margin-top: 1rem;
    }
    .result-box .result-label { font-size: 0.8rem; color: var(--text-2); margin-bottom: 0.5rem; }
    .result-box .result-value { font-size: 1.1rem; font-weight: 600; color: var(--text); margin-bottom: 0.3rem; word-break: break-all; }
    .result-box .result-copy { margin-top: 0.5rem; }

    .btn-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
    .btn {
      padding: 0.55rem 1.2rem;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--primary); }
    .btn-sm { padding: 0.35rem 0.8rem; font-size: 0.8rem; }

    .copy-btn {
      padding: 0.3rem 0.8rem;
      font-size: 0.8rem;
      border: 1px solid var(--border);
      border-radius: 0.4rem;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      vertical-align: middle;
    }
    .copy-btn:hover { border-color: var(--primary); color: var(--primary); }
  </style>

  <header class="site-header">
  <div class="container">
    <a href="/" class="site-logo">🍀 CloverTools</a>
    <nav class="site-nav">
      <a href="/" class="nav-icon-link" title="工具首页"><svg class="nav-icon" aria-hidden="true"><use href="#icon-home"/></svg><span>工具</span></a>
      <a href="https://github.com/YupenBob/clover-tools" target="_blank" class="nav-icon-link" title="GitHub"><svg class="nav-icon" aria-hidden="true"><use href="#icon-github"/></svg><span>GitHub</span></a>
      <button class="theme-toggle" id="themeToggle" title="切换主题">☀️</button>
    </nav>

  <main class="page-body">
    <div class="container">
      <div class="breadcrumb"><a href="/">← 返回工具箱</a></div>
      <div class="tool-header">
        <h1>Unix时间戳转换</h1>
        <p class="description">时间戳与日期互转，支持秒/毫秒</p>
      </div>

      <!-- Live Clock -->
      <div class="live-clock">
        <div class="label">当前时间戳</div>
        <div class="timestamp-row">
          <div>
            <div class="ts-value" id="liveSeconds">—</div>
            <div class="ts-unit">秒 (s)</div>
          </div>
          <div>
            <div class="ts-value" id="liveMs">—</div>
            <div class="ts-unit">毫秒 (ms)</div>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" id="tabTs2Date">时间戳 → 日期</button>
        <button class="tab-btn" id="tabDate2Ts">日期 → 时间戳</button>
      </div>

      <!-- Panel 1: Timestamp to Date -->
      <div class="tab-panel active" id="panelTs2Date">
        <div class="input-group">
          <label>输入时间戳（秒或毫秒，自动识别）</label>
          <input type="text" id="tsInput" placeholder="例如：1712832000 或 1712832000000">
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" id="convertTs">转换</button>
        </div>
        <div class="result-box" id="tsResult" style="display:none;">
          <div class="result-label">转换结果</div>
          <div class="result-value" id="tsLocal"></div>
          <div class="result-value" id="tsUtc" style="font-size:0.9rem; color:var(--text-2);"></div>
          <div class="result-copy">
            <button class="copy-btn" id="copyTsResult">复制结果</button>
          </div>
        </div>
      </div>

      <!-- Panel 2: Date to Timestamp -->
      <div class="tab-panel" id="panelDate2Ts">
        <div class="date-inputs">
          <div class="input-group">
            <label>年</label>
            <input type="number" id="dYear" placeholder="2024">
          </div>
          <div class="input-group">
            <label>月</label>
            <input type="number" id="dMonth" placeholder="1-12" min="1" max="12">
          </div>
          <div class="input-group">
            <label>日</label>
            <input type="number" id="dDay" placeholder="1-31" min="1" max="31">
          </div>
          <div class="input-group">
            <label>时</label>
            <input type="number" id="dHour" placeholder="0-23" min="0" max="23">
          </div>
          <div class="input-group">
            <label>分</label>
            <input type="number" id="dMin" placeholder="0-59" min="0" max="59">
          </div>
          <div class="input-group">
            <label>秒</label>
            <input type="number" id="dSec" placeholder="0-59" min="0" max="59">
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" id="convertDate">转换</button>
        </div>
        <div class="result-box" id="dateResult" style="display:none;">
          <div class="result-label">转换结果</div>
          <div class="result-value" id="dateTsSec"></div>
          <div class="result-value" id="dateTsMs" style="font-size:0.9rem; color:var(--text-2);"></div>
          <div class="result-copy">
            <button class="copy-btn" id="copyDateResult">复制结果</button>
          </div>
        </div>
      </div>

    </div>

  <button class="share-btn" id="shareBtn" title="分享此工具"><svg class="share-icon" aria-hidden="true"><use href="#icon-share"/></svg>分享</button>
<footer class="site-footer">
  <div class="site-footer-inner">

  </div>
</footer>

  <div id="toast"></div>

  <script>
    CT.initTheme();
    CT.initKeyboardShortcuts();

    // Share
    document.getElementById("shareBtn").onclick = function() {
      navigator.clipboard.writeText(window.location.href).then(function() {
        CT.showToast("链接已复制！");
      }).catch(function() {
        CT.showToast("复制失败");
      });
    };

    // Live clock update
    function updateLiveClock() {
      const now = Date.now();
      const sec = Math.floor(now / 1000);
      const ms = now;
      document.getElementById('liveSeconds').textContent = sec;
      document.getElementById('liveMs').textContent = ms;
    }
    updateLiveClock();
    setInterval(updateLiveClock, 1000);

    // Tab switching
    document.getElementById('tabTs2Date').onclick = function() {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      this.classList.add('active');
      document.getElementById('panelTs2Date').classList.add('active');
    };
    document.getElementById('tabDate2Ts').onclick = function() {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      this.classList.add('active');
      document.getElementById('panelDate2Ts').classList.add('active');
    };

    // Helper: pad zero
    function pad(n, len) { return String(n).padStart(len, '0'); }

    // Helper: format date in local timezone
    function formatLocal(d) {
      const y = d.getFullYear();
      const mo = pad(d.getMonth() + 1, 2);
      const day = pad(d.getDate(), 2);
      const h = pad(d.getHours(), 2);
      const mi = pad(d.getMinutes(), 2);
      const s = pad(d.getSeconds(), 2);
      return y + '-' + mo + '-' + day + ' ' + h + ':' + mi + ':' + s;
    }

    // Helper: format date in UTC
    function formatUTC(d) {
      return d.getUTCFullYear() + '-' + pad(d.getUTCMonth() + 1, 2) + '-' + pad(d.getUTCDate(), 2)
        + ' ' + pad(d.getUTCHours(), 2) + ':' + pad(d.getUTCMinutes(), 2) + ':' + pad(d.getUTCSeconds(), 2) + ' UTC';
    }

    // Panel 1: Timestamp → Date
    document.getElementById('convertTs').onclick = function() {
      const val = document.getElementById('tsInput').value.trim();
      if (!val) return;
      const num = parseInt(val, 10);
      if (isNaN(num)) { CT.showToast('请输入有效的时间戳'); return; }
      // Auto-detect: if > 1e11 it's ms, else seconds
      const tsMs = num > 1e11 ? num : num * 1000;
      const d = new Date(tsMs);
      if (isNaN(d.getTime())) { CT.showToast('时间戳无效'); return; }
      document.getElementById('tsLocal').textContent = '本地: ' + formatLocal(d);
      document.getElementById('tsUtc').textContent = 'UTC: ' + formatUTC(d);
      document.getElementById('tsResult').style.display = 'block';
    };

    document.getElementById('copyTsResult').onclick = function() {
      const local = document.getElementById('tsLocal').textContent;
      const utc = document.getElementById('tsUtc').textContent;
      navigator.clipboard.writeText(local + '\n' + utc).then(function() {
        CT.showToast('已复制！');
      }).catch(function() {
        CT.showToast('复制失败');
      });
    };

    // Panel 2: Date → Timestamp
    document.getElementById('convertDate').onclick = function() {
      const y = parseInt(document.getElementById('dYear').value, 10);
      const mo = parseInt(document.getElementById('dMonth').value, 10);
      const day = parseInt(document.getElementById('dDay').value, 10);
      const h = parseInt(document.getElementById('dHour').value, 10) || 0;
      const mi = parseInt(document.getElementById('dMin').value, 10) || 0;
      const s = parseInt(document.getElementById('dSec').value, 10) || 0;
      if (isNaN(y) || isNaN(mo) || isNaN(day)) {
        CT.showToast('请填写年、月、日'); return;
      }
      const d = new Date(y, mo - 1, day, h, mi, s);
      if (isNaN(d.getTime())) { CT.showToast('日期无效'); return; }
      const tsSec = Math.floor(d.getTime() / 1000);
      const tsMs = d.getTime();
      document.getElementById('dateTsSec').textContent = '秒: ' + tsSec;
      document.getElementById('dateTsMs').textContent = '毫秒: ' + tsMs;
      document.getElementById('dateResult').style.display = 'block';
    };

    document.getElementById('copyDateResult').onclick = function() {
      const sec = document.getElementById('dateTsSec').textContent;
      const ms = document.getElementById('dateTsMs').textContent;
      navigator.clipboard.writeText(sec + '\n' + ms).then(function() {
        CT.showToast('已复制！');
      }).catch(function() {
        CT.showToast('复制失败');
      });
    };
  </script>
</body>

  <div id="toast"></div>

  <script>
    CT.initTheme();
    CT.initKeyboardShortcuts();

    // Share: copy current URL to clipboard
    document.getElementById("shareBtn").onclick = function() { navigator.clipboard.writeText(window.location.href).then(function() { CT.showToast("链接已复制！"); }).catch(function() { CT.showToast("复制失败"); }); };

    
    // Pomodoro Timer Logic
    const WORK_MIN = 25;
    const BREAK_MIN = 5;
    const LONG_BREAK_MIN = 15;
    const SESSIONS_BEFORE_LONG_BREAK = 4;

    let timerInterval = null;
    let remaining = WORK_MIN * 60 * 1000; // ms
    let isRunning = false;
    let currentSession = 1;
    let currentPhase = 'work'; // 'work' | 'break' | 'longBreak'

    const display = document.getElementById('timerDisplay');
    const timerLabel = document.getElementById('timerLabel');
    const sessionNum = document.getElementById('sessionNum');
    const sessionPhase = document.getElementById('sessionPhase');
    const sessionDots = document.getElementById('sessionDots');
    const startBtn = document.getElementById('startBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const resetBtn = document.getElementById('resetBtn');
    const skipBtn = document.getElementById('skipBtn');

    function formatTime(ms) {
      const totalSec = Math.ceil(ms / 1000);
      const m = Math.floor(totalSec / 60);
      const s = totalSec % 60;
      return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    function updateDisplay() {
      display.textContent = formatTime(remaining);
    }

    function updateSessionDots() {
      const dots = sessionDots.querySelectorAll('.session-dot');
      const cyclePos = (currentSession - 1) % SESSIONS_BEFORE_LONG_BREAK;
      dots.forEach((dot, i) => {
        dot.className = 'session-dot';
        if (i < cyclePos) {
          dot.classList.add('completed');
        } else if (i === cyclePos && currentPhase === 'work') {
          dot.classList.add('current');
        }
      });
    }

    function updateUI() {
      if (currentPhase === 'work') {
        display.classList.remove('break');
        timerLabel.innerHTML = '<span class="emoji">🍅</span>工作时间';
        sessionPhase.textContent = '🍅 工作时间';
      } else if (currentPhase === 'break') {
        display.classList.add('break');
        timerLabel.innerHTML = '<span class="emoji">☕</span>短暂休息';
        sessionPhase.textContent = '☕ 短暂休息';
      } else {
        display.classList.add('break');
        timerLabel.innerHTML = '<span class="emoji">🌿</span>长时间休息';
        sessionPhase.textContent = '🌿 长时间休息';
      }
      sessionNum.textContent = currentSession;
      updateSessionDots();
    }

    function getPhaseDuration() {
      if (currentPhase === 'work') return WORK_MIN * 60 * 1000;
      if (currentPhase === 'break') return BREAK_MIN * 60 * 1000;
      return LONG_BREAK_MIN * 60 * 1000;
    }

    function start() {
      if (isRunning) return;
      isRunning = true;
      startBtn.disabled = true;
      pauseBtn.disabled = false;
      skipBtn.disabled = false;
      timerInterval = setInterval(() => {
        remaining -= 1000;
        if (remaining <= 0) {
          remaining = 0;
          tick();
        }
        updateDisplay();
      }, 1000);
    }

    function pause() {
      if (!isRunning) return;
      isRunning = false;
      clearInterval(timerInterval);
      startBtn.disabled = false;
      pauseBtn.disabled = true;
    }

    function reset() {
      pause();
      currentSession = 1;
      currentPhase = 'work';
      remaining = WORK_MIN * 60 * 1000;
      updateDisplay();
      updateUI();
      startBtn.disabled = false;
      pauseBtn.disabled = true;
      skipBtn.disabled = true;
    }

    function skip() {
      clearInterval(timerInterval);
      isRunning = false;
      tick();
    }

    function tick() {
      if (currentPhase === 'work') {
        // Work phase finished
        const cyclePos = (currentSession - 1) % SESSIONS_BEFORE_LONG_BREAK;
        if (cyclePos === SESSIONS_BEFORE_LONG_BREAK - 1) {
          // Long break after 4 sessions
          currentPhase = 'longBreak';
          remaining = LONG_BREAK_MIN * 60 * 1000;
        } else {
          currentPhase = 'break';
          remaining = BREAK_MIN * 60 * 1000;
        }
      } else {
        // Break finished → next work session
        if (currentPhase === 'longBreak') {
          currentSession = 1;
        } else {
          currentSession++;
        }
        currentPhase = 'work';
        remaining = WORK_MIN * 60 * 1000;
      }
      isRunning = false;
      updateDisplay();
      updateUI();
      startBtn.disabled = false;
      pauseBtn.disabled = true;
      skipBtn.disabled = true;
      CT.showToast(currentPhase === 'work' ? '🍅 开始专注！' : '☕ 休息一下吧！');
    }

    startBtn.addEventListener('click', start);
    pauseBtn.addEventListener('click', pause);
    resetBtn.addEventListener('click', reset);
    skipBtn.addEventListener('click', skip);

    // Init
    updateDisplay();
    updateUI();
  
  </script>

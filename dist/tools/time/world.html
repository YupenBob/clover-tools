<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>世界各地时间 - CloverTools</title>
  <link rel="stylesheet" href="../../src/shared.css">
  <style>
    /* Tool page layout - override defaults */
    .page-body { padding: 2.5rem 0 4rem; }
    .breadcrumb { font-size: 0.85rem; opacity: 0.6; margin-bottom: 0.5rem; }
    .breadcrumb a { color: var(--primary); text-decoration: none; }
  </style>
  <!-- Plausible analytics - privacy-friendly, no cookies -->
  <script defer data-domain="tools.xsanye.cn" src="https://plausible.io/js/script.tagged-events.js"></script>
  <script>window.plausible = window.plausible || function() { (window.plausible.q = window.plausible.q || []).push(arguments) }</script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-logo">🍀 CloverTools</a>
      <nav class="site-nav">
        <a href="/">工具</a>
        <a href="https://github.com/YupenBob/clover-tools" target="_blank">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="page-body">
    <div class="container">
      <div class="breadcrumb"><a href="/">← 返回工具箱</a></div>
      <div class="tool-header">
        <h1>世界各地时间</h1>
        <p class="description">查看全球主要城市时间</p>
      </div>
      <div class="tool-layout ">
        
      <div class="tool-card">
        <h3>世界各地时间</h3>
        <div id="zones" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:0.5rem;"></div>
      </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>Made with 🍀 by Clover · Open Source · No tracking · No server</p>
  </footer>

  <div id="toast"></div>

  <script>
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => showToast('复制成功！')).catch(() => showToast('复制失败'));
    }

    
      const zones = [
        {name:'北京',offset:8},{name:'东京',offset:9},{name:'首尔',offset:9},{name:'新加坡',offset:8},
        {name:'迪拜',offset:4},{name:'莫斯科',offset:3},{name:'伦敦',offset:0},{name:'巴黎',offset:1},
        {name:'纽约',offset:-5},{name:'洛杉矶',offset:-8},{name:'悉尼',offset:10},{name:'东京',offset:9}
      ];
      const container = document.getElementById('zones');
      function showTimes() {
        const now = new Date();
        container.innerHTML = zones.map(z => {
          const t = new Date(now.getTime() + (z.offset - 8) * 3600000);
          return '<div class="zone-card"><b>' + z.name + '</b><span>' + t.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'}) + '</span></div>';
        }).join('');
      }
      showTimes();
      setInterval(showTimes, 1000);
    
  </script>
</body>
</html>

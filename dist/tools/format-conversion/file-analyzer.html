  <div id="toast"></div>

  <script>
    CT.initTheme();

    CT.initKeyboardShortcuts();

    // Share: copy current URL to clipboard
    document.getElementById("shareBtn").onclick = function() { navigator.clipboard.writeText(window.location.href).then(function() { CT.showToast("\u94fe\u63a5\u5df2\u590d\u5236\uff01"); }).catch(function() { CT.showToast("\u590d\u5236\u5931\u8d25"); }); };

    var MAGIC = {
  'ffd8ff': 'JPEG 图片',
  '89504e47': 'PNG 图片',
  '47494638': 'GIF 图片',
  '25504446': 'PDF 文档',
  '504b0304': 'ZIP 压缩包 / Office 文档',
  '52617221': 'RAR 压缩包',
  '377abcaf': '7Z 压缩包',
  '424d': 'BMP 图片',
  '49492a00': 'TIFF 图片 (Intel)',
  '4d4d002a': 'TIFF 图片 (Motorola)',
  '57415645': 'WAV 音频',
  '664c6143': 'FLAC 音频',
  '4f676753': 'OGG 媒体',
  '000001ba': 'MPEG 视频 (PS)',
  '000001b3': 'MPEG 视频 (ES)',
  '66747970': 'MP4/M4V 视频',
  '1a45dfa3': 'Matroska (MKV) 视频',
  '504b03040a': 'DOCX/XLSX/PPTX (Office 2007+)',
  '3c3f786d': 'XML 文档'
};
var fileInput = document.getElementById('fileInput');
var uploadArea = document.getElementById('uploadArea');
var fileInfo = document.getElementById('fileInfo');
uploadArea.addEventListener('click', function() { fileInput.click(); });
uploadArea.addEventListener('dragover', function(e) { e.preventDefault(); uploadArea.style.borderColor = 'var(--primary)'; });
uploadArea.addEventListener('dragleave', function() { uploadArea.style.borderColor = 'var(--border)'; });
uploadArea.addEventListener('drop', function(e) { e.preventDefault(); uploadArea.style.borderColor = 'var(--border)'; if (e.dataTransfer.files[0]) analyzeFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', function() { if (fileInput.files[0]) analyzeFile(fileInput.files[0]); });
function bytesToHex(bytes) { return Array.from(bytes).map(function(b) { return b.toString(16).padStart(2, '0'); }).join(''); }
function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  if (bytes < 1073741824) return (bytes / 1048576).toFixed(2) + ' MB';
  return (bytes / 1073741824).toFixed(2) + ' GB';
}
function detectType(bytes) {
  var hex = bytesToHex(bytes).toLowerCase();
  for (var m in MAGIC) { if (hex.startsWith(m.toLowerCase())) return MAGIC[m]; }
  return '未知格式';
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function analyzeFile(file) {
  fileInfo.style.display = 'block';
  fileInfo.innerHTML = '<div style="font-size:0.9rem;line-height:1.8;"><div><b>文件名</b>: ' + escHtml(file.name) + '</div><div><b>文件大小</b>: ' + fmtSize(file.size) + '</div><div><b>MIME 类型</b>: ' + escHtml(file.type || '未知') + '</div><div id="magicResult">正在检测...</div></div>';
  var reader = new FileReader();
  reader.onload = function(e) {
    var bytes = new Uint8Array(e.target.result.slice(0, 32));
    var hex = bytesToHex(bytes).toUpperCase();
    var magicType = detectType(bytes);
    var magicEl = document.getElementById('magicResult');
    var html = '<b>魔数 (Magic Bytes)</b>: <code style="font-size:0.78rem;background:#f0f0f0;padding:2px 6px;border-radius:4px;word-break:break-all;">' + hex + '</code> <b>检测类型</b>: ' + escHtml(magicType);
    if (file.type && file.type.startsWith('image/') || magicType.indexOf('图片') !== -1) {
      var img = new Image();
      img.onload = function() { magicEl.innerHTML = html + ' <b>图片尺寸</b>: ' + img.width + ' x ' + img.height + ' px'; };
      img.onerror = function() { magicEl.innerHTML = html; };
      img.src = e.target.result;
    } else { magicEl.innerHTML = html; }
  };
  reader.readAsArrayBuffer(file.slice(0, 32));
}

function handleFile(file) {

  fileInfo.innerHTML = '<b>' + escHtml(file.name) + '</b> (' + (file.size / 1024).toFixed(1) + ' KB, ' + (file.type || '未知') + ')';
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function downloadDataUrl(dataUrl, filename) {
  var a = document.createElement('a');
  a.href = dataUrl;
  a.download = filename;
  a.click();
}
function imgToPdf(file, callback) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var w = img.width, h = img.height;
      var canv = document.createElement('canvas');
      canv.width = w; canv.height = h;
      var ctx = canv.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, w, h);
      ctx.drawImage(img, 0, 0);
      var imgData = canv.toDataURL('image/jpeg', 0.95);
      var newName = currentFileName.replace(/\.[^.]+$/, '') + '.pdf';
      // jsPDF approach
      if (typeof window.jspdf !== 'undefined') {
        var pdf = new window.jspdf.jsPDF({ orientation: w > h ? 'landscape' : 'portrait', unit: 'px', format: [w, h] });
        pdf.addImage(imgData, 'JPEG', 0, 0, w, h);
        pdf.save(newName);
        callback({ dataUrl: null, filename: newName, preview: '<img src="' + imgData + '" style="max-width:100%;max-height:300px;border:1px solid var(--border);border-radius:8px;">' });
      } else {
        // Load jspdf from CDN
        var script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
        script.onload = function() {
          var pdf = new window.jspdf.jsPDF({ orientation: w > h ? 'landscape' : 'portrait', unit: 'px', format: [w, h] });
          pdf.addImage(imgData, 'JPEG', 0, 0, w, h);
          pdf.save(newName);
          callback({ dataUrl: null, filename: newName, preview: '<img src="' + imgData + '" style="max-width:100%;max-height:300px;border:1px solid var(--border);border-radius:8px;">' });
        };
        script.onerror = function() {
          // Fallback: HTML printable page
          var blob = new Blob(['<!DOCTYPE html><html><head><meta charset="utf-8"><title>', escHtml(newName), '</title><style>body{margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f0f0f0}img{max-width:90vw;max-height:90vh;object-fit:contain;background:#fff}@media print{body{background:none}img{max-height:none}}</style></head><body><img src="', imgData, '" onload="window.print()"></body></html>'], { type: 'text/html' });
          var url = URL.createObjectURL(blob);
          callback({ dataUrl: url, filename: newName, preview: '<img src="' + imgData + '" style="max-width:100%;max-height:300px;border:1px solid var(--border);border-radius:8px;">' });
        };
        document.head.appendChild(script);
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function pdfToText(file, callback) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var go = function() {
      window.pdfjsLib.getDocument(e.target.result).promise.then(function(pdf) {
        var promises = [];
        for (var i = 1; i <= Math.min(pdf.numPages, 20); i++) {
          promises.push(pdf.getPage(i).then(function(p) { return p.getTextContent().then(function(c) { return c.items.map(function(it) { return it.str; }).join(' '); }); }));
        }
        Promise.all(promises).then(function(pages) {
          var text = pages.join('\n\n');
          var blob = new Blob([text], { type: 'text/plain' });
          var newName = currentFileName.replace(/\.[^.]+$/, '') + '.txt';
          callback({ dataUrl: URL.createObjectURL(blob), filename: newName, preview: '<div style="text-align:left;max-height:400px;overflow:auto;background:var(--bg);padding:1rem;border-radius:8px;font-family:monospace;white-space:pre-wrap;word-break:break-all;">' + escHtml(text) + '</div>' });
        });
      }).catch(function(err) { callback({ dataUrl: null, filename: '', preview: '<div style="color:#ef4444;">PDF 解析错误: ' + escHtml(err.message) + '</div>' }); });
    };
    if (window.pdfjsLib) { go(); }
    else {
      var s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s.onload = function() {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        go();
      };
      s.onerror = function() { callback({ dataUrl: null, filename: '', preview: '<div style="color:#ef4444;">PDF.js 加载失败，请检查网络</div>' }); };
      document.head.appendChild(s);
    }
  };
  reader.readAsArrayBuffer(file);
}
function imgToImg(file, mimeOut, extOut, callback) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var canv = document.createElement('canvas');
      canv.width = img.width; canv.height = img.height;
      var ctx = canv.getContext('2d');
      ctx.drawImage(img, 0, 0);
      canv.toBlob(function(blob) {
        var url = URL.createObjectURL(blob);
        var newName = currentFileName.replace(/\.[^.]+$/, '') + '.' + extOut;
        callback({ dataUrl: url, filename: newName, preview: '<img src="' + url + '" style="max-width:100%;max-height:300px;border:1px solid var(--border);border-radius:8px;">' });
      }, mimeOut, 0.95);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
function svgToPng(file, callback) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var svgData = e.target.result;
    var img = new Image();
    img.onload = function() {
      var canv = document.createElement('canvas');
      canv.width = img.width || 800; canv.height = img.height || 600;
      var ctx = canv.getContext('2d');
      ctx.drawImage(img, 0, 0);
      canv.toBlob(function(blob) {
        var url = URL.createObjectURL(blob);
        var newName = currentFileName.replace(/\.[^.]+$/, '') + '.png';
        callback({ dataUrl: url, filename: newName, preview: '<img src="' + url + '" style="max-width:100%;max-height:300px;border:1px solid var(--border);border-radius:8px;">' });
      }, 'image/png');
    };
    img.onerror = function() { callback({ dataUrl: null, filename: '', preview: '<div style="color:#ef4444;">SVG 解析失败</div>' }); };
    img.src = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
  };
  reader.readAsText(file);
}
function pdfToImg(file, mimeOut, extOut, callback) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var go = function() {
      window.pdfjsLib.getDocument(e.target.result).promise.then(function(pdf) {
        pdf.getPage(1).then(function(page) {
          var vpt = page.getViewport({ scale: 2 });
          var canv = document.createElement('canvas');
          canv.width = vpt.width; canv.height = vpt.height;
          page.render({ canvasContext: canv.getContext('2d'), viewport: vpt }).promise.then(function() {
            var dataUrl = canv.toDataURL(mimeOut, 0.95);
            var newName = currentFileName.replace(/\.[^.]+$/, '') + '_page1.' + extOut;
            callback({ dataUrl: dataUrl, filename: newName, preview: '<img src="' + dataUrl + '" style="max-width:100%;max-height:300px;border:1px solid var(--border);border-radius:8px;">' });
          });
        });
      }).catch(function(err) { callback({ dataUrl: null, filename: '', preview: '<div style="color:#ef4444;">PDF 渲染错误: ' + escHtml(err.message) + '</div>' }); });
    };
    if (window.pdfjsLib) { go(); }
    else {
      var s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s.onload = function() { window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; go(); };
      s.onerror = function() { callback({ dataUrl: null, filename: '', preview: '<div style="color:#ef4444;">PDF.js 加载失败</div>' }); };
      document.head.appendChild(s);
    }
  };
  reader.readAsArrayBuffer(file);
}
function pdfToHtml(file, callback) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var go = function() {
      window.pdfjsLib.getDocument(e.target.result).promise.then(function(pdf) {
        pdf.getPage(1).then(function(page) {
          var vpt = page.getViewport({ scale: 2 });
          var canv = document.createElement('canvas');
          canv.width = vpt.width; canv.height = vpt.height;
          page.render({ canvasContext: canv.getContext('2d'), viewport: vpt }).promise.then(function() {
            var dataUrl = canv.toDataURL('image/png');
            callback({ dataUrl: null, filename: currentFileName.replace(/\.[^.]+$/, '') + '.html', preview: '<div style="text-align:center;padding:1rem;"><img src="' + dataUrl + '" style="max-width:100%;border:1px solid #ddd;border-radius:8px;"></div>' });
          });
        });
      }).catch(function(err) { callback({ dataUrl: null, filename: '', preview: '<div style="color:#ef4444;">' + escHtml(err.message) + '</div>' }); });
    };
    if (window.pdfjsLib) { go(); }
    else {
      var s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
      s.onload = function() { window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; go(); };
      s.onerror = function() { callback({ dataUrl: null, filename: '', preview: '<div style="color:#ef4444;">PDF.js 加载失败</div>' }); };
      document.head.appendChild(s);
    }
  };
  reader.readAsArrayBuffer(file);
}
convertBtn.onclick = function() {
  if (!fileInput.files || fileInput.files.length === 0) { outputBox.style.display = 'none'; if (window.CT && CT.showToast) CT.showToast('请先上传文件'); return; }
  var file = fileInput.files[0];
  var outFmt = outputFormat.value;
  var isJpg2pdf = toolPath.indexOf('jpg2pdf') !== -1;
  var isPdf2txt = toolPath.indexOf('pdf2txt') !== -1;
  var isWebp2jpg = toolPath.indexOf('webp2jpg') !== -1;
  var isSvg2png = toolPath.indexOf('svg2png') !== -1;
  var isJpg2webp = toolPath.indexOf('jpg2webp') !== -1;
  var isPng2webp = toolPath.indexOf('png2webp') !== -1;
  var isPdf2jpg = toolPath.indexOf('pdf2jpg') !== -1;
  var isPdf2html = toolPath.indexOf('pdf2html') !== -1;
  var onDone = function(result) {
    outputPreview.innerHTML = result.preview || '';
    outputBox.style.display = 'block';
    window._fcResult = result;
  };
  if (isJpg2pdf) imgToPdf(file, onDone);
  else if (isPdf2txt) pdfToText(file, onDone);
  else if (isWebp2jpg) imgToImg(file, 'image/jpeg', 'jpg', onDone);
  else if (isSvg2png) svgToPng(file, onDone);
  else if (isJpg2webp) imgToImg(file, 'image/webp', 'webp', onDone);
  else if (isPng2webp) imgToImg(file, 'image/webp', 'webp', onDone);
  else if (isPdf2jpg) pdfToImg(file, outFmt === 'png' ? 'image/png' : 'image/jpeg', outFmt === 'png' ? 'png' : 'jpg', onDone);
  else if (isPdf2html) pdfToHtml(file, onDone);
};
document.getElementById('downloadOutput').onclick = function() {
  var r = window._fcResult;
  if (!r) return;
  if (r.dataUrl) { downloadDataUrl(r.dataUrl, r.filename); }
  else if (r.filename && r.preview) {
    var w = window.open('');
    w.document.write('<!DOCTYPE html><html><head><meta charset="utf-8"><title>' + escHtml(r.filename) + '</title><style>body{margin:2rem;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f0f0f0}img{max-width:90vw;max-height:90vh}@media print{body{background:none}}</style></head><body>' + r.preview + '<script>window.onload=function(){window.print()};</script></body></html>');
    w.document.close();
  } else { if (window.CT && CT.showToast) CT.showToast('暂不支持此格式下载'); }
};

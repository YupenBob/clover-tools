  <script>
    CT.initTheme();

    CT.initKeyboardShortcuts();

    // Share: copy current URL to clipboard
    document.getElementById("shareBtn").onclick = function() { navigator.clipboard.writeText(window.location.href).then(function() { CT.showToast("\u94fe\u63a5\u5df2\u590d\u5236\uff01"); }).catch(function() { CT.showToast("\u590d\u5236\u5931\u8d25"); }); };

    
      const inputA = document.getElementById('inputA');
      const inputB = document.getElementById('inputB');
      const output = document.getElementById('output');
      const steps = document.getElementById('steps');
      function gcd(a, b) {
        const stepsArr = [];
        a = Math.abs(a); b = Math.abs(b);
        while (b !== 0) {
          stepsArr.push(a + ' % ' + b + ' = ' + (a % b));
          const t = b;
          b = a % b;
          a = t;
        }
        steps.textContent = '计算步骤: ' + stepsArr.join(' -> ');
        return a;
      }
      function calc() {
        const a = parseInt(inputA.value);
        const b = parseInt(inputB.value);
        if (isNaN(a) || isNaN(b)) { output.textContent = '请输入有效整数'; return; }
        output.textContent = 'GCD(' + a + ', ' + b + ') = ' + gcd(a, b);
      }
      document.getElementById('calcBtn').addEventListener('click', calc);
      document.getElementById('copyOutput').addEventListener('click', () => copyToClipboard(output.textContent));
    
  </script>

  <div id="toast"></div>

  <script>
    CT.initTheme();

    // ─── Cron Parser ───────────────────────────────────────────────

    const FIELD_NAMES = ['minute', 'hour', 'day-of-month', 'month', 'day-of-week'];
    const FIELD_LIMITS = [
      [0, 59],   // minute
      [0, 23],   // hour
      [1, 31],   // day-of-month
      [1, 12],   // month
      [0, 6],    // day-of-week
    ];

    function parseField(field, min, max) {
      if (field === '*') return Array.from({ length: max - min + 1 }, (_, i) => min + i);
      const result = new Set();
      const parts = field.split(',');
      for (const part of parts) {
        if (part.includes('/')) {
          const [range, step] = part.split('/');
          const stepNum = parseInt(step, 10);
          let start = min, end = max;
          if (range !== '*') {
            if (range.includes('-')) {
              [start, end] = range.split('-').map(Number);
            } else {
              start = parseInt(range, 10);
            }
          }
          for (let v = start; v <= end; v += stepNum) result.add(v);
        } else if (part.includes('-')) {
          const [a, b] = part.split('-').map(Number);
          for (let v = a; v <= b; v++) result.add(v);
        } else {
          result.add(parseInt(part, 10));
        }
      }
      return [...result].sort((a, b) => a - b);
    }

    function parseCron(expr) {
      const fields = expr.trim().split(/\s+/);
      if (fields.length !== 5) return null;
      try {
        const parsed = fields.map((f, i) => parseField(f, FIELD_LIMITS[i][0], FIELD_LIMITS[i][1]));
        return parsed;
      } catch (e) {
        return null;
      }
    }

    function describeCron(expr) {
      const parts = expr.trim().split(/\s+/);
      if (parts.length !== 5) return '无效表达式';
      const [min, hour, dom, month, dow] = parts;

      const weekDays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
      const months = ['', '一月', '二月', '三月', '四月', '五月', '六月', '七月', '八月', '九月', '十月', '十一月', '十二月'];

      let desc = '';

      // Time
      if (min === '*' && hour === '*') {
        desc = '每分钟';
      } else if (min === '0' && hour === '*') {
        desc = '每小时的整点';
      } else if (hour === '*') {
        desc = `每小时的第 ${min} 分钟`;
      } else if (min === '*') {
        desc = `每小时 ${hour} 点的每一分钟`;
      } else {
        const h = parseInt(hour) || 0;
        const m = parseInt(min) || 0;
        const ampm = h < 12 ? '上午' : '下午';
        const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
        desc = `每天 ${ampm} ${h12}:${String(m).padStart(2, '0')} 执行`;
      }

      // Day of week
      if (dow !== '*' && dow !== '?') {
        const d = parseInt(dow);
        if (!isNaN(d)) desc += `，在${weekDays[d]}`;
      }

      // Day of month
      if (dom !== '*' && dom !== '?') {
        desc += `，每月第 ${dom} 天`;
      }

      // Month
      if (month !== '*' && month !== '?') {
        const m = parseInt(month);
        if (!isNaN(m) && months[m]) desc += `，在${months[m]}`;
      }

      return desc || '无法描述此表达式';
    }

    function nextRunTimes(expr, count = 5) {
      const parsed = parseCron(expr);
      if (!parsed) return null;
      const [minField, hourField, domField, monthField, dowField] = parsed;

      const results = [];
      const now = new Date();
      let cur = new Date(now);
      cur.setSeconds(0, 0);
      cur.setMinutes(cur.getMinutes() + 1);

      const MAX_ITER = 1000 * 60; // cap iterations (1 minute each)
      let iter = 0;

      while (results.length < count && iter < MAX_ITER) {
        iter++;
        const m = cur.getMonth() + 1;
        const d = cur.getDate();
        const wd = cur.getDay();
        const h = cur.getHours();
        const mi = cur.getMinutes();

        if (
          minField.includes(mi) &&
          hourField.includes(h) &&
          (domField.includes(d) || domField.length === 31) &&
          monthField.includes(m) &&
          dowField.includes(wd)
        ) {
          results.push(new Date(cur));
        }
        cur.setMinutes(cur.getMinutes() + 1);
      }

      return results;
    }

    function formatRelative(date) {
      const now = new Date();
      const diff = date - now;
      const mins = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);
      if (days > 0) return `${days} 天后`;
      if (hours > 0) return `${hours} 小时后`;
      if (mins > 0) return `${mins} 分钟后`;
      return '即将';
    }

    function formatDate(date) {
      const y = date.getFullYear();
      const mo = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      const h = String(date.getHours()).padStart(2, '0');
      const mi = String(date.getMinutes()).padStart(2, '0');
      const wd = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'][date.getDay()];
      return `${y}-${mo}-${d} ${h}:${mi} (${wd})`;
    }

    function renderBreakdown(expr) {
      const fields = expr.trim().split(/\s+/);
      const labels = ['分', '时', '日', '月', '周'];
      const container = document.getElementById('cronBreakdown');
      container.innerHTML = '';
      fields.forEach((f, i) => {
        const div = document.createElement('div');
        div.className = 'cron-field';
        div.innerHTML = `<span class="cron-field-label">${labels[i]}</span><span class="cron-field-value">${f}</span>`;
        container.appendChild(div);
      });
    }

    function update() {
      const expr = document.getElementById('cronInput').value.trim();
      const descBox = document.getElementById('descriptionBox');
      const runTimes = document.getElementById('runTimes');

      renderBreakdown(expr);
      descBox.textContent = describeCron(expr);

      const times = nextRunTimes(expr, 5);
      if (times === null) {
        runTimes.innerHTML = '<p class="error-msg">表达式格式错误</p>';
        return;
      }
      if (times.length === 0) {
        runTimes.innerHTML = '<p class="error-msg">未找到未来执行时间</p>';
        return;
      }

      runTimes.innerHTML = '<h3>接下来 5 次执行时间</h3>';
      times.forEach((t, i) => {
        const div = document.createElement('div');
        div.className = 'run-time-item';
        div.innerHTML = `
          <span class="run-time-num">${i + 1}</span>
          <span class="run-time-date">${formatDate(t)}</span>
          <span class="run-time-relative">${formatRelative(t)}</span>
        `;
        runTimes.appendChild(div);
      });
    }

    // ─── Init ─────────────────────────────────────────────────────

    const cronInput = document.getElementById('cronInput');

    // Load from URL hash
    if (window.location.hash) {
      cronInput.value = decodeURIComponent(window.location.hash.slice(1));
    }
    update();

    cronInput.addEventListener('input', () => {
      update();
      window.history.replaceState(null, '', '#' + encodeURIComponent(cronInput.value));
    });

    document.getElementById('presetRow').addEventListener('click', (e) => {
      const btn = e.target.closest('.preset-btn');
      if (!btn) return;
      cronInput.value = btn.dataset.cron;
      update();
      window.history.replaceState(null, '', '#' + encodeURIComponent(cronInput.value));
    });

    document.getElementById('shareBtn').onclick = () => {
      navigator.clipboard.writeText(window.location.href).then(() => {
        CT.showToast('链接已复制！');
      }).catch(() => CT.showToast('复制失败'));
    };

    // Share via hash
    document.getElementById('shareBtn').onclick = () => {
      const url = window.location.href;
      navigator.clipboard.writeText(url).then(() => CT.showToast('链接已复制！')).catch(() => CT.showToast('复制失败'));
    };

    document.getElementById('copyBtn') && (document.getElementById('copyBtn').onclick = () => {
      const times = document.getElementById('runTimes');
      const text = times ? times.innerText : '';
      if (text) {
        navigator.clipboard.writeText(text).then(() => CT.showToast('已复制！')).catch(() => CT.showToast('复制失败'));
      }
    });

    // Allow clicking on run-time items to copy
    document.getElementById('runTimes').addEventListener('click', (e) => {
      const item = e.target.closest('.run-time-item');
      if (!item) return;
      const text = item.querySelector('.run-time-date').innerText;
      navigator.clipboard.writeText(text).then(() => CT.showToast('时间已复制！')).catch(() => {});
    });

  </script>

    .page-body { padding: 2.5rem 0 4rem; }
    .breadcrumb { font-size: 0.85rem; opacity: 0.6; margin-bottom: 0.5rem; }
    .breadcrumb a { color: var(--primary); text-decoration: none; }
    .nav-icon { width: 1.1rem; height: 1.1rem; vertical-align: middle; margin-right: 0.25rem; }
    .nav-icon-link { display: inline-flex !important; align-items: center; gap: 0.1rem; }
    .nav-icon-link span { font-size: 0.9rem; }
    .share-icon { width: 1rem; height: 1rem; vertical-align: middle; margin-right: 0.25rem; }

    /* Tabs */
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .tab-btn {
      padding: 0.5rem 1.2rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--card-bg);
      color: var(--text);
      cursor: pointer;
      font-size: 0.95rem;
      transition: var(--transition);
    }
    .tab-btn:hover { border-color: var(--primary); }
    .tab-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    /* Tool layout */
    .tool-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      align-items: start;
    }
    @media (max-width: 640px) {
      .tool-layout { grid-template-columns: 1fr; }
    }

    .tool-card, .output-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem;
      box-shadow: var(--card-shadow);
    }

    .tool-card h3, .output-box h3 {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    textarea {
      width: 100%;
      min-height: 300px;
      padding: 0.75rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      resize: vertical;
      transition: border-color var(--transition);
      font-family: inherit;
    }
    textarea:focus { outline: none; border-color: var(--primary); }
    textarea[readonly] { cursor: default; }

    .char-count {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-align: right;
      margin-top: 0.4rem;
    }

    .btn-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
      flex-wrap: wrap;
    }

    .copy-btn {
      float: right;
      padding: 0.25rem 0.75rem;
      font-size: 0.8rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-secondary);
      color: var(--text);
      cursor: pointer;
      transition: var(--transition);
    }
    .copy-btn:hover { border-color: var(--primary); color: var(--primary); }

    .share-btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      padding: 0.6rem 1rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      box-shadow: 0 4px 15px rgba(199, 0, 57, 0.35);
      transition: var(--transition);
      z-index: 50;
    }
    .share-btn:hover { background: var(--primary-dark); transform: translateY(-2px); }

    [data-theme="dark"] .share-btn { box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4); }

  <header class="site-header">

      <a href="/" class="site-logo">🍀 CloverTools</a>

        <a href="https://github.com/YupenBob/clover-tools" target="_blank" class="nav-icon-link" title="GitHub"><svg class="nav-icon" aria-hidden="true"><use href="#icon-github"/></svg><span>GitHub</span></a>

  <main class="page-body">
    <div class="container">
      <div class="breadcrumb"><a href="/">← 返回工具箱</a></div>
      <div class="tool-header">
        <h1>简繁体转换</h1>
        <p class="description">简体繁体一键互转</p>
      </div>

      <div class="tabs">
        <button class="tab-btn active" id="tabS2T">简体 → 繁体</button>
        <button class="tab-btn" id="tabT2S">繁体 → 简体</button>
      </div>

      <div class="tool-layout">
        <div class="tool-card">
          <h3>输入</h3>
          <textarea id="input" placeholder="输入文字进行转换..."></textarea>
          <div class="char-count" id="charCount">0 字符</div>
        </div>
        <div class="output-box">
          <h3>输出 <button class="copy-btn" id="copyOutput">复制</button></h3>
          <textarea id="output" readonly placeholder="转换结果"></textarea>
          <div class="char-count" id="outputCharCount">0 字符</div>
        </div>
      </div>
    </div>
  </main>

  <button class="share-btn" id="shareBtn" title="分享此工具"><svg class="share-icon" aria-hidden="true"><use href="#icon-share"/></svg>分享</button>

  <footer class="site-footer">
    <div class="site-footer-inner">
      <p style="margin:0;">Made with 🍀 by Clover · Open Source · No tracking · No server</p>
    </div>
  </footer>

  <div id="toast"></div>

  <script>
    CT.initTheme();
    CT.initKeyboardShortcuts();

    // Share
    document.getElementById("shareBtn").onclick = function() {
      navigator.clipboard.writeText(window.location.href).then(function() {
        CT.showToast("链接已复制！");
      }).catch(function() {
        CT.showToast("复制失败");
      });
    };

    // Build Simplified → Traditional mapping (reverse of JIANFAN_ZH2HANS)
    var ZH2HANT = {};
    for (var key in JIANFAN_ZH2HANS) {
      ZH2HANT[JIANFAN_ZH2HANS[key]] = key;
    }

    var mode = 's2t'; // 's2t' = Simplified→Traditional, 't2s' = Traditional→Simplified

    var inputEl = document.getElementById('input');
    var outputEl = document.getElementById('output');
    var charCountEl = document.getElementById('charCount');
    var outputCharCountEl = document.getElementById('outputCharCount');
    var tabS2T = document.getElementById('tabS2T');
    var tabT2S = document.getElementById('tabT2S');

    function convert(text, toTraditional) {
      var map = toTraditional ? ZH2HANT : JIANFAN_ZH2HANS;
      var result = '';
      for (var i = 0; i < text.length; i++) {
        result += map[text[i]] !== undefined ? map[text[i]] : text[i];
      }
      return result;
    }

    function run() {
      var text = inputEl.value;
      var converted = convert(text, mode === 's2t');
      outputEl.value = converted;
      charCountEl.textContent = text.length + ' 字符';
      outputCharCountEl.textContent = converted.length + ' 字符';
    }

    tabS2T.addEventListener('click', function() {
      mode = 's2t';
      tabS2T.classList.add('active');
      tabT2S.classList.remove('active');
      run();
    });

    tabT2S.addEventListener('click', function() {
      mode = 't2s';
      tabT2S.classList.add('active');
      tabS2T.classList.remove('active');
      run();
    });

    inputEl.addEventListener('input', run);

    document.getElementById('copyOutput').onclick = function() {
      CT.copyToClipboard(outputEl.value);
    };
  </script>

  <script>

      const pattern = document.getElementById('pattern');
      const flags = document.getElementById('flags');
      const input = document.getElementById('input');
      const output = document.getElementById('output');
      function run() {
        try {
          const re = new RegExp(pattern.value, flags.value);
          if (!input.value) { output.innerHTML = ''; return; }
          const matches = input.value.match(re);
          if (!matches) { output.textContent = '无匹配'; return; }
          output.innerHTML = '匹配 <b>' + matches.length + '</b> 次<br>' + matches.map(m => '<code>' + m + '</code>').join('<br>');
        } catch(e) { output.textContent = '正则错误: ' + e.message; }
      }
      pattern.addEventListener('input', run);
      flags.addEventListener('input', run);
      input.addEventListener('input', run);
    
  </script>

    <script>
    let rTimes=[], rTimeout=null, rStart=0, rRound=0;
    const totalRounds=5;
    const area=document.getElementById('area');

    function handleReactionClick() {
      if(area.classList.contains('waiting')) startRound();
      else if(area.classList.contains('ready')) {
        const e=Date.now()-rStart; rTimes.push(e); rRound++;
        updateR(); if(rRound>=totalRounds) endR(); else setTimeout(startRound,800);
      } else if(area.classList.contains('too-early')) { clearTimeout(rTimeout); area.className='waiting'; area.textContent='太心急了！点击重新开始'; }
    }

    function startRound() {
      area.className='waiting'; area.textContent='第 '+(rRound+1)+'/'+totalRounds+' 轮 - 等待变绿...';
      rTimeout=setTimeout(()=>{ area.className='ready'; area.textContent='🔥 快点！'; rStart=Date.now(); }, 1500+Math.random()*3000);
    }
    function updateR() {
      const avg=Math.round(rTimes.reduce((a,b)=>a+b,0)/rTimes.length);
      document.getElementById('result').textContent=avg+' ms';
      document.getElementById('sub').textContent='已完成 '+rRound+'/'+totalRounds+' 轮';
      document.getElementById('rounds').textContent='最快: '+Math.min(...rTimes)+'ms | 最慢: '+Math.max(...rTimes)+'ms';
    }
    function endR() {
      const avg=Math.round(rTimes.reduce((a,b)=>a+b,0)/rTimes.length);
      area.className='waiting'; area.textContent='测试完成！';
      const rating=avg<200?'⚡ 神级反应！':avg<250?'🌟 优秀！':avg<300?'👍 良好':avg<400?'😐 一般':'😴 还需锻炼';
      document.getElementById('sub').textContent=rating+' 平均 '+avg+'ms';
      document.getElementById('resetBtn').style.display='inline-block';
    }
    function resetReaction() { rTimes=[]; rRound=0; document.getElementById('result').textContent='— ms'; document.getElementById('sub').textContent='5轮取平均'; document.getElementById('rounds').textContent='最快: — | 最慢: —'; area.className='waiting'; area.textContent='点击开始测试'; document.getElementById('resetBtn').style.display='none'; }
    
  
  // Override theme toggle to use iconfont SVG icons instead of emoji
  function toggleThemeIcon() {
    var current = document.documentElement.getAttribute('data-theme') || 'light';
    var next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('clover-theme', next);
    // Update icons visibility manually
    document.getElementById('iconSun').style.display = next === 'dark' ? 'inline' : 'none';
    document.getElementById('iconMoon').style.display = next === 'dark' ? 'none' : 'inline';
  }
  // After CT.initTheme() runs, sync icon state
  window.addEventListener('load', function() {
    var theme = document.documentElement.getAttribute('data-theme') || 'light';
    document.getElementById('iconSun').style.display = theme === 'dark' ? 'inline' : 'none';
    document.getElementById('iconMoon').style.display = theme === 'dark' ? 'none' : 'inline';
  });

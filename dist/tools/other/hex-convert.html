<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>进制转换 - CloverTools</title>
  <link rel="stylesheet" href="../../src/shared.css">
  <style>
    /* Tool page layout - override defaults */
    .page-body { padding: 2.5rem 0 4rem; }
    .breadcrumb { font-size: 0.85rem; opacity: 0.6; margin-bottom: 0.5rem; }
    .breadcrumb a { color: var(--primary); text-decoration: none; }
  </style>
  <!-- Plausible analytics - privacy-friendly, no cookies -->
  <script defer data-domain="tools.xsanye.cn" src="https://plausible.io/js/script.tagged-events.js"></script>
  <script>window.plausible = window.plausible || function() { (window.plausible.q = window.plausible.q || []).push(arguments) }</script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-logo">🍀 CloverTools</a>
      <nav class="site-nav">
        <a href="/">工具</a>
        <a href="https://github.com/YupenBob/clover-tools" target="_blank">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="page-body">
    <div class="container">
      <div class="breadcrumb"><a href="/">← 返回工具箱</a></div>
      <div class="tool-header">
        <h1>进制转换</h1>
        <p class="description">二/八/十/十六进制转换</p>
      </div>
      <div class="tool-layout ">
        
      <div class="tool-card">
        <h3>输入</h3>
        <textarea id="input" placeholder="输入数字..." style="margin-bottom:0.5rem;"></textarea>
        <label>原始进制: <select id="base"><option value="2">二进制</option><option value="8">八进制</option><option value="10" selected>十进制</option><option value="16">十六进制</option></select></label>
      </div>
      <div class="output-box">
        <h3>转换结果</h3>
        <div id="output" style="font-family:monospace;padding:0.5rem;background:#f5f5f5;border-radius:8px;line-height:1.6;"></div>
      </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>Made with 🍀 by Clover · Open Source · No tracking · No server</p>
  </footer>

  <div id="toast"></div>

  <script>
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => showToast('复制成功！')).catch(() => showToast('复制失败'));
    }

    
      const input = document.getElementById('input');
      const base = document.getElementById('base');
      const output = document.getElementById('output');
      function run() {
        try {
          const v = input.value.trim();
          const b = parseInt(base.value);
          output.value = parseInt(v, b).toString(2) + ' | ' + parseInt(v, b).toString(8) + ' | ' + parseInt(v, b).toString(10) + ' | ' + parseInt(v, b).toString(16).toUpperCase();
        } catch(e) { output.value = '错误: ' + e.message; }
      }
      input.addEventListener('input', run);
      base.addEventListener('change', run);
    
  </script>
</body>
</html>

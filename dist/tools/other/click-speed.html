      <div class="tool-card" style="text-align:center;padding:2rem;">
        <button id="clickBtn" onclick="handleClick()" style="width:220px;height:220px;border-radius:50%;background:var(--primary);color:#fff;border:none;font-size:1.1rem;font-weight:700;cursor:pointer;transition:transform 0.05s,background 0.1s;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none;">

  <script>

      const pattern = document.getElementById('pattern');
      const flags = document.getElementById('flags');
      const input = document.getElementById('input');
      const output = document.getElementById('output');
      function run() {
        try {
          const re = new RegExp(pattern.value, flags.value);
          if (!input.value) { output.innerHTML = ''; return; }
          const matches = input.value.match(re);
          if (!matches) { output.textContent = '无匹配'; return; }
          output.innerHTML = '匹配 <b>' + matches.length + '</b> 次<br>' + matches.map(m => '<code>' + m + '</code>').join('<br>');
        } catch(e) { output.textContent = '正则错误: ' + e.message; }
      }
      pattern.addEventListener('input', run);
      flags.addEventListener('input', run);
      input.addEventListener('input', run);
    
  </script>

    <script>
    const DURATION=10;
    let clicks=0, running=false, startTime=0, clickTimes=[], timerInterval=null;
    const btn=document.getElementById('clickBtn');
    const countText=document.getElementById('clickCount');
    const cpsEl=document.getElementById('cps');
    const maxCpsEl=document.getElementById('maxCps');
    const timerEl=document.getElementById('timer');
    const resetBtn=document.getElementById('clickResetBtn');

    function handleClick() {
      if(!running && clicks===0) { startGame(); return; }
      if(!running) return;
      clicks++; clickTimes.push(Date.now());
      countText.textContent=clicks;
      const elapsed=(Date.now()-startTime)/1000;
      cpsEl.textContent=(clicks/elapsed).toFixed(1);
      const now=Date.now();
      maxCpsEl.textContent=clickTimes.filter(t=>now-t<1000).length;
    }

    function startGame() {
      running=true; clicks=0; clickTimes=[]; startTime=Date.now();
      btn.style.background='#dc2626'; countText.textContent='0'; btn.children[1].textContent='快！';
      timerEl.textContent=DURATION+'s'; resetBtn.style.display='none';
      timerInterval=setInterval(()=>{
        const left=DURATION-Math.floor((Date.now()-startTime)/1000);
        timerEl.textContent=Math.max(0,left)+'s';
        if(left<=0) endGame();
      },100);
    }

    function endGame() {
      running=false; clearInterval(timerInterval);
      btn.style.background='#16a34a'; btn.children[1].textContent='结束！';
      const cps=(clicks/((Date.now()-startTime)/1000)).toFixed(1);
      const rating=cps>=10?'⚡ 手速惊人！':cps>=7?'🌟 非常快！':cps>=5?'👍 不错！':cps>=3?'😐 一般':'😴 还需练习';
      timerEl.textContent=rating+' '+clicks+'次 / '+DURATION+'s';
      resetBtn.style.display='inline-block';
    }

    function resetClick() {
      clicks=0; running=false; clickTimes=[];
      btn.style.background=''; countText.textContent='0'; btn.children[1].textContent='点击开始';
      cpsEl.textContent='0.0'; maxCpsEl.textContent='0'; timerEl.textContent='准备就绪'; resetBtn.style.display='none';
      clearInterval(timerInterval);
    }
    </script>

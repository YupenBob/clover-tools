        <p class="description">可视化生成 Cron 定时任务表达式</p>
      </div>
      <div class="tool-layout ">
        <div class="tool-card"><h3>参数</h3><div class="input-row" style="display:flex;gap:1rem;flex-wrap:wrap;"><div class="input-field"><label>分钟 (0-59)</label><input type="text" id="minute" placeholder="*" style="width:100%;padding:0.5rem;font-size:1rem;"></div><div class="input-field"><label>小时 (0-23)</label><input type="text" id="hour" placeholder="*" style="width:100%;padding:0.5rem;font-size:1rem;"></div><div class="input-field"><label>日期 (1-31)</label><input type="text" id="day" placeholder="*" style="width:100%;padding:0.5rem;font-size:1rem;"></div><div class="input-field"><label>月份 (1-12)</label><input type="text" id="month" placeholder="*" style="width:100%;padding:0.5rem;font-size:1rem;"></div><div class="input-field"><label>星期 (0-6)</label><input type="text" id="weekday" placeholder="*" style="width:100%;padding:0.5rem;font-size:1rem;"></div></div><div class="btn-row"><button class="btn btn-primary" id="genBtn">生成 Cron 表达式</button></div></div><div class="output-box"><h3>结果 <button class="copy-btn" id="copyOutput">复制</button></h3><textarea id="output" readonly></textarea></div>
      </div>
    </div>

  <div id="toast"></div>

  <script>
    CT.initTheme();

    CT.initKeyboardShortcuts();

    // Share: copy current URL to clipboard
    document.getElementById("shareBtn").onclick = function() { navigator.clipboard.writeText(window.location.href).then(function() { CT.showToast("\u94fe\u63a5\u5df2\u590d\u5236\uff01"); }).catch(function() { CT.showToast("\u590d\u5236\u5931\u8d25"); }); };

    var genFn = 'function(inputs) { var min=inputs.minute||\'*\',hr=inputs.hour||\'*\',day=inputs.day||\'*\',mon=inputs.month||\'*\',wd=inputs.weekday||\'*\';var expr=min+\' \'+hr+\' \'+day+\' \'+mon+\' \'+wd;var desc=\'每\';if(min===\'*\')desc+=\'分钟\';else desc+=\'第 \'+min+\' 分钟\';if(hr===\'*\')desc+=\'每小时\';else desc+=\'第 \'+hr+\' 小时\';if(day===\'*\'&&wd===\'*\')desc+=\'每天\';else if(day!==\'*\')desc+=\'第 \'+day+\' 天\';else if(wd!==\'*\')desc+=\'星期 \'+wd;return \'表达式：\'+expr+\'\\n说明：\'+desc; }';
document.getElementById("genBtn").onclick = function() {
  var inputs = {};
  inputs["minute"] = document.getElementById("minute").value;
  inputs["hour"] = document.getElementById("hour").value;
  inputs["day"] = document.getElementById("day").value;
  inputs["month"] = document.getElementById("month").value;
  inputs["weekday"] = document.getElementById("weekday").value;
  var result = genFn(inputs);
  document.getElementById("output").value = result;
};
document.getElementById("copyOutput").onclick = function() { copyToClipboard(document.getElementById("output").value); };

  </script>

  <script>
    CT.initTheme();

    CT.initKeyboardShortcuts();

    // Share: copy current URL to clipboard
    document.getElementById("shareBtn").onclick = function() { navigator.clipboard.writeText(window.location.href).then(function() { CT.showToast("\u94fe\u63a5\u5df2\u590d\u5236\uff01"); }).catch(function() { CT.showToast("\u590d\u5236\u5931\u8d25"); }); };

    var TOOL_DATA = [];
var renderFn = 'function(data, search) { var html = \'<div class=tool-card><h3>查询结果</h3><p id=ipResult style=color:#888;>正在查询您的 IP 地址...</p></div>\'; setTimeout(function(){fetch(\'https://ipapi.co/json/\').then(function(r){return r.json();}).then(function(d){var el=document.getElementById(\'ipResult\');if(el)el.outerHTML=\'<div><p><strong>IP：</strong>\'+(d.ip||\'未知\')+\'</p><p><strong>城市：</strong>\'+(d.city||\'未知\')+\'</p><p><strong>地区：</strong>\'+(d.region||\'未知\')+\'</p><p><strong>国家：</strong>\'+(d.country_name||\'未知\')+\'</p><p><strong>运营商：</strong>\'+(d.org||\'未知\')+\'</p></div>\';}).catch(function(){var el=document.getElementById(\'ipResult\');if(el)el.outerHTML=\'<p style=color:red;>查询失败，请稍后重试</p>\';});},100);return html;}';
function doRender(search) {
  var filtered = search ? TOOL_DATA.filter(function(item) {
    return JSON.stringify(item).toLowerCase().includes(search.toLowerCase());
  }) : TOOL_DATA;
  document.getElementById("resultArea").innerHTML = renderFn(filtered, search);
}
document.getElementById("searchInput").addEventListener("input", function() { doRender(this.value); });
doRender();
  </script>

  <script>
    CT.initTheme();

    var TOOL_DATA = [{"code":"200","name":"OK","category":"成功 2xx","desc":"请求成功"},{"code":"201","name":"Created","category":"成功 2xx","desc":"资源创建成功"},{"code":"204","name":"No Content","category":"成功 2xx","desc":"请求成功但无返回内容"},{"code":"301","name":"Moved Permanently","category":"重定向 3xx","desc":"永久重定向"},{"code":"302","name":"Found","category":"重定向 3xx","desc":"临时重定向"},{"code":"304","name":"Not Modified","category":"重定向 3xx","desc":"资源未修改，使用缓存"},{"code":"400","name":"Bad Request","category":"客户端错误 4xx","desc":"请求语法错误或参数错误"},{"code":"401","name":"Unauthorized","category":"客户端错误 4xx","desc":"未授权，需要登录"},{"code":"403","name":"Forbidden","category":"客户端错误 4xx","desc":"禁止访问，权限不足"},{"code":"404","name":"Not Found","category":"客户端错误 4xx","desc":"资源不存在"},{"code":"405","name":"Method Not Allowed","category":"客户端错误 4xx","desc":"请求方法不支持"},{"code":"429","name":"Too Many Requests","category":"客户端错误 4xx","desc":"请求过于频繁，触发限流"},{"code":"500","name":"Internal Server Error","category":"服务器错误 5xx","desc":"服务器内部错误"},{"code":"502","name":"Bad Gateway","category":"服务器错误 5xx","desc":"网关错误，上游服务器无效响应"},{"code":"503","name":"Service Unavailable","category":"服务器错误 5xx","desc":"服务暂时不可用"},{"code":"504","name":"Gateway Timeout","category":"服务器错误 5xx","desc":"网关超时"}];
var renderFn = 'function(data, search) { var html=\'<table style="width:100%;border-collapse:collapse;"><thead><tr style="background:var(--bg-secondary);"><th style="padding:0.6rem;border:1px solid var(--border);">状态码</th><th style="padding:0.6rem;border:1px solid var(--border);">名称</th><th style="padding:0.6rem;border:1px solid var(--border);">分类</th><th style="padding:0.6rem;border:1px solid var(--border);">说明</th></tr></thead><tbody>\'; data.forEach(function(r){html+=\'<tr><td style="padding:0.5rem;border:1px solid var(--border);font-family:monospace;font-weight:bold;">\'+r.code+\'</td><td style="padding:0.5rem;border:1px solid var(--border);">\'+r.name+\'</td><td style="padding:0.5rem;border:1px solid var(--border);font-size:0.85rem;color:var(--text-secondary);">\'+r.category+\'</td><td style="padding:0.5rem;border:1px solid var(--border);font-size:0.9rem;">\'+r.desc+\'</td></tr>\';}); html+=\'</tbody></table>\'; return html; }';
function doRender(search) {
  var filtered = search ? TOOL_DATA.filter(function(item) {
    return JSON.stringify(item).toLowerCase().includes(search.toLowerCase());
  }) : TOOL_DATA;
  document.getElementById("resultArea").innerHTML = renderFn(filtered, search);
}
document.getElementById("searchInput").addEventListener("input", function() { doRender(this.value); });
doRender();
